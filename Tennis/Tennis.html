function dataKey(data) { const t=String(data||'').trim(); const m=t.match(/^(\d{1,2})\/(\d{1,2})$/); if(!m) return 99999999; return new Date().getFullYear()*10000+parseInt(m[2])*100+parseInt(m[1]); }

function sortKey(g) { if(g.stato==='live') return [0,0,0,g.nome||'']; if(g.prossimo) return [1,dataKey(g.prossimo.data),orarioKey(g.prossimo.orario),g.nome||'']; if(g.verifica) return [2,dataKey(g.verifica.data),orarioKey(g.verifica.orario),g.nome||'']; if(g.stato==='elim') return [9,99999999,9999,g.nome||'']; return [5,99999999,9999,g.nome||'']; }
function confronta(a,b) { const ka=sortKey(a), kb=sortKey(b); for(let i=0;i<ka.length;i++){ if(ka[i]<kb[i])return -1; if(ka[i]>kb[i])return 1; } return 0; }
function nomeFoto(nome) { return String(nome||'').charAt(0).toUpperCase()+String(nome||'').slice(1).toLowerCase().replaceAll(' ','_'); }
function quandoHtml(g) { let data='',ora='',cls=''; if(g.stato==='live'){data='LIVE';ora='adesso';cls=' badge-live';} else if(g.prossimo){data=dataLabel(g.prossimo.data);ora=g.prossimo.orario||'';} else if(g.verifica){data=dataLabel(g.verifica.data);ora='da verificare';cls=' badge-check';} else return '<div class="quando-box"></div>'; return '<div class="quando-box"><div class="quando-pill'+cls+'">'+esc(data)+'</div>'+(ora?'<div class="quando-pill'+cls+'">'+esc(ora)+'</div>':'')+'</div>'; }
function renderCard(g) { const isLive=g.stato==='live'; const isElim=g.stato==='elim'; const nomeProprio=NOMI_PROPRI[g.nome]||''; const nomeHtml=nomeProprio?'<span class="nome-primo">'+esc(nomeProprio)+'</span><span class="nome">'+esc(g.nome)+'</span>':'<span class="nome">'+esc(g.nome)+'</span>'; const foto='<img class="tennista-foto" src="Tennisti/'+nomeFoto(g.nome)+'.jpg" onerror="this.style.display='none'" alt="'+esc(g.nome)+'">'; let body=''; if(isLive&&g.live){body+='<div class="box live-box"><div class="vs">vs '+esc(g.live.avv)+'</div><div class="score-live">'+esc(g.live.score)+'</div></div>';} if(!isLive&&!isElim&&g.prossimo){body+='<div class="box next-box"><div class="vs">vs '+esc(g.prossimo.avv)+'</div></div>';} if(!isLive&&!isElim&&g.verifica){body+='<div class="box check-box"><div class="vs">vs '+esc(g.verifica.avv)+'</div><div class="note">'+esc(g.verifica.motivo||'risultato da verificare')+'</div></div>';} (g.storico||[]).forEach(m=>{const win=m.esito==='W'; body+='<div class="match-row"><span class="match-date">'+esc(dataLabel(m.data))+'</span><span class="match-esito" style="color:'+(win?'var(--win)':'var(--lose)')+'">'+(win?'✓':'✗')+'</span><span class="match-avv">'+esc(m.avv)+'</span><span class="match-score">'+esc(m.score||'')+'</span></div>';}); if(!body) body='<div class="empty">Nessun dettaglio disponibile</div>'; return '<div class="card'+(isLive?' live':'')+(isElim?' eliminato':'')+'"><div class="card-head"><div class="nome-wrap">'+nomeHtml+'</div>'+foto+quandoHtml(g)+'</div><div class="card-body">'+body+'</div></div>'; }
function render(DATA) { const ordinati=DATA.slice().sort(confronta); const inGara=ordinati.filter(g=>g.stato!=='elim'); const eliminati=ordinati.filter(g=>g.stato==='elim'); let html=''; if(inGara.length){html+='<div class="section-label">Italiani ancora in gara</div>'; inGara.forEach(g=>html+=renderCard(g));} if(eliminati.length){html+='<div class="section-label">Italiani fuori dai giochi</div>'; eliminati.forEach(g=>html+=renderCard(g));} document.getElementById('container').innerHTML=html||'<div class="empty" style="margin:20px">Nessun dato disponibile.</div>'; }
async function carica() { if(timerRefresh) clearTimeout(timerRefresh); try { const r=await fetch('dati.json?t='+Date.now(),{cache:'no-store'}); const DATA=await r.json(); render(DATA); let isLive=DATA.some(g=>g.stato==='live'); let isOggi=DATA.some(g=>(g.prossimo&&dataLabel(g.prossimo.data)==='oggi')||(g.verifica&&dataLabel(g.verifica.data)==='oggi')); try { const rm=await fetch('meta.json?t='+Date.now(),{cache:'no-store'}); if(rm.ok){ const meta=await rm.json(); const pub=meta.pubblicato||meta.aggiornato||''; const breve=String(pub).replace(/^(\d{2}:\d{2}):\d{2}/,'$1'); document.getElementById('dati-refresh').textContent='Aggiornamento: '+(breve||'non disponibile')+' (v.46)'; if(meta.html_version&&meta.html_version!==HTML_VERSION){ location.replace(location.href.split('?')[0]+'?v='+Date.now()); return; } } }catch(e){} timerRefresh=setTimeout(carica,isLive?6000:(isOggi?30000:60000)); } catch(e) { document.getElementById('dati-refresh').textContent='Aggiornamento: errore, ritento tra 10 sec'; timerRefresh=setTimeout(carica,10000); } }
render(DATA_EMBEDDED); carica();
</script>
