name: Aggiorna Rosticceria Fantasia

on:
  schedule:
    # GitHub usa UTC. Lo script filtra la vera finestra 10:00-12:00 Europe/Rome.
    - cron: "*/15 8-11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz playwright
          python -m playwright install --with-deps chromium

      - name: Cerca menu Fantasia
        env:
          FACEBOOK_COOKIES_B64: ${{ secrets.FACEBOOK_COOKIES_B64 }}
        run: python fetch_fantasia_latest.py

      - name: Salva risultati nel repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Fantasia fetch_fantasia_latest.py
          git diff --cached --quiet || git commit -m "Aggiorna menu Rosticceria Fantasia"
          git push
