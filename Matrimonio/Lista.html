  window.mapTelefoni = {};
  async function caricaTelefoni() {
    try {
      const resp = await fetch('Telefoni.txt?t=' + Date.now());
      if (!resp.ok) return;
      const txt = await resp.text();
      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      txt.split(/\r?\n/).forEach(riga => {
        const m = riga.match(/^(.+?)\s{2,}(\S+)$/);
        if (!m) return;
        const nome = m[1].trim(); const cell = m[2].trim();
        if (cell === '\u2014' || cell === '-') return;
        window.mapTelefoni[norm(nome)] = cell;
        const parti = nome.split(/\s+/);
        if (parti.length >= 2)
          window.mapTelefoni[norm(parti.slice(1).join(' ') + ' ' + parti[0])] = cell;
      });
    } catch(e) {}
  }

  function cercaTelefono(nomeDisplay) {
    const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const k1 = norm(nomeDisplay);
    if (window.mapTelefoni[k1]) return window.mapTelefoni[k1];
    const parti = nomeDisplay.trim().split(/\s+/);
    if (parti.length >= 2) {
      const k2 = norm(parti[parti.length-1] + ' ' + parti.slice(0,-1).join(' '));
      if (window.mapTelefoni[k2]) return window.mapTelefoni[k2];
    }
    return '';
  }

  function formattaNumero(raw) {
    const digits = raw.replace(/\D/g,'');
    if (digits.length === 10)
      return digits.slice(0,3) + '-' + digits.slice(3,5) + '.' + digits.slice(5,7) + '.' + digits.slice(7);
    if (digits.length === 12 && digits.startsWith('39')) {
      const loc = digits.slice(2);
      return '+39\u00a0' + loc.slice(0,3) + '-' + loc.slice(3,5) + '.' + loc.slice(5,7) + '.' + loc.slice(7);
    }
    return raw;
  }

  // Funzione per estrarre i dati da Tavoli.txt dinamicamente
  async function caricaTavoli() {
    try {
      const response = await fetch('Tavoli.txt?t=' + Date.now());
      if (response.ok) {
        const text = await response.text();
        const righe = text.split(/\r?\n/);
        TAVOLI = []; // Resetta l'array per popolarlo dinamicamente
        let tavoloCorrente = null;

        righe.forEach(riga => {
          const r = riga.trim();
          if (!r) return; // Ignora le righe vuote

          if (r.startsWith('#')) {
            // Nuovo tavolo identificato (rimuove il '#' e gli spazi)
            tavoloCorrente = {
              nome: r.substring(1).trim(),
              persone: []
            };
            TAVOLI.push(tavoloCorrente);
          } else if (tavoloCorrente) {
            // Aggiunge la persona al tavolo corrente
            tavoloCorrente.persone.push(r);
          }
        });

        // Se la sezione HTML dei tavoli è già stata montata, la aggiorna
        if (document.getElementById('sezione-tavoli')) {
          renderizzaTavoli();
        }
      } else {
        console.error("Errore nel caricamento di Tavoli.txt: " + response.status);
      }
    } catch (err) {
      console.error("Errore di rete durante il caricamento di Tavoli.txt: ", err);
    }
    // Carica Invitati.csv per popolare window.mapNascita (date di nascita)
    try {
      const respInv = await fetch('Invitati.csv?t=' + Date.now());
      if (respInv.ok) {
        const txtInv = await respInv.text();
        const righeInv = txtInv.split(/\r?\n/).map(r => r.trim());
        const sepInv = txtInv.includes(';') ? ';' : ',';
        const acc = /[\u0300-\u036f]/g;
        window.mapNascita = {};
        window.tuttiInvitatiCsvRaw = [];
        let totCsv = 0;
        let startInv = (righeInv.length > 0 && righeInv[0].toLowerCase().includes('nom')) ? 1 : 0;
        for (let i = startInv; i < righeInv.length; i++) {
          const cols = righeInv[i].split(sepInv);
          const nomeRaw = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          const dataN = cols[1] ? cols[1].replace(/['"]/g,'').trim() : '';
          // Il CSV è in formato "Cognome Nome" — inverte in "Nome Cognome"
          // per compatibilità con la logica ordinaInvitati e formatNomeDisplay
          const partiNome = nomeRaw.split(/\s+/).filter(Boolean);
          const nome = partiNome.length >= 2
            ? partiNome.slice(1).join(' ') + ' ' + partiNome[0]
            : nomeRaw;
          if (nome) {
            totCsv++;
            window.tuttiInvitatiCsvRaw.push({ nome, dataNascita: dataN });
            if (dataN) window.mapNascita[nome.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
          }
        }
        window.totInvitatiCsv = totCsv;
        window.totInvitatiCsvRaw = totCsv;
      }
    } catch(e) { console.log('mapNascita: Invitati.csv non disponibile', e); }
  }

  function normalizeText(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s === '4') return 'baby';
    if (s === '5') return 'segnaposto';
    if (s.includes('veget') || s.includes('vegan')) return 'veg';
    if (s.includes('carne') || s.includes('meat')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function isAbsent(presenza, secondo) {
    const p = normalizeText(presenza);
    if (p === '0' || p === 'false' || p === 'no' || p.includes('non') || p.includes('assente') || p === '') {
        if (p === '' && detectSecondo(secondo) !== '') {
            return false;
        }
        return true;
    }
    return false;
  }

  function hasAllergy(value) {
    if (!value) return false;
    const s = normalizeText(value).replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim();
    if (!s) return false;
    const falsiPositivi = [
      'no', 'nessuna', 'nessuno', 'nessun', 'niente', 'nulla', 'nd',
      '0', 'false', 'nessuna allergia', 'no allergie', 'nessuna in particolare',
      'no grazie', 'nessuna grazie'
    ];
    if (falsiPositivi.includes(s)) return false;
    return true;
  }

  function iconaAllergie(value) {
    if (!hasAllergy(value)) return '';
    // Mappa esatta dei valori usati in Matrimonio.html
    const mappa = {
      'formaggi':     '🧀',
      'glutine':      '🌾',
      'lattosio':     '🥛',
      'frutta secca': '🥜',
      'uova':         '🥚',
      'crostacei':    '🦐',
      'soia':         '🫘',
      'pesce':        '🐟',
      'sedano':       '🥦',
    };
    const voci = value.split(',').map(v => v.trim().toLowerCase());
    const icone = [];
    voci.forEach(v => {
      if (mappa[v]) {
        if (!icone.includes(mappa[v])) icone.push(mappa[v]);
      } else {
        // Voce libera non in mappa: icona generica se non già presente
        if (!icone.includes('⚠️')) icone.push('⚠️');
      }
    });
    return icone.join('');
  }

    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];

        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1; return n<=10?eT[n]:String(n);
        }
      }
    }

  }

  function trovaTavolo(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];
      for(const p of t.persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1;
          return(n<=10?eT[n]:String(n))+' '+t.nome.replace(/^Tavolo \d+ - /,'');

      const accF = /[\u0300-\u036f]/g;

      function cercaTelPdf(nomeDisplay) {
        const k1 = normF(nomeDisplay);

      for (let i = 0; i < inAttesaPdf.length; i += 3) {

      htmlPDF += `<div style="page-break-inside:avoid;">`;
      htmlPDF += `<h3 style="font-size:13px;margin-top:18px;margin-bottom:6px;color:#8a5e1e;font-weight:600;">${testi.titoloConferma} (${inAttesaPdf.length})</h3>`;
      htmlPDF += `<table class="pdf-table" style="width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;">
        <thead><tr style="background-color:#f5ede0;">
          <th style="padding:3px 6px;width:33.3%;color:#000;">${testi.pdfNome}</th>

    // Tabella Assenti - dopo i presenti, non spezzare header dal primo rigo
    if (assentiRows.length > 0) {

        gruppo.forEach(inv => {
          if (inv.dataNascita) {

            const dmYc = dCnt.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
            const Ymdc = dCnt.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);

            if (dmYc) nascitaCnt = new Date(parseInt(dmYc[3]), parseInt(dmYc[2])-1, parseInt(dmYc[1]));

            if (nascitaCnt) {
              let anniCnt = matrimonioCnt.getFullYear() - nascitaCnt.getFullYear();
              const cpCnt = (nascitaCnt.getMonth() < matrimonioCnt.getMonth()) ||

              if (!cpCnt) anniCnt--;
              if (anniCnt < 11) totBambini++;

      const totAdultiCsv = totInvitatiCsv - totBambini;
      const totNonRisposto = Math.max(0, totInvitatiCsv - window.datiInvitati.length);

      const mapTavolo = {};
      TAVOLI.forEach((t, ti) => {
        t.persone.forEach(p => {
          const chiave = p.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
          mapTavolo[chiave] = ti + 1; // numero tavolo 1-based
        });

      const titoloBambini = totBambini > 0 ? ` [${totAdultiCsv} + ${totBambini}]` : '';

      htmlPDF += `
        <div style="border:1.5px solid #a5b589;border-radius:8px;background:#eef4e8;margin-top:14px;margin-bottom:12px;overflow:hidden;"><table style="width:100%;border-collapse:collapse;"><tr><td style="padding:4px 10px;text-align:left;white-space:nowrap;border-right:1px solid #a5b589;"><span style="display:inline-flex;align-items:center;justify-content:center;background:#fff176;border-radius:16px;padding:0 14px;height:32px;font-family:Arial,sans-serif;font-size:14px;font-weight:900;color:#000000;">${totInvitatiCsv}&nbsp;&#8722;&nbsp;${window.datiInvitati.length}&nbsp;&#61;&nbsp;${totNonRisposto}</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#1a4fa0;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">V</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totVeg}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">VEGET</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#1a4fa0;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">C</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totCarne}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">${testi.kpiCarne}</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#1a4fa0;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">P</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totPesce}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">${testi.kpiPesce}</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#2d6040;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">B</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totBaby}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">${testi.kpiBaby}</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#8a6000;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">S</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totSegnaposto}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">${testi.kpiSegnaposto}</span></td><td style="padding:4px 7px;text-align:center;white-space:nowrap;"><span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:#a83230;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:20px;vertical-align:middle;font-family:Arial,sans-serif;margin-right:3px">A</span><span style="font-family:Arial,sans-serif;font-size:16px;font-weight:900;color:#2a5a18;margin-right:2px">${totAssenti}</span><span style="font-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">${testi.kpiAssenti}</span></td></tr></table></div>
                <div style="column-count: 2; column-gap: 30px; font-size: 14px; width: 100%; margin-top: 26px;">
      `;

      gruppiInvitati.forEach((gruppo, index) => {

        gruppo.forEach(inv => {

          if (inv.dataNascita) {
            const matrimonio = new Date(2026, 5, 21);

            const dmY = d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
            const Ymd = d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
            const soloAnno = d.match(/^(\d{4})$/);
            if (dmY) nascita = new Date(parseInt(dmY[3]), parseInt(dmY[2])-1, parseInt(dmY[1]));
            else if (Ymd) nascita = new Date(parseInt(Ymd[1]), parseInt(Ymd[2])-1, parseInt(Ymd[3]));
            else if (soloAnno) nascita = new Date(parseInt(soloAnno[1]), 0, 1);
            if (nascita) {
              let anni = matrimonio.getFullYear() - nascita.getFullYear();
              const cp = (nascita.getMonth() < matrimonio.getMonth()) ||
                (nascita.getMonth() === matrimonio.getMonth() && nascita.getDate() <= matrimonio.getDate());
              if (!cp) anni--;
              eta = String(anni);
            }
          }
          // Matching intelligente: tutti i token del CSV devono essere nei token della risposta
          function tokensOf(n) {
            return (n||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().split(/\s+/).filter(Boolean);
          }
          function matchNomi(nCSV, nRisp) {

            return tC.every(t => tR.includes(t)) || tR.every(t => tC.includes(t));
          }
          const matches = window.datiInvitati.filter(r => matchNomi(inv.nome, r.nome || ""));
          let nomeStyle = "";

    function getIdentificativo(cognomeNome) {
      const acc = /[\u0300-\u036f]/g;
      function norm(s) { return (s||'').toLowerCase().normalize('NFD').replace(acc,'').trim(); }
      const k = norm(cognomeNome);
      if (mapIdentificativi[k]) return mapIdentificativi[k];
      // fallback: prova senza accenti nel confronto
      for (const mk of Object.keys(mapIdentificativi)) {
        if (norm(mk) === k) return mapIdentificativi[mk];
      }
      // fallback: primo nome
      const parti = cognomeNome.trim().split(/\s+/);
      return parti.length >= 2 ? parti.slice(1).join(' ') : cognomeNome;
    }

    htmlPDF += `<div class="html2pdf__page-break"></div>`;
    htmlPDF += `<div style="width:720px;padding:0;margin:0 -10px;font-family:'Inter',sans-serif;">`;
    htmlPDF += `<h1 style="text-align:center;font-family:'Cormorant Garamond',serif;font-size:22px;margin-top:0;margin-bottom:2px;color:#000;">Fotografie</h1>`;
    htmlPDF += `<h2 style="text-align:center;font-family:'Cormorant Garamond',serif;font-size:13px;color:#8a5e1e;margin-bottom:10px;">Giulia &amp; Onofrio</h2>`;

    // Costruisce lista ordinata da fotoDisponibili o datiInvitati come fallback
    // Costruisce mappa CognomeNome → file foto da fotoDisponibili
    // Costruisce mappa CognomeNome → file foto con fetch HEAD diretto per tutti gli invitati
    // (non dipende da fotoDisponibili che potrebbe essere incompleto)
    const acc0 = /[\u0300-\u036f]/g;
    function norm0(s) { return (s||'').toLowerCase().normalize('NFD').replace(acc0,'').trim(); }
    function variantiNomePDF(n) {
      const v = new Set();
      v.add(n);
      v.add(n.normalize('NFD').replace(acc0,''));
      v.add(n.replace(/u'$/, 'ù').replace(/a'$/, 'à').replace(/e'$/, 'è').replace(/i'$/, 'ì').replace(/o'$/, 'ò'));
      v.add(n.replace(/'$/, ''));
      return [...v];
    }

    function trovaCognomeNome(nomeInv) {
      const parti = (nomeInv || '').trim().split(/\s+/);
      return parti.length >= 2 ? parti[parti.length - 1] + ' ' + parti.slice(0, -1).join(' ') : nomeInv;
    }

    const tuttiCsv = window.tuttiInvitatiCsvRaw || [];
    const fonteBase = tuttiCsv.length > 0 ? tuttiCsv : (window.datiInvitati || []);

    // Fetch HEAD in parallelo per tutti gli invitati
    const estensioni = ['jpg', 'JPG', 'jpeg', 'JPEG'];
    async function cercaFotoPDF(cognomeNome) {
      for (const variante of variantiNomePDF(cognomeNome)) {
        for (const ext of estensioni) {
          try {
            const r = await fetch('Foto/' + variante + '.' + ext, { method: 'HEAD' });
            if (r.ok) return variante + '.' + ext;
          } catch(e) {}
        }
      }
      return null;
    }

    // Aggiorna pulsante durante attesa
    if (btnPdf) btnPdf.innerText = '⏳ Foto...';

    const mapFotoFile = {};
    await Promise.all(fonteBase.map(async r => {
      const nomeInv = r.nome || '';
      const cognomeNome = trovaCognomeNome(nomeInv);
      const file = await cercaFotoPDF(cognomeNome);
      if (file) mapFotoFile[norm0(cognomeNome)] = file;
    }));

    function trovFoto(cognomeNome) {
      for (const v of variantiNomePDF(cognomeNome)) {
        if (mapFotoFile[norm0(v)]) return mapFotoFile[norm0(v)];
      }
      return null;
    }
    const fotoPagina = [];
    fonteBase.forEach(r => {
      const nomeInv = r.nome || ''; // formato "Nome Cognome"
      const cognomeNome = trovaCognomeNome(nomeInv);
      const id = getIdentificativo(cognomeNome);
      const eta = getEtaAnni(nomeInv);
      const label = id + (eta !== null ? ' (' + eta + ')' : '');
      const file = trovFoto(cognomeNome);
      fotoPagina.push({ nome: cognomeNome, file, label });
    });

    // Ordina per identificativo (alfabetico, case-insensitive)
    fotoPagina.sort((a, b) => a.label.localeCompare(b.label, 'it', { sensitivity: 'base' }));

    // Griglia: 7 colonne con margini stretti
    const COLS = 7;
    const CELL_W = 94;
    const IMG_SIZE = 82; // px DOM

    htmlPDF += `<table style="border-collapse:collapse;width:100%;table-layout:fixed;">`;
    for (let row = 0; row < Math.ceil(fotoPagina.length / COLS); row++) {
      htmlPDF += `<tr>`;
      for (let col = 0; col < COLS; col++) {
        const i = row * COLS + col;
        if (i >= fotoPagina.length) {
          htmlPDF += `<td style="width:${CELL_W}px;padding:4px 3px;"></td>`;
          continue;
        }
        const voce = fotoPagina[i];
        const imgSrc = voce.file ? 'Foto/' + voce.file : 'Foto/Foto.png';
        htmlPDF += `<td style="width:${CELL_W}px;padding:2px 1px;text-align:center;vertical-align:top;">
          <img src="${imgSrc}" style="width:${IMG_SIZE}px;height:${IMG_SIZE}px;object-fit:cover;border-radius:4px;display:block;margin:0 auto;" crossorigin="anonymous" />
          <div style="font-size:8px;font-family:'Inter',sans-serif;color:#222;margin-top:2px;line-height:1.2;word-break:break-word;">${voce.label}</div>
        </td>`;
      }
      htmlPDF += `</tr>`;
    }
    htmlPDF += `</table>`;
    htmlPDF += `</div>`;

    container.innerHTML = htmlPDF;



    const _d = new Date(), _p = n => String(n).padStart(2,'0');
    const _ts = _d.getFullYear()+'-'+_p(_d.getMonth()+1)+'-'+_p(_d.getDate())+'-'+_p(_d.getHours())+'-'+_p(_d.getMinutes())+'-'+_p(_d.getSeconds());
    const opt = {
      margin:       [5, 10, 20, 10],
      filename:     'Lista-' + _ts + '.pdf',
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, scrollY: 0 },
      jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak:    { mode: ['css', 'legacy'], avoid: '.pdf-table tr' }
    };

    html2pdf().set(opt).from(container).save().then(() => {
      if (btnPdf) {
        btnPdf.innerText = testi.pdf;
        btnPdf.disabled = false;
      }
    });
  }

  function etaTavoloHTML(nome) {
    const acc = /[\u0300-\u036f]/g;
    function tok(n) { return (n||'').toLowerCase().normalize('NFD').replace(acc,'').trim().split(/\s+/).filter(Boolean); }
    const pk = tok(nome);
    // Cerca in datiInvitati per secondo/icona
    var match = null;
    if (window.datiInvitati && window.datiInvitati.length) {
      match = window.datiInvitati.find(function(r) {
        var rk = tok(r.nome||'');
        return pk.every(function(w){return rk.includes(w);}) || rk.every(function(w){return pk.includes(w);});
      });
    }
    // Età da window.mapNascita
    var etaPart = '';
    if (window.mapNascita) {
      // cerca chiave esatta o per token
      var chiaveEsatta = nome.toLowerCase().normalize('NFD').replace(acc,'').trim();
      var dataN = window.mapNascita[chiaveEsatta];
      if (!dataN) {
        // fallback: cerca per token match
        Object.keys(window.mapNascita).forEach(function(k) {
          var kTok = k.split(/\s+/).filter(Boolean);
          if (pk.every(function(w){return kTok.includes(w);}) || kTok.every(function(w){return pk.includes(w);})) {
            dataN = window.mapNascita[k];
          }
        });
      }
      if (dataN) {
        var d = dataN.trim();
        var matrimonio = new Date(2026, 5, 21);
        var nascita = null;
        var dmY = d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
        var Ymd = d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
        var soloAnno = d.match(/^(\d{4})$/);
        if (dmY) nascita = new Date(parseInt(dmY[3]), parseInt(dmY[2])-1, parseInt(dmY[1]));
        else if (Ymd) nascita = new Date(parseInt(Ymd[1]), parseInt(Ymd[2])-1, parseInt(Ymd[3]));
        else if (soloAnno) nascita = new Date(parseInt(soloAnno[1]), 0, 1);
        if (nascita) {
          var anni = matrimonio.getFullYear() - nascita.getFullYear();
          var cp = (nascita.getMonth() < matrimonio.getMonth()) ||
            (nascita.getMonth() === matrimonio.getMonth() && nascita.getDate() <= matrimonio.getDate());
          if (!cp) anni--;
          etaPart = ' <span style="font-weight:500;font-size:16px;color:#000000;-webkit-text-fill-color:#000000">('+anni+')</span>';
        }
      }
    }
    // Icona secondo piatto
    var iconaPart = '';
    if (match && match.secondo) {
      var tipo = detectSecondo(match.secondo);
      if (tipo === 'veg')        iconaPart = ' <span title="${dizionario[currentLang].tipVeg}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2d6040;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">V</span>';
      else if (tipo === 'carne') iconaPart = ' <span title="${dizionario[currentLang].tipCarne}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#a83230;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">C</span>';
      else if (tipo === 'pesce') iconaPart = ' <span title="${dizionario[currentLang].tipPesce}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#c8a000;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">P</span>';
      else if (tipo === 'baby')  iconaPart = ' <span title="${dizionario[currentLang].tipBaby}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2980b9;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">B</span>';
    }
    return etaPart + iconaPart;
  }

  function getEtaAnni(nome) {
    if (!window.mapNascita) return null;
    const acc = /[\u0300-\u036f]/g;
    const k = (nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    // cerca chiave esatta o token match
    let dataN = window.mapNascita[k];
    if (!dataN) {
      const pk = k.split(/\s+/).filter(Boolean);
      Object.keys(window.mapNascita).forEach(mk => {
        const mk2 = mk.split(/\s+/).filter(Boolean);
        if (pk.every(w=>mk2.includes(w)) || mk2.every(w=>pk.includes(w))) dataN = window.mapNascita[mk];
      });
    }
    if (!dataN) return null;
    const d = dataN.trim();
    const matrimonio = new Date(2026,5,21);
    let nascita = null;
    const dmY=d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    const Ymd=d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
    const soloA=d.match(/^(\d{4})$/);
    if(dmY) nascita=new Date(parseInt(dmY[3]),parseInt(dmY[2])-1,parseInt(dmY[1]));
    else if(Ymd) nascita=new Date(parseInt(Ymd[1]),parseInt(Ymd[2])-1,parseInt(Ymd[3]));
    else if(soloA) nascita=new Date(parseInt(soloA[1]),0,1);
    if(!nascita) return null;
    let anni = matrimonio.getFullYear()-nascita.getFullYear();
    const cp=(nascita.getMonth()<matrimonio.getMonth())||(nascita.getMonth()===matrimonio.getMonth()&&nascita.getDate()<=matrimonio.getDate());
    if(!cp) anni--;
    return anni;
  }

  function labelOrdineCorrente() {
    const t = dizionario[currentLang];
    const labels = { inserimento: t.lbl_INSERIMENTO, nome: t.lbl_NOME, cognome: t.lbl_COGNOME, cibo: t.lbl_CIBO, eta: t.lbl_ETA, tavolo: t.lbl_TAVOLO, attesa: t.lbl_ATTESA, tutti: t.lbl_TUTTI };
    const base = labels[activeOrdine] || t.lbl_COGNOME;
    const totInv = window.totInvitatiCsv || null;
    if (!totInv) return base;
    if (activeOrdine === 'attesa') {
      const nAttesa = calcolaInAttesa().length;
      return base + ' (' + nAttesa + '/' + totInv + ')';
    } else if (activeOrdine === 'tutti') {
      const nTutti = (window.tuttiInvitatiCsvRaw || []).length;
      return base + ' (' + nTutti + ')';
    } else {
      const nRisp = (window.datiInvitati || []).length;
      return base + ' (' + nRisp + '/' + totInv + ')';
    }
  }

  function primoToken(n) { return (n||'').trim().split(/\s+/)[0] || ''; }
  function ultimoToken(n) { const t=(n||'').trim().split(/\s+/); return t[t.length-1]||''; }

  function ordinaInvitati(arr, criterio) {
    const a2z = (a,b) => a.localeCompare(b, 'it', {sensitivity:'base'});
    const cp = v => (v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const arr2 = [...arr];
    if (criterio === 'inserimento') {
      // Ordina per indiceOriginale decrescente (più recente prima)
      arr2.sort((a,b) => (b.indiceOriginale||0) - (a.indiceOriginale||0));
    } else if (criterio === 'nome') {
      arr2.sort((a,b) => a2z(cp(primoToken(a.nome)) + cp(ultimoToken(a.nome)), cp(primoToken(b.nome)) + cp(ultimoToken(b.nome))));
    } else if (criterio === 'cognome') {
      arr2.sort((a,b) => a2z(cp(ultimoToken(a.nome)) + cp(primoToken(a.nome)), cp(ultimoToken(b.nome)) + cp(primoToken(b.nome))));
    } else if (criterio === 'cibo') {
      const ordCibo = {'baby':0,'veg':1,'vegetariano':1,'carne':2,'pesce':3};
      arr2.sort((a,b) => {
        const ca = ordCibo[detectSecondo(a.secondo)] ?? 9;
        const cb = ordCibo[detectSecondo(b.secondo)] ?? 9;
        if (ca !== cb) return ca - cb;
        return a2z(cp(ultimoToken(a.nome)) + cp(primoToken(a.nome)), cp(ultimoToken(b.nome)) + cp(primoToken(b.nome)));
      });
    } else if (criterio === 'tavolo') {
      function normTV(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
      function matchTV(nomeInvitato, personaTavolo) {
        const a = normTV(nomeInvitato).split(/\s+/).filter(Boolean);
        const b = normTV(personaTavolo).split(/\s+/).filter(Boolean);
        return a.every(w=>b.includes(w)) || b.every(w=>a.includes(w));
      }
      function numTavolo(nome) {
        for (let i = 0; i < TAVOLI.length; i++) {
          if (TAVOLI[i].persone.some(p => matchTV(nome, p))) return i;
        }
        return 9999;
      }
      arr2.sort((a,b) => {
        const na = numTavolo(a.nome||''), nb = numTavolo(b.nome||'');
        if (na !== nb) return na - nb;
        return a2z(cp(ultimoToken(a.nome)), cp(ultimoToken(b.nome)));
      });
    } else if (criterio === 'eta') {
      arr2.sort((a,b) => {
        const ea = getEtaAnni(a.nome), eb = getEtaAnni(b.nome);
        // Chi non ha età va in fondo; più vecchio (età maggiore) prima
        if (ea !== null && eb !== null) return eb - ea;
        if (ea !== null) return -1;
        if (eb !== null) return 1;
        return a2z(cp(ultimoToken(a.nome)), cp(ultimoToken(b.nome)));
      });
    }
    return arr2;
  }

  // Raccoglie gli invitati da Invitati.csv che non hanno ancora risposto
  function calcolaInAttesa() {
    if (!window.datiInvitati || !window.totInvitatiCsvRaw) return [];
    const acc = /[\u0300-\u036f]/g;
    function tok(n) { return (n||'').toLowerCase().normalize('NFD').replace(acc,'').trim().split(/\s+/).filter(Boolean); }
    function matchN(a, b) {
      const ta = tok(a), tb = tok(b);
      return ta.every(w=>tb.includes(w)) || tb.every(w=>ta.includes(w));
    }
    // Tutti i nomi del CSV
    const tuttiInvitati = window.tuttiInvitatiCsvRaw || [];
    // Nomi che hanno già risposto
    const hannoRisposto = window.datiInvitati.map(r => r.nome || '');
    // Filtra chi NON ha risposto
    return tuttiInvitati.filter(inv => {
      return !hannoRisposto.some(nr => matchN(inv.nome, nr));
    });
  }

  async function mostraInAttesa() {
    const testi = dizionario[currentLang];
    const inAttesa = calcolaInAttesa();
    const acc = /[\u0300-\u036f]/g;
    const cp2 = v => (v||'').toLowerCase().normalize('NFD').replace(acc,'');

    // Carica Telefoni.txt per i numeri di cellulare
    const mapTelVideo = {};
    try {
      const respT = await fetch('Telefoni.txt?t=' + Date.now());
      if (respT.ok) {
        const txtT = await respT.text();
        console.log('[Telefoni] Primi 500 chars:', JSON.stringify(txtT.slice(0,500)));
        const normV = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
        txtT.split(/\r?\n/).forEach((riga, i) => {
          if (i < 5) console.log('[Telefoni] riga ' + i + ':', JSON.stringify(riga));
          const m = riga.match(/^(.+?)\s{2,}(\S+)$/);
          if (m) {
            const nome = m[1].trim(); const cell = m[2].trim();
            if (cell !== '\u2014' && cell !== '-') {
              mapTelVideo[normV(nome)] = cell;
              const parti = nome.split(/\s+/);
              if (parti.length >= 2) mapTelVideo[normV(parti.slice(1).join(' ') + ' ' + parti[0])] = cell;
            }
          }
        });
        console.log('[Telefoni] Voci mappa:', Object.keys(mapTelVideo).length, '- prime chiavi:', Object.keys(mapTelVideo).slice(0,5));
      } else {
        console.log('[Telefoni] fetch fallito, status:', respT.status);
      }
    } catch(e) { console.log('[Telefoni] errore:', e); }

    function cercaTelVideo(nomeDisplay) {
      const normV = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const k1 = normV(nomeDisplay);
      if (mapTelVideo[k1]) return mapTelVideo[k1];
      const parti = nomeDisplay.trim().split(/\s+/);
      if (parti.length >= 2) {
        const k2 = normV(parti[parti.length-1] + ' ' + parti.slice(0,-1).join(' '));
        if (mapTelVideo[k2]) return mapTelVideo[k2];
        console.log('[Telefoni] nessun match per:', JSON.stringify(nomeDisplay), '-> k1:', k1, '/ k2:', k2);
      }
      return '';
    }
    function formattaNumVideo(raw) {
      const digits = raw.replace(/\D/g,'');
      if (digits.length === 10)
        return digits.slice(0,3) + '-' + digits.slice(3,5) + '.' + digits.slice(5,7) + '.' + digits.slice(7);
      if (digits.length === 12 && digits.startsWith('39')) {
        const loc = digits.slice(2);
        return '+39\u00a0' + loc.slice(0,3) + '-' + loc.slice(3,5) + '.' + loc.slice(5,7) + '.' + loc.slice(7);
      }
      return raw;
    }

    // Ordina per Cognome Nome
    inAttesa.sort((a,b) => {
      const tokA = (a.nome||'').trim().split(/\s+/);
      const tokB = (b.nome||'').trim().split(/\s+/);
      const cogA = cp2(tokA[tokA.length-1]||'') + cp2(tokA[0]||'');
      const cogB = cp2(tokB[tokB.length-1]||'') + cp2(tokB[0]||'');
      return cogA.localeCompare(cogB, 'it', {sensitivity:'base'});
    });

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:4000;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;';

    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:16px;padding:20px 18px 16px;width:92%;max-width:480px;box-shadow:0 8px 30px rgba(0,0,0,0.25);margin-bottom:40px;';

    let html = '<div style="font-family:\'Cormorant Garamond\',serif;font-size:20px;font-weight:700;color:#8a5e1e;margin-bottom:4px;text-align:center;">'
      + testi.titoloAttesa + '</div>';
    html += '<div style="text-align:center;font-family:\'Inter\',sans-serif;font-size:13px;color:#888;margin-bottom:14px;">'
      + inAttesa.length + ' / ' + (window.totInvitatiCsv || '?') + '</div>';

    if (inAttesa.length === 0) {
      html += '<div style="text-align:center;color:#2d6040;font-weight:600;padding:16px 0;">' + testi.msgAttesaVuota + '</div>';
    } else {
      html += '<div style="font-family:\'Inter\',sans-serif;font-size:14px;">';
      inAttesa.forEach((inv, idx) => {
        const tokensNome = (inv.nome||'').trim().split(/\s+/);
        let nomeFmt;
        if (tokensNome.length >= 2) {
          const cognome = tokensNome[tokensNome.length - 1];
          const resto = tokensNome.slice(0, tokensNome.length - 1).join(' ');
          nomeFmt = cognome + ' ' + resto;
        } else {
          nomeFmt = inv.nome || '';
        }
        const eta = getEtaAnni(inv.nome);
        const etaStr = eta !== null ? ' <span style="font-weight:400;color:#888;font-size:13px">('+eta+')</span>' : '';
        const tavNum = trovaTavoloNum(inv.nome || '');
        const bg = idx % 2 === 0 ? '#fafafa' : '#ffffff';
        const cell = cercaTelVideo(inv.nome);
        const cellStr = cell
          ? ' <span style="font-size:12px;color:#1a4fa0;font-weight:500;margin-left:4px;">\ud83d\udcf1\u00a0' + formattaNumVideo(cell) + '</span>'
          : '';
        html += '<div style="padding:7px 10px;border-radius:8px;background:' + bg + ';margin-bottom:3px;display:flex;align-items:center;gap:6px;">'
          + (tavNum ? '<span style="font-size:13px;flex-shrink:0">' + tavNum + '</span>' : '<span style="width:18px;flex-shrink:0"></span>')
          + '<span style="font-weight:600">' + nomeFmt + '</span>' + etaStr + cellStr
          + '</div>';
      });
      html += '</div>';
    }

    box.innerHTML = html;

    const btnChiudi = document.createElement('button');
    btnChiudi.textContent = testi.lblAnnulla;
    btnChiudi.style.cssText = 'display:block;width:100%;margin-top:14px;padding:11px;border-radius:10px;border:none;background:#f0f0f0;font-family:\'Inter\',sans-serif;font-size:13px;font-weight:600;color:#555;cursor:pointer;';
    btnChiudi.onclick = () => document.body.removeChild(overlay);
    box.appendChild(btnChiudi);

    overlay.appendChild(box);
    overlay.onclick = e => { if (e.target === overlay) document.body.removeChild(overlay); };
    document.body.appendChild(overlay);
  }

  function mostraFotoPopup(nomeFile) {
    const foto = window.fotoDisponibili || [];
    let idx = foto.findIndex(f => f && f.file === nomeFile);
    if (idx < 0) idx = foto.findIndex(f => f && f.nome === nomeFile);
    if (idx < 0) idx = 0;

    let playTimer = null;
    const PLAY_INTERVAL = 6000;

    // ── Audio ─────────────────────────────────────────────────────────────
    const audio = new Audio('https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Onofrio.mp3');
    audio.loop = true;

    // ── Helper: dati secondo ──────────────────────────────────────────────
    function infoSecondo(nome) {
      const norm = s => (s||'').trim().toLowerCase().replace(/\s+/g,' ');
      const nn = norm(nome);
      const inv = (window.datiInvitati||[]).find(r => {
        const rn = norm(r.nome);
        return rn===nn || rn.split(' ').reverse().join(' ')===nn;
      });
      if (!inv) return {icona:'',desc:''};
      const tipo = detectSecondo(inv.secondo||'');
      const map = {baby:['🍼','Baby'],carne:['🥩','Carne'],pesce:['🐟','Pesce'],veg:['🌿','Vegetariano']};
      return map[tipo] ? {icona:map[tipo][0],desc:map[tipo][1]} : {icona:'',desc:''};
    }

    // ── CSS iniettato una sola volta ──────────────────────────────────────
    if (!document.getElementById('foto-popup-style')) {
      const st = document.createElement('style');
      st.id = 'foto-popup-style';
      st.textContent = `
        .fp-overlay { position:fixed; inset:0; background:#2d3a0e; z-index:9999; }
        .fp-layout  { position:absolute; inset:0; display:grid; grid-template-columns:1fr; }
        .fp-overlay.landscape .fp-layout { grid-template-columns: minmax(0,1fr) 280px; }
        .fp-stage   { position:relative; min-width:0; min-height:0; overflow:hidden; }
        .fp-img     { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 2s ease; }
        .fp-img.front { opacity:1; }
        .fp-sidebar { display:none; background:#2d3a0e; flex-direction:column; justify-content:center; align-items:center; text-align:center; gap:20px; padding:24px 18px; box-sizing:border-box; }
        .fp-overlay.landscape .fp-sidebar { display:flex; }
        .fp-overlay.landscape .fp-bar,
        .fp-overlay.landscape .fp-close,
        .fp-overlay.landscape [data-arrow] { display:none !important; }
        .fp-bar     { position:absolute; bottom:0; left:0; right:0; z-index:10; background:linear-gradient(transparent,rgba(0,0,0,0.75) 35%); padding:36px 20px 16px; display:flex; flex-direction:column; align-items:center; gap:8px; }
        .fp-info    { font-family:'Inter',sans-serif; font-size:17px; font-weight:600; color:#fff; text-shadow:0 1px 6px rgba(0,0,0,0.8); white-space:nowrap; text-align:center; }
        .fp-btn-play{ background:rgba(255,255,255,0.22); border:none; border-radius:50%; width:34px; height:34px; font-size:15px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .fp-close   { position:absolute; top:12px; right:14px; background:rgba(0,0,0,0.5); border:none; border-radius:50%; width:34px; height:34px; font-size:16px; font-weight:700; cursor:pointer; color:#fff; z-index:11; display:flex; align-items:center; justify-content:center; }
        .fp-arrow   { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.15); border:none; border-radius:50%; width:48px; height:48px; font-size:32px; color:#fff; cursor:pointer; z-index:11; display:flex; align-items:center; justify-content:center; }
        .fp-arrow.left  { left:12px; }
        .fp-arrow.right { right:12px; }
        .fp-side-num  { font-family:'Inter',sans-serif; font-size:54px; font-weight:700; color:#d4b07a; line-height:1; width:100%; }
        .fp-side-name { font-family:'Inter',sans-serif; font-size:42px; font-weight:600; color:#fff; line-height:1.2; word-break:break-word; width:100%; }
        .fp-side-emoji{ font-size:60px; line-height:1; width:100%; }

      document.head.appendChild(st);
    }

    // ── DOM ───────────────────────────────────────────────────────────────
    const overlay = document.createElement('div');
    overlay.className = 'fp-overlay portrait';

    const layout = document.createElement('div');
    layout.className = 'fp-layout';

    // stage (foto)
    const stage = document.createElement('div');
    stage.className = 'fp-stage';
    const imgA = document.createElement('img'); imgA.className = 'fp-img front';
    const imgB = document.createElement('img'); imgB.className = 'fp-img';
    stage.appendChild(imgA); stage.appendChild(imgB);
    let imgFront = imgA, imgBack = imgB;

    // sidebar
    const sidebar = document.createElement('div'); sidebar.className = 'fp-sidebar';
    const sideNum  = document.createElement('div'); sideNum.className  = 'fp-side-num';
    const sideName = document.createElement('div'); sideName.className = 'fp-side-name';
    const sideEmoji= document.createElement('div'); sideEmoji.className= 'fp-side-emoji';
    const sideDesc = document.createElement('div'); sideDesc.className = 'fp-side-desc';
    sidebar.append(sideNum, sideName, sideEmoji, sideDesc);

    layout.appendChild(stage);
    layout.appendChild(sidebar);
    overlay.appendChild(layout);

    // barra inferiore portrait
    const bar = document.createElement('div'); bar.className = 'fp-bar';
    const infoBar = document.createElement('div'); infoBar.className = 'fp-info';
    const btnPlay = document.createElement('button'); btnPlay.className = 'fp-btn-play'; btnPlay.textContent = '▶';
    btnPlay.onclick = e => { e.stopPropagation(); togglePlay(btnPlay); };
    bar.appendChild(infoBar);
    if (foto.length > 1) bar.appendChild(btnPlay);
    overlay.appendChild(bar);

    // chiudi
    const chiudi = document.createElement('button'); chiudi.className = 'fp-close'; chiudi.textContent = '✕';
    chiudi.onclick = () => chiudiPopup();
    overlay.appendChild(chiudi);

    // frecce
    if (foto.length > 1) {
      const bSx = document.createElement('button'); bSx.className = 'fp-arrow left'; bSx.textContent = '‹'; bSx.setAttribute('data-arrow','1');
      bSx.onclick = e => { e.stopPropagation(); stopPlay(false); vai((idx-1+foto.length)%foto.length); };
      const bDx = document.createElement('button'); bDx.className = 'fp-arrow right'; bDx.textContent = '›'; bDx.setAttribute('data-arrow','1');
      bDx.onclick = e => { e.stopPropagation(); stopPlay(false); vai((idx+1)%foto.length); };
      overlay.appendChild(bSx); overlay.appendChild(bDx);
    }

    // ── Aggiorna contenuto ────────────────────────────────────────────────
    function aggiornaContenuto(i, immediato) {
      const voce = foto[i] || { nome: nomeFile, file: null };
      const src = voce.file ? 'Foto/'+voce.file : 'Foto/Foto.png';
      const {icona,desc} = infoSecondo(voce.nome);
      const eta = getEtaAnni(voce.nome);
      infoBar.textContent = (i+1)+' / '+foto.length+' \u2013 '+voce.nome+(icona?'  '+icona:'');
      sideNum.textContent  = (i+1)+' / '+foto.length;
      sideName.textContent = voce.nome+(eta!==null?' ('+eta+')':'');
      sideEmoji.textContent = icona;
      sideDesc.textContent  = desc;
      if (immediato) { imgFront.src=src; return; }
      const preload = new Image();
      preload.onload = () => {
        imgBack.src = src;
        imgBack.classList.remove('front');
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          imgBack.classList.add('front');
          imgFront.classList.remove('front');
          setTimeout(()=>{ [imgFront,imgBack]=[imgBack,imgFront]; }, 2000);
        }));
      };
      preload.src = src;
    }

    function vai(i) { idx=i; aggiornaContenuto(idx,false); }

    // ── Play / Pausa ──────────────────────────────────────────────────────
    function playing() { return playTimer!==null; }
    function startPlay(btn) {
      playTimer = setInterval(()=>{ idx=(idx+1)%foto.length; aggiornaContenuto(idx,false); }, PLAY_INTERVAL);
      if (btn) { btn.textContent='⏸'; btn.setAttribute('data-play','1'); }
      audio.play().catch(()=>{});
    }
    function stopPlay(reset) {
      if (playTimer) { clearInterval(playTimer); playTimer=null; }
      const btn = overlay.querySelector('[data-play]');
      if (btn) { btn.textContent='▶'; btn.removeAttribute('data-play'); }
      audio.pause(); if (reset) audio.currentTime=0;
    }
    function togglePlay(btn) {
      if (playing()) { stopPlay(false); } else { startPlay(btn); }
    }

    // ── Orientamento ──────────────────────────────────────────────────────
    function aggiornaOrientamento() {
      const landscape = window.innerWidth > window.innerHeight;
      overlay.classList.toggle('landscape', landscape);
      overlay.classList.toggle('portrait', !landscape);
    }
    window.addEventListener('resize', aggiornaOrientamento);
    aggiornaOrientamento();

    // ── Tastiera ──────────────────────────────────────────────────────────
    function onKey(e) {
      if (e.key==='ArrowRight') { stopPlay(false); vai((idx+1)%foto.length); }
      if (e.key==='ArrowLeft')  { stopPlay(false); vai((idx-1+foto.length)%foto.length); }
      if (e.key===' ')          { e.preventDefault(); togglePlay(btnPlay); }
      if (e.key==='Escape')     { chiudiPopup(); }
    }
    document.addEventListener('keydown', onKey);

    // ── Swipe touch ───────────────────────────────────────────────────────
    let touchStartX=0;
    overlay.addEventListener('touchstart', e=>{ touchStartX=e.changedTouches[0].clientX; }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      const dx=e.changedTouches[0].clientX-touchStartX;
      if (Math.abs(dx)<40) return;
      stopPlay(false);
      if (dx<0) vai((idx+1)%foto.length); else vai((idx-1+foto.length)%foto.length);
    }, {passive:true});

    // ── Chiusura ──────────────────────────────────────────────────────────
    function chiudiPopup() {
      stopPlay(true);
      document.removeEventListener('keydown', onKey);
      window.removeEventListener('resize', aggiornaOrientamento);
      document.body.removeChild(overlay);
    }
    overlay.onclick = e=>{ if (e.target===overlay || e.target===stage || e.target===layout) chiudiPopup(); };

    // ── Prima visualizzazione ─────────────────────────────────────────────
    aggiornaContenuto(idx, true);
    document.body.appendChild(overlay);
  }

  function scaricaBackupCSV() {
    if (!window.datiInvitati || window.datiInvitati.length === 0) {
      alert('Nessun dato da salvare.');
      return;
    }
    // Intestazione colonne
    const colonne = ['Nome', 'Presenza', 'Secondo', 'Allergie', 'Note', 'Data'];
    const righe = [colonne.join(';')];

    window.datiInvitati.forEach(r => {
      const cella = v => '"' + String(v || '').replace(/"/g, '""') + '"';
      righe.push([
        cella(r.nome),
        cella(r.presenza),
        cella(r.secondo),
        cella(r.allergie),
        cella(r.note),
        cella(r.data)
      ].join(';'));
    });

    const csv = '\uFEFF' + righe.join('\r\n'); // BOM per Excel italiano
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const _d = new Date(), _p = n => String(n).padStart(2,'0');
    const ts = _d.getFullYear()+'-'+_p(_d.getMonth()+1)+'-'+_p(_d.getDate())+'-'+_p(_d.getHours())+'-'+_p(_d.getMinutes())+'-'+_p(_d.getSeconds());
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Matrimonio-' + ts + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
