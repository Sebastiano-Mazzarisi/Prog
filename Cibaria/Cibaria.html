<body style="text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px;">
    <h2 id="titolo">Lunedì 23 marzo</h2>
    <img id="menuImg" src="Cibaria.jpg?v=2026-03-23" alt="Menu del Giorno" style="max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2);">
<script>
// Aggiornamento silenzioso ogni 10 secondi: legge Cibaria.txt,
// se la firma (data+orario) è cambiata aggiorna solo immagine e titolo
(function() {
  var INTERVALLO = 10000;
  var firma = "2026-03-23\n08-42";
  var GIORNI = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  var MESI = ['','gennaio','febbraio','marzo','aprile','maggio','giugno',
              'luglio','agosto','settembre','ottobre','novembre','dicembre'];
  function isoToIt(iso) {
    var p = iso.split('-');
    var d = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
    var giorno = GIORNI[d.getDay()];
    giorno = giorno.charAt(0).toUpperCase() + giorno.slice(1);
    return giorno + ' ' + parseInt(p[2],10) + ' ' + MESI[parseInt(p[1],10)];
  }
  function controlla() {
    fetch('Cibaria.txt?v=' + Date.now(), {cache:'no-store'})
      .then(function(r) { return r.text(); })
      .then(function(testo) {
        testo = testo.trim();
        if (testo !== firma) {
          firma = testo;
          var righe = testo.split('\n');
          var nuovaIso = righe[0] ? righe[0].trim() : '';
          if (nuovaIso) {
            document.getElementById('titolo').textContent = isoToIt(nuovaIso);
            document.getElementById('menuImg').src = 'Cibaria.jpg?v=' + Date.now();
          }
        }
      })
      .catch(function() {})
      .finally(function() { setTimeout(controlla, INTERVALLO); });
  }
  setTimeout(controlla, INTERVALLO);
})();
</script>
