
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PodPutignano</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2980b9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PodPutignano">
  <!-- Icone PWA e favicon -->
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <!-- Open Graph per WhatsApp, Telegram, social -->
  <meta property="og:title" content="PodPutignano">
  <meta property="og:description" content="Il podcast quotidiano di Putignano — notizie, meteo e curiosità aggiornati ogni 30 minuti">
  <meta property="og:image" content="https://sebastiano-mazzarisi.github.io/Prog/Pod/icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url" content="https://sebastiano-mazzarisi.github.io/Prog/Pod/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="it_IT">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #d0eaf8 0%, #a8d4f0 40%, #7ab8e0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 40px 32px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(41,128,185,0.18), 0 2px 8px rgba(0,0,0,0.08);
    }

    .icon-wrap {
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #5dade2, #2980b9);
      border-radius: 26px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(41,128,185,0.35);
    }
    .icon-wrap svg { width: 52px; height: 52px; fill: white; }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a5276;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .data-oggi {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a5276;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #5d8aa8;
      font-weight: 300;
      margin-bottom: 28px;
    }

    #stato {
      font-size: 0.88rem;
      color: #2e86c1;
      min-height: 20px;
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* ── Bottone PLAY ── */
    .btn-play {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #5dade2, #2980b9);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 16px rgba(41,128,185,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-play:active { transform: scale(0.97); }
    .btn-play svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

    /* ── Bottoni secondari ── */
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: #2980b9;
      border: 2px solid #a8d4f0;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      width: 100%;
      margin-top: 12px;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-secondary:hover { background: rgba(41,128,185,0.07); border-color: #5dade2; }
    .btn-secondary svg { width: 16px; height: 16px; fill: #2980b9; flex-shrink: 0; }

    /* ── Progress bar ── */
    .progress-wrap { display: none; margin-top: 24px; }
    .progress-bar-bg {
      background: #d6eaf8;
      border-radius: 10px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #5dade2, #2980b9);
      border-radius: 10px;
      width: 0%;
      transition: width 0.2s;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #5d8aa8;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid rgba(41,128,185,0.12);
      margin: 24px 0 20px;
    }

    /* ── Info pills ── */
    .info-row { display: flex; justify-content: center; gap: 20px; }
    .info-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #7fb3d3;
    }
    .info-pill svg { width: 13px; height: 13px; fill: #7fb3d3; }



    /* ── Pannello testo (modalità fullscreen) ── */
    .testo-panel {
      display: none;
    }

    /* Overlay fullscreen attivo */
    body.testo-open {
      overflow: hidden;
    }
    .testo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.97);
      z-index: 1000;
      flex-direction: column;
      padding: 0;
    }
    .testo-overlay.aperto {
      display: flex;
    }
    .testo-overlay-header {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #5dade2, #2980b9);
      transition: background 0.4s ease;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(41,128,185,0.2);
      flex-shrink: 0;
    }
    .btn-nascondi {
      background: white;
      color: #2980b9;
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .btn-nascondi svg { width: 16px; height: 16px; fill: #2980b9; }
    .testo-overlay-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px 40px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      font-size: 0.95rem;
      color: #1a3a4a;
      line-height: 1.85;
    }
    /* Titolo-sezione dentro l'overlay */
    .testo-overlay-body .sezione {
      display: block;
      margin: 22px 0 8px;
      padding: 6px 14px;
      background: linear-gradient(90deg, #2980b9 0%, #5dade2 100%);
      color: white;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 6px;
    }
    .testo-overlay-body .sezione:first-child { margin-top: 4px; }
    .testo-overlay-body .sezione-allerta {
      display: block;
      margin: 22px 0 8px;
      padding: 6px 14px;
      background: linear-gradient(90deg, #e67e22 0%, #f39c12 100%);
      color: white;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 6px;
    }
    .testo-overlay-body .sezione-allerta:first-child { margin-top: 4px; }
    /* Paragrafi notizie: maggiore distanza tra una notizia e l'altra */
    .testo-overlay-body .para {
      display: block;
      margin-bottom: 14px;
      line-height: 1.95;
    }
    .testo-overlay-body .para {
      display: block;
      margin-bottom: 10px;
      color: #1a3a4a;
    }

    /* stili sezioni ora in .testo-overlay-body */

    audio { display: none; }
    /* Sfondo allerta — viene applicato via JS quando Lettura.txt contiene allerta */
    body.allerta-rosso {
      background: linear-gradient(160deg, #fde8e8 0%, #f5b7b1 40%, #e57373 100%) !important;
    }
    body.allerta-arancione {
      background: linear-gradient(160deg, #fef3e2 0%, #fad7a0 40%, #f0a500 100%) !important;
    }
    /* Barra header overlay allerta */
    body.allerta-rosso .testo-overlay-header {
      background: linear-gradient(135deg, #e74c3c, #c0392b) !important;
    }
    body.allerta-arancione .testo-overlay-header {
      background: linear-gradient(135deg, #f39c12, #e67e22) !important;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0012 6.08V19h-3v2h8v-2h-3v-1.92A7 7 0 0019 11h-2z"/></svg>
  </div>

  <h1>PodPutignano</h1>
  <div class="data-oggi" id="dataOggi"></div>
  <p class="subtitle">Il podcast quotidiano di Putignano</p>

  <div id="stato">Caricamento in corso…</div>

  <!-- PLAY -->
  <button class="btn-play" id="btnPlay" onclick="togglePlay()">
    <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <span id="labelPlay">Ascolta ora</span>
  </button>

  <!-- SCARICA -->
  <a class="btn-secondary" href="PodPutignano.mp3" download="PodPutignano.mp3">
    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-7 9H5v2h14v-2h-7z"/></svg>
    Scarica MP3
  </a>

  <!-- LEGGI TESTO -->
  <button class="btn-secondary" onclick="apriTesto()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    Leggi il testo
  </button>

  <!-- PROGRESS BAR -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg" id="progressBg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">--:--</span>
    </div>
  </div>




  <hr class="divider">

  <div class="info-row">
    <span class="info-pill">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      Aggiornato ogni 30 min
    </span>
    <span class="info-pill">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
      Putignano
    </span>
  </div>
</div>

<audio id="player" preload="metadata"></audio>

<!-- OVERLAY TESTO FULLSCREEN -->
<div class="testo-overlay" id="testoOverlay">
  <div class="testo-overlay-header">
    <button class="btn-nascondi" onclick="chiudiTesto()">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      Nascondi testo
    </button>
  </div>
  <div class="testo-overlay-body" id="testoBody"></div>
</div>

<script>
  const player    = document.getElementById('player');

  // Data di oggi in formato GG/MM/AAAA
  (function() {
    const oggi = new Date();
    const gg   = String(oggi.getDate()).padStart(2, '0');
    const mm   = String(oggi.getMonth() + 1).padStart(2, '0');
    const aaaa = oggi.getFullYear();
    document.getElementById('dataOggi').textContent = gg + '/' + mm + '/' + aaaa;
  })();
  const btnPlay   = document.getElementById('btnPlay');
  const iconPlay  = document.getElementById('iconPlay');
  const labelPlay = document.getElementById('labelPlay');
  const stato     = document.getElementById('stato');
  const progressWrap = document.getElementById('progressWrap');
  const progressBg   = document.getElementById('progressBg');
  const progressBar  = document.getElementById('progressBar');
  const timeCurrent  = document.getElementById('timeCurrent');
  const timeDuration = document.getElementById('timeDuration');

  const ICONS = {
    play:  '<path d="M8 5v14l11-7z"/>',
    pause: '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>',
    spin:  '<path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>'
  };

  function fmt(s) {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + String(sec).padStart(2,'0');
  }

  // Cache-busting MP3
  const ts = Date.now();
  const MP3_URL = `PodPutignano.mp3?v=${ts}`;
  player.src = MP3_URL;

  async function checkMP3() {
    try {
      const r = await fetch(MP3_URL, { method:'HEAD', cache:'no-store' });
      if (r.ok) {
        const lm = r.headers.get('last-modified');
        if (lm) {
          const d   = new Date(lm);
          const ora = d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Rome' });
          stato.textContent = `Notizie aggiornate alle ore ${ora}`;
        } else {
          stato.textContent = 'Puntata disponibile';
        }
      } else {
        stato.textContent = 'Puntata non ancora disponibile';
        btnPlay.disabled = true;
        btnPlay.style.opacity = '0.5';
      }
    } catch { stato.textContent = 'Verifica connessione'; }
  }
  checkMP3();

  // ── PLAYER ────────────────────────────────────────────────
  function togglePlay() {
    if (player.paused) {
      iconPlay.innerHTML = ICONS.spin;
      labelPlay.textContent = 'Caricamento…';
      player.play().catch(() => {
        stato.textContent = 'Errore riproduzione';
        iconPlay.innerHTML = ICONS.play;
        labelPlay.textContent = 'Ascolta ora';
      });
    } else {
      player.pause();
    }
  }

  player.addEventListener('playing', () => {
    iconPlay.innerHTML = ICONS.pause;
    labelPlay.textContent = 'Pausa';
    progressWrap.style.display = 'block';
  });
  player.addEventListener('pause', () => {
    iconPlay.innerHTML = ICONS.play;
    labelPlay.textContent = 'Riprendi';
  });
  player.addEventListener('ended', () => {
    iconPlay.innerHTML = ICONS.play;
    labelPlay.textContent = 'Ascolta ora';
    progressBar.style.width = '0%';
    timeCurrent.textContent = '0:00';
  });
  player.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = fmt(player.duration);
  });
  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    progressBar.style.width = (player.currentTime / player.duration * 100) + '%';
    timeCurrent.textContent = fmt(player.currentTime);
  });

  // Click sulla barra per saltare
  progressBg.addEventListener('click', e => {
    if (!player.duration) return;
    const rect = progressBg.getBoundingClientRect();
    player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
  });

  // ── LEGGI TESTO ───────────────────────────────────────────

  // Parole chiave che identificano un titolo-sezione in Lettura.txt
  const TITOLI_RE = /^(BUONGIORNO PUTIGNANO|PROTEZIONE CIVILE|METEO|FARMAC|NOTIZIE DALL'ITALIA E DAL MONDO|NOTIZIE DA PUTIGNANO|CURIOSIT|A RISENTIRCI)/i;

  function applicaSfondoAllerta(raw) {
    document.body.classList.remove('allerta-rosso', 'allerta-arancione');
    if (/PROTEZIONE CIVILE.*ALLERTA ROSSA/i.test(raw)) {
      document.body.classList.add('allerta-rosso');
    } else if (/PROTEZIONE CIVILE.*ALLERTA ARANCIONE/i.test(raw)) {
      document.body.classList.add('allerta-arancione');
    }
  }

  function formattaTesto(raw) {
    // Rimuove marker [T] [F] [M] e spazi residui su riga
    const righe = raw
      .split('\n')
      .map(r => r.replace(/\[TX\]|\[T\]|\[F\]|\[M\]/g, '').trim());

    let html = '';
    let bufPara = '';

    function flushPara() {
      if (bufPara.trim()) {
        html += `<span class="para">${bufPara.trim()}</span>`;
        bufPara = '';
      }
    }

    for (const riga of righe) {
      if (!riga) continue;
      if (TITOLI_RE.test(riga)) {
        flushPara();
        const cls = /PROTEZIONE CIVILE/i.test(riga) ? 'sezione-allerta' : 'sezione';
        html += `<span class="${cls}">${riga}</span>`;
      } else {
        bufPara += (bufPara ? ' ' : '') + riga;
        // Vai a capo se la riga termina con punto
        if (/[.!?]$/.test(riga)) {
          flushPara();
        }
      }
    }
    flushPara();
    return html;
  }


  const testoOverlay = document.getElementById('testoOverlay');
  const testoBody    = document.getElementById('testoBody');
  let   caricato     = false;

  // Legge l'ora direttamente dal testo del podcast (più affidabile di last-modified)
  function aggiornaOra(raw) {
    const m = raw.match(/Sono le (\d+) e (\d{2})|Sono le (\d+) in punto/);
    if (m) {
      const h   = m[1] || m[3];
      const min = m[2] ? ':' + m[2] : ':00';
      stato.textContent = 'Notizie aggiornate alle ore ' + h + min;
    }
  }

  async function apriTesto() {
    testoOverlay.classList.add('aperto');
    document.body.classList.add('testo-open');
    if (!caricato) {
      testoBody.innerHTML = '<span style="color:#5d8aa8;padding:20px;display:block">Caricamento…</span>';
      try {
        const url = 'Lettura.txt?v=' + Date.now();
        const r   = await fetch(url, { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const raw = await r.text();
        if (!raw || raw.trim().length < 10) throw new Error('Vuoto');
        testoBody.innerHTML = formattaTesto(raw);
        // Applica sfondo allerta se presente nel testo
        applicaSfondoAllerta(raw);
        aggiornaOra(raw);
        caricato = true;
      } catch(e) {
        testoBody.innerHTML = '<span style="color:#c0392b;padding:20px;display:block">Testo non disponibile (' + e.message + '). Riprova tra qualche minuto.</span>';
      }
    }
  }

  function chiudiTesto() {
    testoOverlay.classList.remove('aperto');
    document.body.classList.remove('testo-open');
  }

  // Fetch silenzioso di Lettura.txt al caricamento — per applicare sfondo allerta
  // senza dover aprire il pannello testo
  (async function fetchSilenzioso() {
    try {
      const url = 'Lettura.txt?v=' + Date.now();
      const r   = await fetch(url, { cache: 'no-store' });
      if (!r.ok) return;
      const raw = await r.text();
      if (!raw || raw.trim().length < 10) return;
      applicaSfondoAllerta(raw);
      aggiornaOra(raw);
    } catch(e) { /* silenzioso */ }
  })();

  // Service Worker PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
