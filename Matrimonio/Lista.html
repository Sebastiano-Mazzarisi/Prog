<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Sposi – Giulia & Onofrio</title>
<link rel="apple-touch-icon" href="Lista.png">
<link rel="icon" type="image/png" href="Lista.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lista Sposi">
<meta name="mobile-web-app-capable" content="yes">
<meta property="og:title" content="Matrimonio Giulia &amp; Onofrio – Lista Sposi">
<meta property="og:description" content="Pannello per monitorare le conferme e le preferenze degli ospiti.">
<meta property="og:image" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Lista.png">
<meta property="og:image:width" content="180">
<meta property="og:image:height" content="180">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Lista.html">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #1a1008;
    --text-light: #5a4a35;
    --border: #7a5c3a;
    --green: #2d6040;
    --green-light: #dff0e6;
    --red: #a83230;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd; /* Verde oliva chiaro */
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 40px; }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 700;
  }

  /* CARD */
  .card {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 20px rgba(44,36,24,0.05);
    transition: box-shadow 0.2s;
  }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(160,124,69,0.3);
  }
  .btn-submit:hover  { opacity: 0.92; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  /* PANNELLO SPOSI */
  .sposi-kpi {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi-box {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
    text-align: center;
  }
  .kpi-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 400;
    color: var(--gold-dark);
    line-height: 1;
  }
  .kpi-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* Card per ogni risposta */
  .risposta-card {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .risposta-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .risposta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 5px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(224,212,192,0.4);
  }
  .risposta-row:last-child { border-bottom: none; }
  .risposta-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    min-width: 90px;
    padding-top: 1px;
  }
  .risposta-val {
    color: var(--text);
    text-align: right;
    flex: 1;
    font-weight: 400;
  }
  .risposta-val.allergia { color: #a83230; font-weight: 500; }
  .risposta-data {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 8px;
    text-align: right;
  }
  .badge-veg {
    background: #dff0e6;
    color: #2d6040;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-carne {
    background: rgba(201,169,110,0.15);
    color: var(--gold-dark);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div id="sposi-section">
<div class="page-wrapper">
  <div class="header">
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>Pannello Sposi</h1>
    <div class="subtitle">Giulia &amp; Onofrio</div>
  </div>
  <div class="card">
    <div id="sposi-table"><p style="text-align:center;padding:20px">Caricamento...</p></div>
    <button class="btn-submit" onclick="caricaRisposte()" style="margin-top:16px">↻ Aggiorna</button>
  </div>
</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfKImnIRNz0d-01K4KYomyAKpy_oiVZZtcnhPdf-8sKb0ZZSHymdb4UNV7LFNDOG-P3w/exec';

  window.addEventListener('DOMContentLoaded', () => {
    caricaRisposte();
  });

  function caricaRisposte() {
    const box = document.getElementById('sposi-table');
    box.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px">Caricamento...</p>';
    fetch(SCRIPT_URL + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (!data.ok || data.rows.length === 0) {
          box.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-light)">Nessuna risposta ancora.</p>';
          return;
        }
        let totPersone = 0, totVeg = 0, totCarne = 0;
        data.rows.forEach(r => {
          totPersone += parseInt(r.persone) || 0;
          if (r.secondo === 'Vegetariano') totVeg++;
          else if (r.secondo === 'Carne') totCarne++;
        });

        let html = `<div class="sposi-kpi">
          <div class="kpi-box"><div class="kpi-num">${data.rows.length}</div><div class="kpi-label">Risposte</div></div>
          <div class="kpi-box"><div class="kpi-num">${totPersone}</div><div class="kpi-label">Persone</div></div>
          <div class="kpi-box"><div class="kpi-num">${totVeg}</div><div class="kpi-label">Vegetariani</div></div>
          <div class="kpi-box"><div class="kpi-num">${totCarne}</div><div class="kpi-label">Carne</div></div>
        </div>`;

        data.rows.forEach((r, i) => {
          const riga = i + 2; 
          const badgeSecondo = r.secondo === 'Vegetariano'
            ? `<span class="badge-veg">🌿 Vegetariano</span>`
            : `<span class="badge-carne">🥩 Carne</span>`;
          const allergie = r.allergie
            ? `<span class="risposta-val allergia">${r.allergie}</span>`
            : `<span class="risposta-val" style="color:#aaa">Nessuna</span>`;
          const note = r.note
            ? `<span class="risposta-val">${r.note}</span>`
            : `<span class="risposta-val" style="color:#aaa">—</span>`;

          html += `<div class="risposta-card" id="card-${riga}">
            <div class="risposta-nome">${r.nome}
              <button onclick="eliminaRiga(${riga})" style="float:right;background:none;border:1px solid #c0504d;color:#c0504d;border-radius:6px;padding:2px 10px;font-size:11px;cursor:pointer;margin-top:2px">✕ Elimina</button>
            </div>
            <div class="risposta-row">
              <span class="risposta-label">Persone</span>
              <span class="risposta-val">${r.persone}</span>
            </div>
            <div class="risposta-row">
              <span class="risposta-label">Secondo</span>
              <span class="risposta-val">${badgeSecondo}</span>
            </div>
            <div class="risposta-row">
              <span class="risposta-label">Allergie</span>
              ${allergie}
            </div>
            <div class="risposta-row">
              <span class="risposta-label">Note</span>
              ${note}
            </div>
            <div class="risposta-data">${r.data}</div>
          </div>`;
        });

        box.innerHTML = html;
      })
      .catch(() => {
        box.innerHTML = '<p style="color:red;text-align:center;padding:20px">Errore nel caricamento.</p>';
      });
  }

  function eliminaRiga(riga) {
    if (!confirm('Eliminare questa scheda?')) return;
    const card = document.getElementById('card-' + riga);
    if (card) card.style.opacity = '0.4';
    fetch(SCRIPT_URL + '?elimina=' + riga + '&t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          setTimeout(() => caricaRisposte(), 500);
        } else {
          alert('Errore nella cancellazione.');
          if (card) card.style.opacity = '1';
        }
      })
      .catch(() => {
        alert('Errore di rete.');
        if (card) card.style.opacity = '1';
      });
  }
</script>
</body>
</html>
