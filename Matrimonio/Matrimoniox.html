<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #000000;
    --border: #7a5c3a;
    --green: #2d6040;
    --green-light: #dff0e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .header { text-align: center; margin-bottom: 16px; }

  .lang-switcher {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #000000;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .lang-btn:hover { background: rgba(184, 137, 58, 0.08); }
  .lang-btn.active-lang {
    background: var(--gold);
    color: #000000;
    border-color: var(--gold);
    font-weight: 600;
  }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .header .description {
    font-size: 14.5px;
    color: #000000;
    line-height: 1.3;
    max-width: 380px;
    margin: 0 auto;
  }

  .hero-container {
    width: 100%;
    max-width: 460px;
    margin: 0 auto 18px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 16px rgba(44,36,24,0.06);
    overflow: hidden;
    background: var(--warm-white);
  }

  .hero-container img {
    width: 100%;
    height: 140px;
    display: block;
    object-fit: cover;
    object-position: center 30%;
  }

  .card-memo {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(44,36,24,0.06);
    padding: 22px 20px;
    margin-bottom: 16px;
    margin-left: auto;
    margin-right: auto;
    max-width: 460px;
    text-align: center;
  }

  .card-memo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--gold-dark);
    margin-bottom: 8px;
  }

  .card-memo-text {
    font-size: 16px;
    color: #000000;
    line-height: 1.5;
    font-weight: 400;
  }

  .info-card {
    text-align: left;
  }

  .info-card {
    font-size: 16px;
    font-weight: 400;
    color: #000000;
    line-height: 1.5;
    text-align: center;
  }

  .info-card p { margin: 0 0 3px; }

  .info-card a {
    color: var(--gold-dark);
    word-break: break-all;
  }

  .info-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--gold-dark);
    display: block;
    margin-bottom: 8px;
  }

  .info-card .card-memo-title {
    text-align: center;
    margin-bottom: 10px;
  }

  .btn-info {
    display: block;
    width: 100%;
    margin: 14px auto 0;
    padding: 12px 0;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dark);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  .btn-info:hover { background: rgba(184,137,58,0.10); color: var(--gold); }
  .btn-info:active { transform: translateY(1px); }

  .iban-clickable-box {
    background: var(--cream);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    user-select: none;
  }

  .iban-clickable-box:hover {
    background: rgba(184, 137, 58, 0.12);
    border-color: var(--gold);
    transform: translateY(-1px);
  }
  .iban-clickable-box:active { transform: translateY(0); }

  .iban-holder {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 16px;
    letter-spacing: 0.3px;
  }

  .iban-preview {
    font-size: 14px;
    letter-spacing: 1px;
    font-weight: 500;
    color: var(--gold-dark);
  }

  .click-hint {
    font-size: 12px;
    margin-top: 8px;
    color: #000000;
    letter-spacing: 0.5px;
  }

  .custom-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    padding: 18px;
  }
  .custom-overlay.visible { display: flex; }

  .custom-box {
    background: var(--warm-white);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 32px 24px 24px;
    box-shadow: 0 8px 40px rgba(44,36,24,0.25);
    max-width: 480px;
    width: 92%;
    max-height: 84vh;
    overflow-y: auto;
    animation: popupIn 0.2s ease;
    position: relative;
    text-align: left;
  }

  @keyframes popupIn {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--gold-dark);
    line-height: 1;
    padding: 4px;
  }

  .popup-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold-dark);
    margin-bottom: 16px;
    text-align: center;
  }

  .iban-full-display {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 14.5px;
    line-height: 1.6;
    color: #000;
    margin-bottom: 12px;
  }
  .iban-full-display p { margin-bottom: 0; padding: 8px 0; }
  .iban-full-display p:first-child { padding-top: 0; }
  .iban-full-display p:last-child { padding-bottom: 0; }
  .iban-full-display strong { color: var(--gold-dark); font-weight: 600; }
  .iban-full-display hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    opacity: 0.4;
    margin: 2px 0;
  }

  .iban-row-value {
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    color: #000000;
    padding: 2px 0px;
    display: inline-block;
    word-break: break-all;
    margin-top: 2px;
  }

  .btn-copy-iban {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--green-light);
    color: #000000;
    border: 1.5px solid var(--green);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
    margin-top: 14px;
  }
  .btn-copy-iban:hover { opacity: 0.92; }
  .btn-copy-iban:active { transform: translateY(1px); }

  .copy-status {
    font-size: 14px;
    color: var(--green);
    font-weight: 600;
    min-height: 20px;
    margin-top: 8px;
    text-align: center;
  }

  .fallback-note {
    font-size: 13px;
    opacity: 0.75;
    margin-top: 10px;
    text-align: center;
  }
</style>
</head>

<script>
  let currentLanguage = 'it';
  const IBAN_PULITO = 'IT80I0366901600533058528402';


  const INFO_IT = `*Sposi:*

http://barsentum.it`;

  const translations = {
    it: {
      mainTitle: 'Matrimonio',
      mainDesc: 'DOMENICA 21 GIUGNO 2026',
      infoTitle: 'Informazioni',
      infoTesto: INFO_IT,
      giftTitle: 'Pensiero per gli Sposi',
      giftText: 'Se desiderate dedicarci un pensiero speciale,<br>potete cliccare qui sotto:',
      clickHint: 'Clicca qui per visualizzare e copiare i dati completi',
      ibanPopupTitle: 'Dettagli per il Versamento',
      btnCopyAction: 'Copia IBAN',
      copiedMsg: 'IBAN copiato negli appunti!',
      labelsBanca: {
        beneficiario: 'Beneficiario',
        iban: 'IBAN',
        bic: 'Codice BIC/SWIFT',
        banca: 'Nome e sede della banca',
        corrispondente: 'BIC banca corrispondente'
      }
    },
    es: {
      mainTitle: 'Boda',
      mainDesc: 'DOMINGO 21 JUNIO 2026',
      infoTitle: 'Información',
      infoTesto: INFO_ES,
      giftTitle: 'Regalo para los Novios',
      giftText: 'Si deseáis tener un detalle especial con nosotros,<br>podéis hacer clic abajo:',
      clickHint: 'Haz clic aquí para ver y copiar los datos completos',
      ibanPopupTitle: 'Detalles para la Transferencia',
      btnCopyAction: 'Copiar IBAN',
      copiedMsg: '¡IBAN copiado al portapapeles!',
      labelsBanca: {
        beneficiario: 'Beneficiario',
        iban: 'IBAN',
        bic: 'Código BIC/SWIFT',
        banca: 'Nombre y sede del banco',
        corrispondente: 'BIC banco correspondiente'
      }
    }
  };

  window.addEventListener('DOMContentLoaded', () => {
    setLanguage('it');
  });

  function setLanguage(lang) {
    currentLanguage = lang;

    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active-lang'));
    document.getElementById('lang-' + lang).classList.add('active-lang');

    const t = translations[lang];
    renderInfoCards(t.infoTesto, t.lang);
    document.getElementById('gift-title').textContent = t.giftTitle;
    document.getElementById('gift-text').innerHTML = t.giftText;
    document.getElementById('click-hint').textContent = t.clickHint;
    document.getElementById('iban-popup-title').textContent = t.ibanPopupTitle;
    document.getElementById('btn-copy-action').textContent = t.btnCopyAction;

    const lb = t.labelsBanca;
    document.getElementById('iban-display-box').innerHTML = `
      <p><strong>${lb.beneficiario}:</strong><br><span class="iban-row-value">Onofrio Mazzarisi &amp; Giulia Perez</span></p>
      <hr>
      <p><strong>${lb.iban}:</strong><br><span class="iban-row-value" style="letter-spacing:0.5px;">IT80 I036 6901 6005 3305 8528 402</span></p>
      <hr>
      <p><strong>${lb.bic}:</strong><br><span class="iban-row-value">REVOITM2</span></p>
      <hr>
      <p><strong>${lb.banca}:</strong><br><span class="iban-row-value">Revolut Bank UAB<br>Via Dante 7, 20123, Milano (MI), Italy</span></p>
      <hr>
      <p><strong>${lb.corrispondente}:</strong><br><span class="iban-row-value">CHASDEFX</span></p>
    `;

  }

  function renderInfoCards(testo, lang) {
    const righe = testo.split('\n');
    const sezioni = [];
    let corrente = [];
    for (const riga of righe) {
      if (riga.trim() === '' && corrente.length > 0) {
        sezioni.push(corrente.join('\n'));
        corrente = [];
      } else {
        corrente.push(riga);
      }
    }
    if (corrente.length > 0) sezioni.push(corrente.join('\n'));

    const ids = ['card-sposi', 'card-cerimonia', 'card-cena'];
    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      if (!el) return;
      const testo = sezioni[i] || '';
      el.innerHTML = formattaInfo(testo);
    });
  }

  function formattaInfo(testo) {
    function applyInline(s) {
      s = s.replace(/\*([^*]+)\*/g, '<span class="info-label">$1</span>');
      s = s.replace(/_([^_]+)_/g, '$1');
      return s;
    }
    return testo.split('\n').map(riga => {
      const r = riga.trimEnd();
      if (!r) return '';
      if (/^https?:\/\//i.test(r.trim())) {
        const safeUrl = r.trim().replace(/"/g, '&quot;');
        return '<p><a href="' + safeUrl + '" target="_blank" rel="noopener">' + safeUrl + '</a></p>';
      }
      return '<p>' + applyInline(r) + '</p>';
    }).join('');
  }

  function apriIbanPopup() {
    document.getElementById('copy-status').textContent = '';
    document.getElementById('iban-overlay').classList.add('visible');
  }

  function chiudiIbanPopupFuga() {
    document.getElementById('iban-overlay').classList.remove('visible');
  }

  function chiudiIbanPopup(e) {
    if (e.target === document.getElementById('iban-overlay')) {
      chiudiIbanPopupFuga();
    }
  }

  function copiaIbanSolo() {
    const btn = document.getElementById('btn-copy-action');
    navigator.clipboard.writeText(IBAN_PULITO).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'COPIATO!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {
      alert(IBAN_PULITO);
    });
  }
