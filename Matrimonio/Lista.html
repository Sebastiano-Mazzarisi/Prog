<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Invitati – Giulia &amp; Onofrio</title>
<link rel="apple-touch-icon" href="Lista.png">
<link rel="icon" type="image/png" href="Lista.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lista Invitati">
<meta name="mobile-web-app-capable" content="yes">
<meta property="og:title" content="Lista Invitati – Giulia &amp; Onofrio">
<meta property="og:description" content="Lista Invitati">
<meta property="og:image" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Lista.png">
<meta property="og:image:width" content="180">
<meta property="og:image:height" content="180">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Lista.html">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #000000;
    --text-light: #000000;
    --border: #7a5c3a;
    --green: #2d6040;
    --green-light: #dff0e6;
    --red: #a83230;
    --blue: #2f5c9a;
    --blue-light: #e3eefb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  .header { text-align: center; margin-bottom: 40px; }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    font-style: italic;
    color: #000000;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .card {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 20px rgba(44,36,24,0.05);
    transition: box-shadow 0.2s;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #000000;
    border: none;
    border-radius: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(160,124,69,0.3);
  }
  .btn-submit:hover  { opacity: 0.92; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  .sposi-kpi {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi-box {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 10px;
    text-align: center;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
  }
  .kpi-box:hover { background: #efe3ce; }
  .kpi-box:active { transform: scale(0.98); }
  .kpi-box.active-filter {
    background: var(--gold-light);
    border-color: var(--gold-dark);
  }
  .kpi-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--gold-dark);
    line-height: 1;
  }
  .kpi-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    margin-top: 4px;
    font-weight: 500;
  }

  .risposta-card {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .risposta-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .risposta-nome::after {
    content: '▼';
    font-size: 14px;
    color: var(--gold-dark);
  }
  
  .dettagli-scheda {
    display: none;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .risposta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(224,212,192,0.4);
  }
  .risposta-row:last-child { border-bottom: none; }
  .risposta-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    min-width: 90px;
    padding-top: 2px;
    font-weight: 600;
  }
  .risposta-val {
    color: var(--text);
    text-align: right;
    flex: 1;
    font-weight: 400;
  }
  .risposta-val.allergia { color: #a83230; font-weight: 500; }
  .risposta-data {
    font-size: 11px;
    color: var(--text);
    margin-top: 8px;
    text-align: right;
    opacity: 0.7;
  }

  .badge {
    display: inline-block;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-veg      { background: var(--green-light); color: var(--green); }
  .badge-carne    { background: rgba(201,169,110,0.15); color: var(--gold-dark); }
  .badge-pesce    { background: var(--blue-light); color: var(--blue); }
  .muted          { color: #888; }

  .delete-btn {
    background: #c0504d;
    border: none;
    color: #ffffff;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    width: 100%;
    text-align: center;
    transition: background 0.2s;
  }
  .delete-btn:hover {
    background: #a3413e;
  }

  @media (max-width: 520px) {
    .sposi-kpi { grid-template-columns: repeat(2, 1fr); }
    .header .subtitle { font-size: 18px; letter-spacing: 3px; }
  }
</style>
</head>
<body>

<div id="sposi-section">
<div class="page-wrapper">
  <div class="header">
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>Lista Invitati</h1>
    <div class="subtitle">Giulia &amp; Onofrio</div>
  </div>
  <div class="card">
    <div id="sposi-table"><p style="text-align:center;padding:20px">Caricamento...</p></div>
    <button id="btn-aggiorna" class="btn-submit" onclick="caricaRisposte()" style="margin-top:16px; display:none;">↻ Aggiorna</button>
  </div>
</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfKImnIRNz0d-01K4KYomyAKpy_oiVZZtcnhPdf-8sKb0ZZSHymdb4UNV7LFNDOG-P3w/exec';
  let activeFilter = null;

  window.addEventListener('DOMContentLoaded', () => {
    caricaRisposte();
  });

  function normalizeText(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function isAbsent(value) {
    const s = normalizeText(value);
    return s.includes('non potro esserci') || s.includes('no podre asistir') || s === 'no' || s.includes('assente');
  }

  function isPresent(value) {
    const s = normalizeText(value);
    return s.includes('saro dei vostri') || s.includes('estare con vosotros') || s === 'si' || s === 'yes' || s.includes('presente');
  }

  function hasAllergy(value) {
    const s = normalizeText(value);
    return s !== '' && !s.includes('nessun') && s !== 'no' && s !== '-';
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s.includes('veget')) return 'veg';
    if (s.includes('carne')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function secondBadge(secondo, presence) {
    if (isAbsent(presence)) return '<span class="muted">—</span>';
    const tipo = detectSecondo(secondo);
    if (tipo === 'veg') return '<span class="badge badge-veg">🌿 Vegetariano</span>';
    if (tipo === 'carne') return '<span class="badge badge-carne">🥩 Carne</span>';
    if (tipo === 'pesce') return '<span class="badge badge-pesce">🐟 Pesce</span>';
    return '<span class="muted">—</span>';
  }

  function toggleDettagli(id) {
    const element = document.getElementById('dettagli-' + id);
    if (element.style.display === 'block') {
      element.style.display = 'none';
    } else {
      element.style.display = 'block';
    }
  }

  function filtraLista(categoria) {
    if (activeFilter === categoria) {
      activeFilter = null;
    } else {
      activeFilter = categoria;
    }

    document.querySelectorAll('.kpi-box').forEach(el => el.classList.remove('active-filter'));
    if (activeFilter) {
      document.getElementById('btn-' + activeFilter).classList.add('active-filter');
    }

    document.querySelectorAll('.risposta-card').forEach(card => {
      if (!activeFilter || card.classList.contains('cat-' + activeFilter)) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function caricaRisposte() {
    const box = document.getElementById('sposi-table');
    const btnAggiorna = document.getElementById('btn-aggiorna');
    
    box.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px">Caricamento...</p>';
    if (btnAggiorna) btnAggiorna.style.display = 'none';
    
    activeFilter = null;

    fetch(SCRIPT_URL + '?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (btnAggiorna) btnAggiorna.style.display = 'block';
        
        if (!data.ok || !data.rows || data.rows.length === 0) {
          box.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-light)">Nessuna risposta ancora.</p>';
          return;
        }

        let totPresenti = 0, totAssenti = 0, totAllergie = 0, totVeg = 0, totCarne = 0, totPesce = 0;

        let righeMappate = data.rows.map((r, i) => ({ ...r, indiceOriginale: i + 2 }));
        righeMappate.sort((a, b) => (a.nome || 'Zenza nome').localeCompare(b.nome || 'Zenza nome'));

        righeMappate.forEach(r => {
          const presenza = r.presenza || '';
          const secondo = r.secondo || '';
          const allergie = r.allergie || '';
          
          if (isAbsent(presenza)) totAssenti++;
          else if (isPresent(presenza)) totPresenti++;

          if (hasAllergy(allergie)) totAllergie++;

          const tipo = detectSecondo(secondo);
          if (tipo === 'veg') totVeg++;
          else if (tipo === 'carne') totCarne++;
          else if (tipo === 'pesce') totPesce++;
        });

        let html = `<div class="sposi-kpi">
          <div class="kpi-box" id="btn-presenti" onclick="filtraLista('presenti')"><div class="kpi-num">${totPresenti}</div><div class="kpi-label">Presenti</div></div>
          <div class="kpi-box" id="btn-assenti" onclick="filtraLista('assenti')"><div class="kpi-num">${totAssenti}</div><div class="kpi-label">Assenti</div></div>
          <div class="kpi-box" id="btn-allergie" onclick="filtraLista('allergie')"><div class="kpi-num">${totAllergie}</div><div class="kpi-label">Allergie</div></div>
          <div class="kpi-box" id="btn-veg" onclick="filtraLista('veg')"><div class="kpi-num">${totVeg}</div><div class="kpi-label">Vegetariani</div></div>
          <div class="kpi-box" id="btn-carne" onclick="filtraLista('carne')"><div class="kpi-num">${totCarne}</div><div class="kpi-label">Carne</div></div>
          <div class="kpi-box" id="btn-pesce" onclick="filtraLista('pesce')"><div class="kpi-num">${totPesce}</div><div class="kpi-label">Pesce</div></div>
        </div>
        <div id="lista-invitati">`;

        righeMappate.forEach(r => {
          const riga = r.indiceOriginale;
          const presenza = r.presenza || '';
          
          let classiFiltro = [];
          if (isPresent(presenza)) classiFiltro.push('cat-presenti');
          if (isAbsent(presenza)) classiFiltro.push('cat-assenti');
          if (hasAllergy(r.allergie)) classiFiltro.push('cat-allergie');
          
          const tipoSecondo = detectSecondo(r.secondo);
          if (tipoSecondo === 'veg') classiFiltro.push('cat-veg');
          if (tipoSecondo === 'carne') classiFiltro.push('cat-carne');
          if (tipoSecondo === 'pesce') classiFiltro.push('cat-pesce');

          const valPresenza = isPresent(presenza) ? '1' : '0';

          const allergieHtml = hasAllergy(r.allergie)
            ? `<span class="risposta-val allergia">${r.allergie}</span>`
            : `<span class="risposta-val muted">Nessuna</span>`;
          const note = r.note
            ? `<span class="risposta-val">${r.note}</span>`
            : `<span class="risposta-val muted">—</span>`;

          html += `<div class="risposta-card ${classiFiltro.join(' ')}" id="card-${riga}">
            <div class="risposta-nome" onclick="toggleDettagli(${riga})">${r.nome || 'Senza nome'}</div>
            
            <div class="dettagli-scheda" id="dettagli-${riga}">
              <div class="risposta-row">
                <span class="risposta-label">Presenza</span>
                <span class="risposta-val" style="font-weight: 600;">${valPresenza}</span>
              </div>
              <div class="risposta-row">
                <span class="risposta-label">Secondo</span>
                <span class="risposta-val">${secondBadge(r.secondo, presenza)}</span>
              </div>
              <div class="risposta-row">
                <span class="risposta-label">Allergie</span>
                ${allergieHtml}
              </div>
              <div class="risposta-row">
                <span class="risposta-label">Note</span>
                ${note}
              </div>
              <div class="risposta-data">${r.data || ''}</div>
              <button onclick="eliminaRiga(${riga})" class="delete-btn">✕ Elimina questa scheda</button>
            </div>
          </div>`;
        });

        html += `</div>`;
        box.innerHTML = html;
      })
      .catch(() => {
        if (btnAggiorna) btnAggiorna.style.display = 'block';
        box.innerHTML = '<p style="color:red;text-align:center;padding:20px">Errore nel caricamento.</p>';
      });
  }

  function eliminaRiga(riga) {
    if (!confirm('Eliminare questa scheda?')) return;
    const card = document.getElementById('card-' + riga);
    if (card) card.style.opacity = '0.4';

    fetch(SCRIPT_URL + '?elimina=' + riga + '&t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          setTimeout(() => caricaRisposte(), 500);
        } else {
          alert('Errore nella cancellazione.');
          if (card) card.style.opacity = '1';
        }
      })
      .catch(() => {
        alert('Errore di rete.');
        if (card) card.style.opacity = '1';
      });
  }
</script>
</body>
</html>
