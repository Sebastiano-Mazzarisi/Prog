  const nome = normalizzaNome(g.nome || '');
  const file = nome.charAt(0)+nome.slice(1).toLowerCase().replaceAll(' ','_');
  const img = '<img class="tennista-foto" src="Tennisti/'+file+'.jpg" onerror="this.style.display='none'" alt="'+esc(nome)+'">';
  let body='';
  if(isLive && g.live) { body += '<div class="live-score"><div class="vs">vs '+esc(g.live.avv)+'</div><div class="score">'+esc(g.live.score||'')+'</div></div>'; }
  if(!isLive && !isElim && g.prossimo) { body += '<div class="prossimo '+(g.prossimo.da_verificare?'verifica':'')+'"><div class="vs">vs '+esc(g.prossimo.avv)+'</div>'+(g.prossimo.da_verificare?'<div class="nota">Risultato da verificare</div>':'')+'</div>'; }
  (g.storico||[]).forEach(m => {
    const win = m.esito === 'W';
    body += '<div class="match-row"><span class="match-date">'+esc(dataLabel(m.data))+'</span><span class="match-esito" style="color:'+(win?'var(--win)':'var(--lose)')+'">'+(win?'✓':'✗')+'</span><span class="match-avv">'+esc(m.avv)+'</span><span class="match-score">'+esc(m.score||'')+'</span></div>';
  });
  if(!body) body='<div style="font-size:14px;color:var(--muted);font-family:DM Mono,monospace;padding:4px 0">Nessun dettaglio disponibile</div>';
  return '<div class="card '+(isLive?'live ':'')+(isElim?'eliminato':'')+'"><div class="card-head"><div class="nome-wrap">'+nomeHtml(nome)+'</div>'+img+quandoHtml(g)+'</div><div class="card-body">'+body+'</div></div>';
}
function render(DATA) {
  const inGara=DATA.filter(g=>g.stato!=='elim');
  const eliminati=DATA.filter(g=>g.stato==='elim');
  let html='';
  if(inGara.length) { html+='<div class="section-label">Italiani ancora in gara</div>'; inGara.forEach(g=>html+=renderCard(g)); }
  if(eliminati.length) { html+='<div class="section-label">Italiani fuori dai giochi</div>'; eliminati.forEach(g=>html+=renderCard(g)); }
  document.getElementById('container').innerHTML=html;
}
async function carica() {
  try {
    const r = await fetch('dati.json?t='+Date.now(), {cache:'no-store'});
    const data = await r.json();
    render(data);
    try {
      const rm = await fetch('meta.json?t='+Date.now(), {cache:'no-store'});
      if(rm.ok) { const meta=await rm.json(); document.getElementById('barra-aggiornamento').textContent='Aggiornamento: '+(meta.pubblicato||meta.automatico_aggiornato||'')+' (v.48)'; }
    } catch(e) {}
    const isLive = data.some(g=>g.stato==='live');
    const oggi = data.some(g => (g.prossimo && dataLabel(g.prossimo.data)==='oggi') || (g.live && dataLabel(g.live.data)==='oggi'));
    setTimeout(carica, isLive ? 6000 : (oggi ? 30000 : 60000));
  } catch(e) { setTimeout(carica, 10000); }
}
render(DATA_EMBEDDED);
carica();
</script>
