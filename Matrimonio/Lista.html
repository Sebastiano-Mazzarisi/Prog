  let APP_VERSION_LABEL = APP_VERSION;
  (function(){
    try {
      const vParam = new URLSearchParams(window.location.search).get('v');
      let count = parseInt(localStorage.getItem('lista_run_count') || '0', 10);
      if (isNaN(count) || count < 0) count = 0;
      const alreadyCounted = sessionStorage.getItem('lista_counted') === '1';

      if (vParam === '18') {
        // Reset con conferma
        if (confirm('Azzerare il contatore di avvii (attualmente c=' + count + ')?')) {
          count = 1;
          localStorage.setItem('lista_run_count', '1');
          sessionStorage.setItem('lista_counted', '1');
        }
        APP_VERSION_LABEL = 'c=' + count + ' · ' + APP_VERSION;
      } else if (vParam === '17') {
        // Solo visualizza, non incrementa
        APP_VERSION_LABEL = 'c=' + count + ' · ' + APP_VERSION;
      } else {
        // Normale: incrementa solo se nuova sessione
        if (!alreadyCounted) {
          count++;
          localStorage.setItem('lista_run_count', String(count));
          sessionStorage.setItem('lista_counted', '1');
        }
        APP_VERSION_LABEL = APP_VERSION;
      }

      var el = document.getElementById('ver-label');
      if (el) el.textContent = APP_VERSION_LABEL;
    } catch(e) {
      APP_VERSION_LABEL = APP_VERSION;
    }

  let _loadingDots = '·';
  const _loadingDotsSeq = ['.', '..', '...', '....', '.....'];
  let _loadingDotsIdx = 0;
  let _loadingDotsTimer = null;
  function _startLoadingDots() {
    _loadingDotsIdx = 0;
    const el = document.getElementById('loading-dots');
    if (el) el.textContent = _loadingDotsSeq[0];
    if (_loadingDotsTimer) clearInterval(_loadingDotsTimer);
    _loadingDotsTimer = setInterval(function() {
      _loadingDotsIdx = (_loadingDotsIdx + 1) % _loadingDotsSeq.length;
      const e = document.getElementById('loading-dots');
      if (e) e.textContent = _loadingDotsSeq[_loadingDotsIdx];
    }, 500);
  }
  function avanzaLoading() {
    _loadingDotsIdx = Math.min(_loadingDotsIdx + 1, _loadingDotsSeq.length - 1);
    const el = document.getElementById('loading-dots');
    if (el) el.textContent = _loadingDotsSeq[_loadingDotsIdx];
  }
  function _stopLoadingDots() {
    if (_loadingDotsTimer) { clearInterval(_loadingDotsTimer); _loadingDotsTimer = null; }
  }
  _startLoadingDots();

    assetReloadState.requestRefresh = false;

        .filter(el => el.closest('.risposta-card') && el.closest('.risposta-card').style.display !== 'none');

    } catch (e) {

    }
  }
  function assetFetchEnd() {
    if (assetReloadState.pending > 0) assetReloadState.pending--;
    if (assetReloadState.requestRefresh && assetReloadState.pending === 0 && !assetReloadState.refreshTriggered) {
      assetReloadState.refreshTriggered = true;
      setTimeout(eseguiRefreshAssetMirato, 120);

    assetReloadState.requestRefresh = true;

  window.mapTelefoni = {};
  async function caricaTelefoni() {
    try {
      const resp = await fetch('Telefoni.txt?t=' + Date.now());
      if (!resp.ok) return;
      const txt = await resp.text();
      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      txt.split(/\r?\n/).forEach(riga => {
        if (/^[-\s]/.test(riga) || /^[A-Z\s]+$/.test(riga.split(/\s{2,}/)[0]||'') || /^(Totale|Con |Senza )/i.test(riga)) return; const m = riga.match(/^(.+?)\s{2,}(.+)$/);
        if (!m) return;
        const nome = m[1].trim(); const cell = m[2].trim();
        window.mapTelefoni[norm(nome)] = cell;
        const parti = nome.split(/\s+/);
        if (parti.length >= 2)
          window.mapTelefoni[norm(parti.slice(1).join(' ') + ' ' + parti[0])] = cell;
      });
    } catch(e) {}
    avanzaLoading();
  }

  function cercaTelefono(nomeDisplay) {
    const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const k1 = norm(nomeDisplay);
    if (window.mapTelefoni[k1]) return window.mapTelefoni[k1];
    const parti = nomeDisplay.trim().split(/\s+/);
    if (parti.length >= 2) {
      const k2 = norm(parti[parti.length-1] + ' ' + parti.slice(0,-1).join(' '));
      if (window.mapTelefoni[k2]) return window.mapTelefoni[k2];
    }
    return '';
  }

  function formattaNumero(raw) {
    const digits = raw.replace(/\D/g,'');
    if (digits.length === 10)
      return digits.slice(0,3) + '-' + digits.slice(3,5) + '.' + digits.slice(5,7) + '.' + digits.slice(7);
    if (digits.length === 12 && digits.startsWith('39')) {
      const loc = digits.slice(2);
      return '+39\u00a0' + loc.slice(0,3) + '-' + loc.slice(3,5) + '.' + loc.slice(5,7) + '.' + loc.slice(7);
    }
    return raw;
  }

  // Funzione per estrarre i dati da Tavoli.txt dinamicamente
  async function caricaTavoli() {
    try {
      const response = await fetch('Tavoli.txt?t=' + Date.now());
      if (response.ok) {
        const text = await response.text();
        const righe = text.split(/\r?\n/);
        TAVOLI = []; // Resetta l'array per popolarlo dinamicamente
        let tavoloCorrente = null;

        righe.forEach(riga => {
          const r = riga.trim();
          if (!r) return; // Ignora le righe vuote

          if (r.startsWith('#')) {
            // Nuovo tavolo identificato (rimuove il '#' e gli spazi)
            tavoloCorrente = {
              nome: r.substring(1).trim(),
              persone: []
            };
            TAVOLI.push(tavoloCorrente);
          } else if (tavoloCorrente) {
            // Aggiunge la persona al tavolo corrente
            tavoloCorrente.persone.push(r);
          }
        });

        // Se la sezione HTML dei tavoli è già stata montata, la aggiorna
        if (document.getElementById('sezione-tavoli')) {
          renderizzaTavoli();
        }
      } else {
        console.error("Errore nel caricamento di Tavoli.txt: " + response.status);
      }
    } catch (err) {
      console.error("Errore di rete durante il caricamento di Tavoli.txt: ", err);
    }
    // Carica Invitati.csv per popolare window.mapNascita (date di nascita)
    try {
      const respInv = await fetch('Invitati.csv?t=' + Date.now());
      if (respInv.ok) {
        const txtInv = await respInv.text();
        const righeInv = txtInv.split(/\r?\n/).map(r => r.trim());
        const sepInv = txtInv.includes(';') ? ';' : ',';
        const acc = /[\u0300-\u036f]/g;
        window.mapNascita = {};
        window.tuttiInvitatiCsvRaw = [];
        let totCsv = 0;
        let startInv = (righeInv.length > 0 && righeInv[0].toLowerCase().includes('nom')) ? 1 : 0;
        for (let i = startInv; i < righeInv.length; i++) {
          if (righeInv[i].startsWith('#')) continue;
          const cols = righeInv[i].split(sepInv);
          const nomeRaw = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          const dataN = cols[1] ? cols[1].replace(/['"]/g,'').trim() : '';
          const partiNome = nomeRaw.split(/\s+/).filter(Boolean);
          const nomeInvertito = partiNome.length >= 2
            ? partiNome.slice(1).join(' ') + ' ' + partiNome[0]
            : nomeRaw;
          if (nomeRaw) {
            totCsv++;
            window.tuttiInvitatiCsvRaw.push({ nome: nomeRaw, nomeCanonico: nomeRaw, nomeInvertito, dataNascita: dataN });
            if (dataN) {
              window.mapNascita[nomeRaw.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
              if (nomeInvertito && nomeInvertito !== nomeRaw) {
                window.mapNascita[nomeInvertito.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
              }
            }
          }
        }
        window.totInvitatiCsv = totCsv;
        window.totInvitatiCsvRaw = totCsv;
        // Aggiorna titolo h1 con numero invitati
        (function() {
          const el = document.getElementById('titolo-pagina');
          if (el) {
            const testi = dizionario[currentLang];
            el.innerHTML = testi.titolo + ' <small style="font-size:0.5em;font-weight:600;color:#000;vertical-align:middle;">(' + totCsv + ')</small>';
          }
        })();

        // ── Mappa gruppi: ogni persona → lista nomi del suo gruppo ───────
        window.mapGruppo = {};
        const acc2 = /[\u0300-\u036f]/g;
        const normK = s => (s||'').toLowerCase().normalize('NFD').replace(acc2,'').trim();
        let gruppoCorrente = [];
        const flushGruppo = () => {
          if (gruppoCorrente.length > 0) {
            const copia = [...gruppoCorrente];
            copia.forEach(n => { window.mapGruppo[normK(n)] = copia; });
            gruppoCorrente = [];
          }
        };
        for (let i = startInv; i < righeInv.length; i++) {
          const riga = righeInv[i];
          if (!riga || riga.startsWith('#')) { flushGruppo(); continue; }
          const cols = riga.split(sepInv);
          const nomeRaw = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          if (!nomeRaw) { flushGruppo(); continue; }
          gruppoCorrente.push(nomeRaw);
        }
        flushGruppo();
        // Salva gruppi ordinati per la vista GRUPPI (con nomi dei gruppi)
        window.gruppiCsvOrdinati = [];
        let _gc = [], _gcNome = '';
        for (let i = startInv; i < righeInv.length; i++) {
          const _r = righeInv[i];
          if (!_r || _r.startsWith('#')) {
            if (_gc.length) { window.gruppiCsvOrdinati.push({ nome: _gcNome, membri: [..._gc] }); _gc = []; }
            _gcNome = _r ? _r.substring(1).trim() : '';
            continue;
          }
          const _c = _r.split(sepInv);
          const _nr = _c[0] ? _c[0].replace(/['"]/g,'').trim() : '';
          if (!_nr) { if (_gc.length) { window.gruppiCsvOrdinati.push({ nome: _gcNome, membri: [..._gc] }); _gc = []; _gcNome = ''; } continue; }
          _gc.push(_nr);
        }
        if (_gc.length) window.gruppiCsvOrdinati.push({ nome: _gcNome, membri: _gc });
      }
    } catch(e) { console.log('mapNascita: Invitati.csv non disponibile', e); }
    avanzaLoading();
  }

  function normalizeText(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s === '4') return 'baby';
    if (s === '5') return 'segnaposto';
    if (s.includes('veget') || s.includes('vegan')) return 'veg';
    if (s.includes('carne') || s.includes('meat')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function isAbsent(presenza, secondo) {
    const p = normalizeText(presenza);
    if (p === '0' || p === 'false' || p === 'no' || p.includes('non') || p.includes('assente') || p === '') {
        if (p === '' && detectSecondo(secondo) !== '') {
            return false;
        }
        return true;
    }
    return false;
  }

  function hasAllergy(value) {
    if (!value) return false;
    const s = normalizeText(value).replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim();
    if (!s) return false;
    const falsiPositivi = [
      'no', 'nessuna', 'nessuno', 'nessun', 'niente', 'nulla', 'nd',
      '0', 'false', 'nessuna allergia', 'no allergie', 'nessuna in particolare',
      'no grazie', 'nessuna grazie'
    ];
    if (falsiPositivi.includes(s)) return false;
    return true;
  }

  function iconaAllergie(value) {
    if (!hasAllergy(value)) return '';
    // Mappa esatta dei valori usati in Matrimonio.html
    const mappa = {
      'formaggi':     '🧀',
      'glutine':      '🌾',
      'lattosio':     '🥛',
      'frutta secca': '🥜',
      'uova':         '🥚',
      'crostacei':    '🦐',
      'soia':         '🫘',
      'pesce':        '🐟',
      'sedano':       '🥦',
    };
    const voci = value.split(',').map(v => v.trim().toLowerCase());
    const icone = [];
    voci.forEach(v => {
      if (mappa[v]) {
        if (!icone.includes(mappa[v])) icone.push(mappa[v]);
      } else {
        // Voce libera non in mappa: icona generica se non già presente
        if (!icone.includes('⚠️')) icone.push('⚠️');
      }
    });
    return icone.join('');
  }

  function applicaVisibilitaCard() {
    const rawQuery = (document.getElementById('cerca-input') ? document.getElementById('cerca-input').value : '').trim();
    // Parsa i termini: quelli che iniziano con - sono NOT
    const termini = rawQuery.split(/\s+/).filter(Boolean).map(t => {
      if (t.startsWith('-') && t.length > 1) return { testo: _normCerca(t.slice(1)), not: true };
      return { testo: _normCerca(t), not: false };
    });
    let visibili = 0;
    document.querySelectorAll('.risposta-card').forEach(card => {
      const passaCategoria = !activeFilter || card.classList.contains('cat-' + activeFilter);
      let passaRicerca = true;
      if (termini.length > 0) {
        const testo = _testoCard(card);
        passaRicerca = termini.every(t => t.not ? !testo.includes(t.testo) : testo.includes(t.testo));
      }
      const visibile = passaCategoria && passaRicerca;
      card.style.display = visibile ? 'block' : 'none';
      if (visibile) visibili++;
    });

    // Nascondi i bottoni dei gruppi se tutti i componenti sono invisibili
    document.querySelectorAll('.gruppo-header-wrap').forEach(wrap => {
      const gi = wrap.getAttribute('data-gruppo');
      if (gi === null) return;
      const cards = document.querySelectorAll(`.risposta-card[data-gruppo="${gi}"]`);
      const haVisibili = Array.from(cards).some(c => c.style.display !== 'none');
      wrap.style.display = haVisibili ? 'flex' : 'none';
    });

    // Aggiorna contatore
    const el = document.getElementById('cerca-count');
    if (el) el.textContent = '[' + visibili + ']';
  }

  function renderizzaDati() {
    _stopLoadingDots();
    const box = document.getElementById('sposi-table');
    const testi = dizionario[currentLang];
    let totPresenti = 0, totAssenti = 0, totAllergie = 0, totVeg = 0, totCarne = 0, totPesce = 0, totBaby = 0, totSegnaposto = 0;

    window.datiInvitati.forEach(r => {
      const presenza = r.presenza || '';
      const secondo = r.secondo || '';
      const allergie = r.allergie || '';
      const assente = isAbsent(presenza, secondo);

      if (assente) {
        totAssenti++;
      } else {
        totPresenti++;
        if (hasAllergy(allergie)) totAllergie++;

        const tipo = detectSecondo(secondo);
        if (tipo === 'veg') totVeg++;
        else if (tipo === 'carne') totCarne++;
        else if (tipo === 'pesce') totPesce++;

    // === NUOVO SISTEMA UNIFICATO: tutti gli ordini mostrano TUTTI gli invitati ===
    // Card bipartita: metà sinistra (clic) = foto | metà destra (clic) = scheda
    // Fondo azzurro chiaro = ha risposto | giallo tenue = non ha risposto

    function variantiFoto(n) {
      const v = new Set();
      v.add(n); v.add(n.normalize('NFD').replace(/[\u0300-\u036f]/g,''));
      v.add(n.replace(/u'$/,'\u00f9').replace(/a'$/,'\u00e0').replace(/e'$/,'\u00e8').replace(/i'$/,'\u00ec').replace(/o'$/,'\u00f2'));
      v.add(n.replace(/'$/,'')); return [...v];
    }

    function cardRispondente(r, gruppoIdx) {
      const riga = r.indiceOriginale;
      const presenza = r.presenza||'';
      const assente = isAbsent(presenza, r.secondo);
      const tipoSecondo = detectSecondo(r.secondo);
      let cf = ['ha-risposto'];
      if (assente) { cf.push('cat-assenti'); }
      else {
        cf.push('cat-presenti');
        if (hasAllergy(r.allergie))       cf.push('cat-allergie');
        if (tipoSecondo==='veg')           cf.push('cat-veg');
        if (tipoSecondo==='carne')         cf.push('cat-carne');
        if (tipoSecondo==='pesce')         cf.push('cat-pesce');
        if (tipoSecondo==='baby')          cf.push('cat-baby');
        if (tipoSecondo==='segnaposto')    cf.push('cat-segnaposto');
      }
      const ds = (activeFilter && !cf.includes('cat-'+activeFilter)) ? 'display:none;' : 'display:block;';
      // Icona cibo (dopo età, nella zona foto)
      const ico = assente ? '' : (tipoSecondo==='veg'?'🥦':tipoSecondo==='carne'?'🥩':tipoSecondo==='pesce'?'🐟':tipoSecondo==='baby'?'🍼':'');
      // Data/ora invio formattata [GG/MM - HH:MM]
      let dataOraInvio = '';
      const rawData = r.data||'';
      if (rawData) {
        const parti2 = String(rawData).trim().split(/\s+/);
        if (parti2.length >= 2) {
          const dp = parti2[0].split(/[\/\-]/), op = parti2[1].split(':');
          dataOraInvio = (dp.length>=2 && op.length>=2)
            ? `[${dp[0]}/${dp[1]} ${op[0]}:${op[1]}]`
            : `[${rawData}]`;
        } else dataOraInvio = `[${rawData}]`;
      }
      const haA = hasAllergy(r.allergie);
      const iceA = iconaAllergie(r.allergie);
      const nomeCanonico = trovaNomeCanonico(r.nome) || (r.nome || '');
      const tavN = trovaTavoloNum(nomeCanonico);
      const nomDisp = formatNomeDisplay(nomeCanonico);
      const allHtml = hasAllergy(r.allergie) ? `<span class="risposta-val allergia">${r.allergie}</span>` : `<span class="risposta-val muted">${testi.lblNessuna}</span>`;
      const noteHtml = r.note ? `<span class="risposta-val">${r.note}</span>` : `<span class="risposta-val muted">—</span>`;
      const parti = (r.nome||'').trim().split(/\s+/);
      const nff = nomeCanonico || (r.nome||'');
      // Cerchietto bianco con freccia rossa per aprire la scheda
      const btnScheda = `<span onclick="event.stopPropagation();toggleDettagli(${riga})" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid #c0392b;flex-shrink:0;cursor:pointer;" title="Apri scheda"><span style="color:#c0392b;font-size:18px;font-weight:900;line-height:1;">›</span></span>`;
      return `<div class="risposta-card ${cf.join(' ')}" style="${ds}" id="card-${riga}" data-cerca="${_buildCercaAttr(r, nomeCanonico)}"${gruppoIdx!=null?' data-gruppo="'+gruppoIdx+'"':''}>
        <div class="risposta-nome" id="nomefoto-${riga}" data-nomefile="${nff}" style="cursor:pointer;display:flex;align-items:center;padding:10px 14px;gap:6px;" onclick="window._apriGalleria && window._apriGalleria('${nff.replace(/'/g,"\\'")}')">
          ${tavN?`<span style="font-size:14px;flex-shrink:0">${tavN}</span>`:''}
          <span style="color:#000;font-weight:600;flex:1;min-width:0;">${nomDisp}${ico?`&nbsp;<span style="font-size:16px">${ico}</span>`:''}${dataOraInvio?`&nbsp;<span style="font-size:11px;font-weight:400;color:#5a6e3a;white-space:nowrap">${dataOraInvio}</span>`:''}</span>
          <span class="icone-destra" style="flex-shrink:0">${iceA?`<span style="font-size:15px">${iceA}</span>`:''}</span>
          ${btnScheda}
        </div>
        <div class="dettagli-scheda" id="dettagli-${riga}">
          <div class="risposta-row"><span class="risposta-label">${testi.lblTavolo}</span><span class="risposta-val" style="font-weight:600;font-size:15px;">${trovaTavolo(nomeCanonico)}</span></div>
          <div class="risposta-row"><span class="risposta-label">${testi.lblPresenza}</span><span class="risposta-val" style="font-weight:600;">${assente?'0':'1'}</span></div>
          <div class="risposta-row"><span class="risposta-label">${testi.lblSecondo}</span><span class="risposta-val">${secondBadge(r.secondo,assente)}</span></div>

    function cardNonRispondente(nomeCSV, pfx, gruppoIdx) {
      const safeId = pfx + nomeCSV.replace(/[^a-zA-Z0-9]/g,'_');
      const nomeCanonico = trovaNomeCanonico(nomeCSV) || nomeCSV;
      const nff = nomeCanonico;
      // Usa formatNomeDisplay per rispettare l'ordinamento attivo (Nome vs Cognome)
      const nomDisp = formatNomeDisplay(nomeCanonico);
      const tavN = trovaTavoloNum(nomeCanonico);
      const ds = (activeFilter && activeFilter!=='assenti') ? 'display:none;' : 'display:block;';
      return `<div class="risposta-card non-risposto" style="${ds}border-color:#b0bec5;" id="${safeId}" data-cerca="${_normCerca(nomeCanonico)}"${gruppoIdx!=null?' data-gruppo="'+gruppoIdx+'"':''}>
        <div class="risposta-nome" id="nomefoto-csv-${safeId}" data-nomefile="${nff}" style="cursor:pointer;display:flex;align-items:center;padding:10px 14px;gap:6px;" onclick="window._apriGalleria && window._apriGalleria('${nff.replace(/'/g,"\\'")}')">
          ${tavN?`<span style="font-size:14px;flex-shrink:0">${tavN}</span>`:''}
          <span style="color:#000;font-weight:600;flex:1;min-width:0;">${nomDisp}</span>
          <span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid #ccc;flex-shrink:0;opacity:0.4;"><span style="color:#aaa;font-size:18px;font-weight:900;line-height:1;">—</span></span>
        </div>
      </div>`;
    }

    function fetchFotoSpans(els, risultati, onDone) {
      if (!els.length) { if(onDone) onDone(risultati||[]); return; }
      let done=0;
      function completato() { done++; if(done===els.length && onDone) onDone(risultati||[]); }
      els.forEach((el,pos) => {
        const nf = el.getAttribute('data-nomefile');
        if (!nf) { completato(); return; }
        assetFetchStart();
        if (risultati) risultati[pos] = { nome: nf, file: null };
        const varianti=variantiFoto(nf), ext=['jpg','JPG','jpeg','JPEG'];
        let trovata=false;
        let chiuso=false;
        function fineRicerca() {
          if (chiuso) return;
          chiuso = true;
          assetFetchEnd();
          completato();
        }
        function prova(vi,ei) {
          if(trovata) return;
          if(vi>=varianti.length){fineRicerca();return;}
          if(ei>=ext.length){prova(vi+1,0);return;}
          fetch('Foto/'+varianti[vi]+'.'+ext[ei]+'?t='+Date.now(),{method:'HEAD'})
            .then(r=>{
              if(r.ok&&!trovata){
                trovata=true;
                const file=varianti[vi]+'.'+ext[ei];
                if(risultati) risultati[pos]={nome:nf,file};
                el.setAttribute('data-foto-file', file); // salva il file trovato
                fineRicerca();
              } else prova(vi,ei+1);
            }).catch(()=>prova(vi,ei+1));
        }
        prova(0,0);
      });
    }

    // Apre la galleria partendo dal nominativo cliccato.
    // Costruisce l'array ordinato dall'elenco corrente nel DOM, poi chiama mostraFotoPopup.
    window._apriGalleria = function(nomeFile) {
      // Raccoglie tutti i div .risposta-nome[data-nomefile] visibili nel DOM nell'ordine attuale
      const domEls = [...document.querySelectorAll('.risposta-nome[data-nomefile]')]
        .filter(el => el.closest('.risposta-card') && el.closest('.risposta-card').style.display !== 'none');
      const fotoArr = domEls.map(el => ({
        nome: el.getAttribute('data-nomefile'),
        file: el.getAttribute('data-foto-file') || null
      }));
      // Trova l'indice di quello cliccato
      let idx = fotoArr.findIndex(f => f.nome === nomeFile);
      if (idx < 0) idx = 0;
      // Aggiorna fotoDisponibili con l'array nell'ordine corrente
      window.fotoDisponibili = fotoArr;
      // Apre il popup sull'elemento corretto
      const entry = fotoArr[idx];
      if (entry && !entry.file && assetReloadState.pending > 0) requestVisualRefreshWhenAssetsReady();
      mostraFotoPopup(entry.file || entry.nome); // passa file se esiste, altrimenti nome (mostrerà icona)
    };

    // Non-rispondenti: tutti quelli nel CSV che non hanno una risposta
    const _accNR = /[\u0300-\u036f]/g;
    const _normNR = s => (s||'').toLowerCase().normalize('NFD').replace(_accNR,'').trim();
    function _tokNR(n) { return _normNR(n).split(/\s+/).filter(Boolean); }
    function _matchNR(a,b) { const ta=_tokNR(a),tb=_tokNR(b); return ta.every(w=>tb.includes(w))||tb.every(w=>ta.includes(w)); }
    const _tuttiCSV = window.tuttiInvitatiCsvRaw || [];
    const _nonRisp = _tuttiCSV.filter(inv => !(window.datiInvitati||[]).some(r => _matchNR(inv.nome, r.nome||'')));
    function _sortCognome(arr) {
      return [...arr].sort((a,b) => {
        const na = a.nome||a, nb = b.nome||b;
        const ca=_normNR(chiaveCognomeNome(na));
        const cb=_normNR(chiaveCognomeNome(nb));
        return ca.localeCompare(cb,'it',{sensitivity:'base'});
      });
    }

    const _sep = `<div style="margin-top:12px;border-bottom:1px solid #b8893a;margin-bottom:8px;opacity:0.4;"></div>`;

    if (activeOrdine === 'gruppi') {
      // Ordine CSV con tutti i membri, con bottone nome gruppo prima di ogni gruppo
      const gList = window.gruppiCsvOrdinati || [];
      gList.forEach((g, gi) => {
        const nomeG = (g.nome || g[0] || '');
        const membri = g.membri || g;
        if (nomeG) {
          // Trova il nome canonico del primo membro per aprire la galleria
          const primoMembro = membri[0] || '';
          const primoCanon = (trovaNomeCanonico && trovaNomeCanonico(primoMembro)) || primoMembro;
          const primoClick = primoCanon ? `onclick="window._apriGalleria && window._apriGalleria('${primoCanon.replace(/'/g,"\\'")}')"` : '';
          html += `<div class="gruppo-header-wrap" data-gruppo="${gi}" style="display:flex;justify-content:center;margin:${gi===0?'4px':'5mm'} 0 8px;">
            <div class="gruppo-header-btn" ${primoClick} style="background:#fff9c4;border:1.5px solid #d4b07a;border-radius:20px;padding:5px 18px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#7a5c3a;letter-spacing:1px;${primoClick?'cursor:pointer;':''}">
              ✦ ${nomeG} ✦
            </div>
          </div>`;
        }
        membri.forEach(nc => {
          const r = (window.datiInvitati||[]).find(inv => _matchNR(nc, inv.nome||''));
          html += r ? cardRispondente(r, gi) : cardNonRispondente(nc, 'g-', gi);
        });
      });

    } else {
      let elencoUnificato = [];

      if (activeOrdine === 'attesa') {
        elencoUnificato = [
          ..._sortCognome(_nonRisp).map(inv => ({ ...inv, _nonRisposto: true })),
          ...ordinaInvitati([...(window.datiInvitati||[])], 'cognome').map(r => ({ ...r, _nonRisposto: false }))
        ];
      } else {
        const bloccoRisposte = ordinaInvitati([...(window.datiInvitati||[])], activeOrdine)
          .map(r => ({ ...r, _nonRisposto: false }));

        const baseNonRisp = _nonRisp.map(inv => ({
          nome: inv.nome || '',
          dataNascita: inv.dataNascita || '',
          indiceOriginale: -1,
          secondo: '',
          allergie: '',
          note: '',
          _nonRisposto: true
        }));

        if (activeOrdine === 'inserimento') {
          elencoUnificato = [
            ...bloccoRisposte,
            ..._sortCognome(baseNonRisp).map(inv => ({ ...inv, _nonRisposto: true }))
          ];
        } else {
          elencoUnificato = ordinaInvitati([ ...bloccoRisposte, ...baseNonRisp ], activeOrdine);
        }
      }

      elencoUnificato.forEach((item, idx) => {
        html += item._nonRisposto ? cardNonRispondente(item.nome, 'u-' + idx + '-') : cardRispondente(item);
      });
    }

    // Fetch foto per tutti dopo rendering - registra data-foto-file su ogni div
    window.fotoDisponibili = [];
    setTimeout(() => {
      const tutti = [...document.querySelectorAll('.risposta-nome[data-nomefile]')];
      const spR  = tutti.filter(el => el.id.startsWith('nomefoto-') && !el.id.startsWith('nomefoto-csv-'));
      const spNR = tutti.filter(el => el.id.startsWith('nomefoto-csv-'));
      const ris = new Array(spR.length).fill(null);
      fetchFotoSpans(spR, ris, res => {
        window.fotoDisponibili = res;
      });
      fetchFotoSpans(spNR, null, null);
    }, 50);


    html += `</div>
    <div style="text-align:center; margin: 16px 0 8px; display:flex; justify-content:center; align-items:center; gap:10px;">
      <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:linear-gradient(135deg,#7a5c3a,#9e7f5b);color:#ffffff;border:none;border-radius:12px;padding:12px 28px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;box-shadow:0 2px 10px rgba(122,92,58,0.3);">${testi.btnHome}</button>
      <button onclick="gestisciContatore()" id="btn-contatore" style="display:none;background:linear-gradient(135deg,#3a6b7a,#5b9eb5);color:#ffffff;border:none;border-radius:12px;padding:12px 20px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 2px 10px rgba(58,107,122,0.3);min-width:56px;">${leggiContatore()}</button>
    </div>
    <div style="height:10px;"></div>
    <div id="sezione-tavoli" style="margin-top:8px;"></div>`;
    box.innerHTML = html;
    // Aggiorna subito il contatore (leggiContatore() è già nel template ma forziamo refresh)
    const btnC = document.getElementById('btn-contatore');
    if (btnC) btnC.textContent = leggiContatore();
    renderizzaTavoli();
    // Mostra subito il contatore delle schede visibili
    setTimeout(applicaVisibilitaCard, 0);
  }

  async function generaPDF() {
    const testi = dizionario[currentLang];

        const loc=digits.slice(2);

    if (gruppiInvitati.length > 0) {

  function etaTavoloHTML(nome) {
    const acc = /[\u0300-\u036f]/g;
    function tok(n) { return (n||'').toLowerCase().normalize('NFD').replace(acc,'').trim().split(/\s+/).filter(Boolean); }
    const pk = tok(nome);
    // Cerca in datiInvitati per secondo/icona
    var match = null;
    if (window.datiInvitati && window.datiInvitati.length) {
      match = window.datiInvitati.find(function(r) {
        var rk = tok(r.nome||'');
        return pk.every(function(w){return rk.includes(w);}) || rk.every(function(w){return pk.includes(w);});
      });
    }
    // Età da window.mapNascita
    var etaPart = '';
    if (window.mapNascita) {
      // cerca chiave esatta o per token
      var chiaveEsatta = nome.toLowerCase().normalize('NFD').replace(acc,'').trim();
      var dataN = window.mapNascita[chiaveEsatta];
      if (!dataN) {
        // fallback: cerca per token match
        Object.keys(window.mapNascita).forEach(function(k) {
          var kTok = k.split(/\s+/).filter(Boolean);
          if (pk.every(function(w){return kTok.includes(w);}) || kTok.every(function(w){return pk.includes(w);})) {
            dataN = window.mapNascita[k];
          }
        });
      }
      if (dataN) {
        var d = dataN.trim();
        var matrimonio = new Date(2026, 5, 21);
        var nascita = null;
        var dmY = d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
        var Ymd = d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
        var soloAnno = d.match(/^(\d{4})$/);
        if (dmY) nascita = new Date(parseInt(dmY[3]), parseInt(dmY[2])-1, parseInt(dmY[1]));
        else if (Ymd) nascita = new Date(parseInt(Ymd[1]), parseInt(Ymd[2])-1, parseInt(Ymd[3]));
        else if (soloAnno) nascita = new Date(parseInt(soloAnno[1]), 0, 1);
        if (nascita) {
          var anni = matrimonio.getFullYear() - nascita.getFullYear();
          var cp = (nascita.getMonth() < matrimonio.getMonth()) ||
            (nascita.getMonth() === matrimonio.getMonth() && nascita.getDate() <= matrimonio.getDate());
          if (!cp) anni--;
          etaPart = ' <span style="font-weight:500;font-size:16px;color:#000000;-webkit-text-fill-color:#000000">('+anni+')</span>';
        }
      }
    }
    // Icona secondo piatto
    var iconaPart = '';
    if (match && match.secondo) {
      var tipo = detectSecondo(match.secondo);
      if (tipo === 'veg')        iconaPart = ' <span title="${dizionario[currentLang].tipVeg}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2d6040;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">V</span>';
      else if (tipo === 'carne') iconaPart = ' <span title="${dizionario[currentLang].tipCarne}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#a83230;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">C</span>';
      else if (tipo === 'pesce') iconaPart = ' <span title="${dizionario[currentLang].tipPesce}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#c8a000;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">P</span>';
      else if (tipo === 'baby')  iconaPart = ' <span title="${dizionario[currentLang].tipBaby}" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2980b9;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">B</span>';
    }
    return etaPart + iconaPart;
  }

  function getEtaAnni(nome) {
    if (!window.mapNascita) return null;
    const acc = /[\u0300-\u036f]/g;
    const k = (nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    // cerca chiave esatta o token match
    let dataN = window.mapNascita[k];
    if (!dataN) {
      const pk = k.split(/\s+/).filter(Boolean);
      Object.keys(window.mapNascita).forEach(mk => {
        const mk2 = mk.split(/\s+/).filter(Boolean);
        if (pk.every(w=>mk2.includes(w)) || mk2.every(w=>pk.includes(w))) dataN = window.mapNascita[mk];
      });
    }
    if (!dataN) return null;
    const d = dataN.trim();
    const matrimonio = new Date(2026,5,21);
    let nascita = null;
    const dmY=d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    const Ymd=d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
    const soloA=d.match(/^(\d{4})$/);
    if(dmY) nascita=new Date(parseInt(dmY[3]),parseInt(dmY[2])-1,parseInt(dmY[1]));
    else if(Ymd) nascita=new Date(parseInt(Ymd[1]),parseInt(Ymd[2])-1,parseInt(Ymd[3]));
    else if(soloA) nascita=new Date(parseInt(soloA[1]),0,1);
    if(!nascita) return null;
    let anni = matrimonio.getFullYear()-nascita.getFullYear();
    const cp=(nascita.getMonth()<matrimonio.getMonth())||(nascita.getMonth()===matrimonio.getMonth()&&nascita.getDate()<=matrimonio.getDate());
    if(!cp) anni--;
    return anni;
  }

  function primoToken(n) { return partiNomeRaw(n).cognome || ''; }
  function ultimoToken(n) { return partiNomeRaw(n).nome || ''; }
  function nomeTokensNormalizzati(n) {
    return (n||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim().split(/\s+/).filter(Boolean);
  }
  function nomiCompatibili(a, b) {
    const ta = nomeTokensNormalizzati(a);
    const tb = nomeTokensNormalizzati(b);
    if (!ta.length || !tb.length) return false;
    return ta.every(w => tb.includes(w)) || tb.every(w => ta.includes(w));
  }
  function trovaNomeCanonico(n) {
    const base = (n || '').trim();
    if (!base) return '';
    const elenco = window.tuttiInvitatiCsvRaw || [];
    const trovato = elenco.find(inv => nomiCompatibili(base, inv.nomeCanonico || inv.nome || ''));
    return trovato ? (trovato.nomeCanonico || trovato.nome || base) : base;
  }
  function partiNomeRaw(n) {
    const base = trovaNomeCanonico(n) || (n||'').trim();
    const t = base.split(/\s+/).filter(Boolean);
    if (!t.length) return { nome: '', cognome: '', display: '' };
    if (t.length === 1) return { nome: '', cognome: t[0], display: t[0] };
    const cognome = t[0];
    const nome = t.slice(1).join(' ');
    return { nome, cognome, display: base };
  }
  function chiaveNomeCompleto(n) {
    const p = partiNomeRaw(n);
    return (p.nome + ' ' + p.cognome).trim();
  }
  function chiaveCognomeNome(n) {
    const p = partiNomeRaw(n);
    return (p.cognome + ' ' + p.nome).trim();
  }

  function ordinaInvitati(arr, criterio) {
    const a2z = (a,b) => a.localeCompare(b, 'it', {sensitivity:'base'});
    const cp = v => (v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const arr2 = [...arr];
    if (criterio === 'inserimento') {
      // Ordina per indiceOriginale decrescente (più recente prima)
      arr2.sort((a,b) => (b.indiceOriginale||0) - (a.indiceOriginale||0));
    } else if (criterio === 'nome') {
      arr2.sort((a,b) => a2z(cp(chiaveNomeCompleto(a.nome)), cp(chiaveNomeCompleto(b.nome))));
    } else if (criterio === 'cognome') {
      arr2.sort((a,b) => a2z(cp(chiaveCognomeNome(a.nome)), cp(chiaveCognomeNome(b.nome))));
    } else if (criterio === 'cibo') {
      const ordCibo = {'baby':0,'veg':1,'vegetariano':1,'carne':2,'pesce':3};
      arr2.sort((a,b) => {
        const ca = ordCibo[detectSecondo(a.secondo)] ?? 9;
        const cb = ordCibo[detectSecondo(b.secondo)] ?? 9;
        if (ca !== cb) return ca - cb;
        return a2z(cp(chiaveCognomeNome(a.nome)), cp(chiaveCognomeNome(b.nome)));
      });
    } else if (criterio === 'tavolo') {
      function normTV(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
      function matchTV(nomeInvitato, personaTavolo) {
        const a = normTV(nomeInvitato).split(/\s+/).filter(Boolean);
        const b = normTV(personaTavolo).split(/\s+/).filter(Boolean);
        return a.every(w=>b.includes(w)) || b.every(w=>a.includes(w));
      }
      function numTavolo(nome) {
        for (let i = 0; i < TAVOLI.length; i++) {
          if (TAVOLI[i].persone.some(p => matchTV(nome, p))) return i;
        }
        return 9999;
      }
      arr2.sort((a,b) => {
        const na = numTavolo(a.nome||''), nb = numTavolo(b.nome||'');
        if (na !== nb) return na - nb;
        return a2z(cp(chiaveCognomeNome(a.nome)), cp(chiaveCognomeNome(b.nome)));
      });
    } else if (criterio === 'eta') {
      arr2.sort((a,b) => {
        const ea = getEtaAnni(a.nome), eb = getEtaAnni(b.nome);
        // Chi non ha età va in fondo; più vecchio (età maggiore) prima
        if (ea !== null && eb !== null) return eb - ea;
        if (ea !== null) return -1;
        if (eb !== null) return 1;
        return a2z(cp(chiaveCognomeNome(a.nome)), cp(chiaveCognomeNome(b.nome)));
      });
    }
    return arr2;
  }

  // Raccoglie gli invitati da Invitati.csv che non hanno ancora risposto
  function calcolaInAttesa() {
    if (!window.datiInvitati || !window.totInvitatiCsvRaw) return [];
    const acc = /[\u0300-\u036f]/g;
    function tok(n) { return (n||'').toLowerCase().normalize('NFD').replace(acc,'').trim().split(/\s+/).filter(Boolean); }
    function matchN(a, b) {
      const ta = tok(a), tb = tok(b);
      return ta.every(w=>tb.includes(w)) || tb.every(w=>ta.includes(w));
    }
    // Tutti i nomi del CSV
    const tuttiInvitati = window.tuttiInvitatiCsvRaw || [];
    // Nomi che hanno già risposto
    const hannoRisposto = window.datiInvitati.map(r => r.nome || '');
    // Filtra chi NON ha risposto
    return tuttiInvitati.filter(inv => {
      return !hannoRisposto.some(nr => matchN(inv.nome, nr));
    });
  }

    // ── fitSidebarTokens: riduce font-size di ogni token se supera la colonna ──
    function fitSidebarTokens(sb) {
      const available = sb.clientWidth - 8; // 4px padding per lato
      if (available <= 0) return;
      sb.querySelectorAll('.fp-side-cognome-token, .fp-side-nome-token').forEach(span => {
        // Legge il font-size corrente calcolato dal browser
        let fs = parseFloat(window.getComputedStyle(span).fontSize);
        const minFs = 9;
        // Riduce finché entra oppure raggiunge il minimo
        while (span.scrollWidth > available && fs > minFs) {
          fs -= 0.5;
          span.style.fontSize = fs + 'px';
        }
      });
    }

    // ── DOM ───────────────────────────────────────────────────────────────

    const ctrlPlay = document.createElement('button'); ctrlPlay.className = 'fp-ctrl-btn'; ctrlPlay.textContent = '▶';
    ctrlPlay.onclick = e => { e.stopPropagation(); togglePlay(ctrlPlay); };

    [ctrlPlay, ctrlStop, ctrlSx, ctrlDx, ctrlBar].forEach(el => {

    // ── Precaricamento foto gruppo in memoria ─────────────────────────────
    // thumbCache: Map  cognomeNome → HTMLImageElement (già caricato) | null
    const thumbCache = new Map();
    const normKG = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const escapeHtml = s => String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

    function nomeToFilename(n) {
      return trovaNomeCanonico(n) || n;
    }
    function thumbSrcFor(cognomeNome) {
      const match = (window.fotoDisponibili||[]).find(f => f && normKG(f.nome)===normKG(cognomeNome));
      return match && match.file ? 'Foto/'+match.file : null;
    }
    function aggiornaFotoDisponibilePerNome(nomeRef, file) {
      const keyRef = normKG(nomeRef);
      [window.fotoDisponibili || [], foto || []].forEach(lista => {
        lista.forEach(item => {
          if (!item) return;
          const itemKey = normKG(nomeToFilename(item.nome || '') || item.nome || '');
          const itemKey2 = normKG(item.nome || '');
          if (itemKey === keyRef || itemKey2 === keyRef) item.file = file;
        });
      });
      document.querySelectorAll('.risposta-nome[data-nomefile]').forEach(el => {
        const elKey = normKG(el.getAttribute('data-nomefile') || '');
        if (elKey === keyRef) el.setAttribute('data-foto-file', file);
      });
    }
    function srcForVoce(voce) {
      if (voce && voce.file) return 'Foto/' + voce.file;
      const nomeCanonico = nomeToFilename(voce && voce.nome ? voce.nome : '');
      const cachedImg = thumbCache.get(normKG(nomeCanonico));
      if (cachedImg && cachedImg.src) return cachedImg.src;
      return null;
    }

    // Fetch diretto con varianti nome+estensione, aggiorna cache e DOM quando trova
    function cercaFotoDirectly(cn, key) {
      const varianti = [cn, cn.normalize('NFD').replace(/[\u0300-\u036f]/g,'')];
      const estensioni = ['jpg','JPG','jpeg','JPEG'];
      let trovata = false;
      let chiuso = false;
      assetFetchStart();
      function fineRicerca() {
        if (chiuso) return;
        chiuso = true;
        assetFetchEnd();
      }
      function prova(vi, ei) {
        if (trovata || vi >= varianti.length) {
          if (!trovata) thumbCache.set(key, null); // non esiste
          fineRicerca();
          return;
        }
        if (ei >= estensioni.length) { prova(vi+1, 0); return; }
        const url = 'Foto/'+varianti[vi]+'.'+estensioni[ei];
        fetch(url, {method:'HEAD'})
          .then(r => {
            if (r.ok && !trovata) {
              trovata = true;
              const file = varianti[vi]+'.'+estensioni[ei];
              const im = new Image();
              im.onload = () => {
                im._ready = true;
                thumbCache.set(key, im);
                aggiornaFotoDisponibilePerNome(cn, file);
                if (typeof window.__notifyPhotoResolved === 'function') {
                  window.__notifyPhotoResolved(cn, file);
                }
                // aggiorna wrap già nel DOM per questo nome (attributo data-ck)
                document.querySelectorAll('[data-ck="'+key+'"]').forEach(wrap => {
                  wrap.innerHTML = '';
                  const imgEl = document.createElement('img');
                  imgEl.className = 'fp-group-thumb';
                  imgEl.src = im.src;
                  wrap.appendChild(imgEl);
                });
                fineRicerca();
              };
              im.onerror = () => { thumbCache.set(key, null); fineRicerca(); };
              im.src = url;
            } else { prova(vi, ei+1); }
          })
          .catch(() => prova(vi, ei+1));
      }
      prova(0, 0);
    }

    // Calcola il gruppo della foto iniziale e precarica tutte le miniature
    function calcolaGruppo(nomeVoce) {
      const nomeCanonico = trovaNomeCanonico(nomeVoce) || nomeVoce;
      return (window.mapGruppo||{})[normKG(nomeCanonico)]
          || (window.mapGruppo||{})[normKG(nomeVoce)]
          || [];
    }

    function precaricaGruppo(gruppo) {
      gruppo.forEach(nomeGruppo => {
        const cn = nomeToFilename(nomeGruppo);
        const key = normKG(cn);
        if (thumbCache.has(key)) return;
        const src = thumbSrcFor(cn);
        if (src) {
          // foto già verificata da fotoDisponibili
          const im = new Image();
          im.onload  = () => { im._ready = true; thumbCache.set(key, im); };
          im.onerror = () => thumbCache.set(key, null);
          im.src = src;
          thumbCache.set(key, im);
        } else {
          // non trovata in fotoDisponibili (es. card non nel DOM corrente) — fetch diretto
          thumbCache.set(key, undefined); // in ricerca
          cercaFotoDirectly(cn, key);
        }
      });
    }

    // Costruisce le miniature: se la cache non è ancora pronta riprova dopo 200ms
    function costruisciMiniature(voce, tentativo) {
      const nomeVoce = voce.nome || '';
      const nomeCanonicoVoce = trovaNomeCanonico(nomeVoce) || nomeVoce;
      const gruppo = calcolaGruppo(nomeVoce);
      precaricaGruppo(gruppo);

      colLeft.innerHTML = '';

      // Mostra il nome del gruppo in cima
      const nomeGruppoDisplay = (() => {
        const gList = window.gruppiCsvOrdinati || [];
        for (const g of gList) {
          const membri = g.membri || g;
          if (membri.some(m => normKG(m) === normKG(nomeCanonicoVoce) || normKG(m) === normKG(nomeVoce))) {
            return g.nome || '';
          }
        }
        return '';
      })();
      if (nomeGruppoDisplay) {
        const gruppoHeader = document.createElement('div');
        gruppoHeader.style.cssText = 'width:100%;text-align:center;margin-bottom:8px;padding:4px 8px;box-sizing:border-box;';
        gruppoHeader.innerHTML = `<span style="display:inline-block;background:#fff9c4;border:1.5px solid #d4b07a;border-radius:16px;padding:3px 12px;font-family:\'Cormorant Garamond\',serif;font-size:clamp(12px,1.2vw,18px);font-weight:700;color:#7a5c3a;letter-spacing:0.5px;">✦ ${escapeHtml(nomeGruppoDisplay)} ✦</span>`;
        colLeft.appendChild(gruppoHeader);
      }

      for (let r = 0; r < gruppo.length; r += 3) {
        const riga = document.createElement('div');
        riga.className = 'fp-group-row';
        riga.style.justifyContent = 'flex-start';
        for (let c = r; c < Math.min(r+3, gruppo.length); c++) {
          const nomeGruppo = gruppo[c];
          const cn = nomeToFilename(nomeGruppo);
          const isMe = normKG(cn)===normKG(nomeCanonicoVoce) || normKG(nomeGruppo)===normKG(nomeCanonicoVoce);

          const cell = document.createElement('div');
          cell.className = 'fp-group-cell';

          const wrap = document.createElement('div');
          wrap.className = 'fp-group-thumb-wrap' + (isMe ? ' highlight' : '');
          wrap.setAttribute('data-ck', normKG(cn)); // per aggiornamento asincrono

          const cachedImg = thumbCache.get(normKG(cn));
          if (cachedImg && cachedImg._ready) {
            // foto pronta
            const imgEl = document.createElement('img');
            imgEl.className = 'fp-group-thumb';
            imgEl.src = cachedImg.src;
            imgEl.alt = cn;
            wrap.appendChild(imgEl);
          } else if (cachedImg === null) {
            // nessuna foto
            const ph = document.createElement('div');
            ph.className = 'fp-group-placeholder';
            ph.textContent = '📷';
            wrap.appendChild(ph);
          } else {
            // in caricamento (Image obj o undefined): wrap vuoto, si aggiorna via data-ck
            // nessun placeholder visibile — la foto apparirà quando pronta
            requestVisualRefreshWhenAssetsReady();
            if (cachedImg && cachedImg.addEventListener) {
              cachedImg.addEventListener('load', () => {
                wrap.innerHTML = '';
                const imgEl = document.createElement('img');
                imgEl.className = 'fp-group-thumb';
                imgEl.src = cachedImg.src;
                imgEl.alt = cn;
                wrap.appendChild(imgEl);
              }, {once:true});
            }
          }

          const idxTarget = (window.fotoDisponibili||[]).findIndex(f => f && normKG(f.nome)===normKG(cn));
          if (idxTarget >= 0) {
            cell.style.cursor = 'pointer';
            cell.onclick = e => { e.stopPropagation(); stopPlay(false); vai(idxTarget); };
          }

          const lbl = document.createElement('div');
          lbl.className = 'fp-group-label' + (isMe ? ' highlight' : '');
          const pDisp = partiNomeRaw(cn);
          lbl.innerHTML = '<span class="fp-line">'+escapeHtml(pDisp.cognome || cn)+'</span><span class="fp-line">'+escapeHtml(pDisp.nome || '')+'</span>';

          cell.appendChild(wrap);
          cell.appendChild(lbl);
          riga.appendChild(cell);
        }
        colLeft.appendChild(riga);
      }
    }

    let currentGen = 0; // generazione corrente: annulla callback di navigazioni precedenti
    let stageWaitTimer = null; // evita che il palco resti vuoto mentre la foto arriva

    function normalizzaLayerFoto() {
      const frontA = imgA.classList.contains('front');
      const frontB = imgB.classList.contains('front');
      if (frontA && !frontB) {
        imgFront = imgA; imgBack = imgB;
      } else if (frontB && !frontA) {
        imgFront = imgB; imgBack = imgA;
      } else {
        imgA.classList.add('front');
        imgB.classList.remove('front');
        imgFront = imgA;
        imgBack = imgB;
      }
      imgFront.style.pointerEvents = 'auto';
      imgBack.style.pointerEvents = 'none';
    }

    function cancellaAttesaStage() {
      if (stageWaitTimer) { clearTimeout(stageWaitTimer); stageWaitTimer = null; }
    }

    function pianificaPlaceholderStage(voce, gen, delay) {
      cancellaAttesaStage();
      stageWaitTimer = setTimeout(() => {
        if (currentGen !== gen) return;
        mostraStagePlaceholder(voce, null, false); // no nome durante caricamento
      }, delay || 220);
    }

    function preparaStatoSenzaFoto(voce) {
      cancellaAttesaStage();
      normalizzaLayerFoto();
      imgFront.src = '';
      imgBack.src = '';
      imgFront.classList.add('front');
      imgBack.classList.remove('front');
      stage.style.background = '#4a6a2a';
      mostraStagePlaceholder(voce, null, true); // mostra nome: nessuna foto disponibile
    }

    function caricaEVisualizzaFoto(src, voce, gen, immediato) {
      normalizzaLayerFoto();
      pianificaPlaceholderStage(voce, gen, 220);
      const preload = new Image();
      preload.onload = () => {
        if (currentGen !== gen) return;
        cancellaAttesaStage();
        rimuoviStagePlaceholder();
        stage.style.background = '';
        if (immediato) {
          imgFront.src = src;
          imgFront.classList.add('front');
          imgBack.classList.remove('front');
          imgFront.style.pointerEvents = 'auto';
          imgBack.style.pointerEvents = 'none';
          // Ricalcola posizione barra portrait con dimensioni reali foto
          requestAnimationFrame(aggiornaOrientamento);
          return;
        }
        imgBack.src = src;
        imgBack.classList.remove('front');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (currentGen !== gen) return;
          imgBack.classList.add('front');
          imgFront.classList.remove('front');
          setTimeout(() => {
            if (currentGen !== gen) return;
            [imgFront, imgBack] = [imgBack, imgFront];
            imgFront.style.pointerEvents = 'auto';
            imgBack.style.pointerEvents = 'none';
            // Ricalcola posizione barra portrait con dimensioni reali foto
            requestAnimationFrame(aggiornaOrientamento);
          }, 1000);
        }));
      };
      preload.onerror = () => {
        if (currentGen !== gen) return;
        cancellaAttesaStage();
        if (assetReloadState.pending > 0) requestVisualRefreshWhenAssetsReady();
        preparaStatoSenzaFoto(voce);
      };
      preload.src = src;
    }

    function rimuoviStagePlaceholder() {
      const oldSph = stage.querySelector('.fp-stage-placeholder');
      if (oldSph) stage.removeChild(oldSph);
    }

    function mostraStagePlaceholder(voce, icona, mostraNome) {
      rimuoviStagePlaceholder();
      stage.style.background = '#4a6a2a';
      if (!mostraNome) return; // niente nome durante le transizioni
      const partiPh = partiNomeRaw(voce && voce.nome ? voce.nome : '');
      const sph = document.createElement('div');
      sph.className = 'fp-stage-placeholder';
      sph.innerHTML =
        '<div class="fp-stage-empty">' +
          '<div class="fp-stage-empty-cognome">' + escapeHtml(partiPh.cognome || (voce && voce.nome) || '') + '</div>' +
          '<div class="fp-stage-empty-nome">' + escapeHtml(partiPh.nome || '') + '</div>' +
        '</div>';
      stage.appendChild(sph);
    }

    function aggiornaContenuto(i, immediato) {
      const gen = ++currentGen; // ogni chiamata ha la sua generazione
      const voce = foto[i] || { nome: nomeFile, file: null };
      const src = srcForVoce(voce);
      const {icona,desc} = infoSecondo(voce.nome);

      // barra inferiore portrait
      infoBar.textContent = (i+1)+' / '+foto.length+' – '+voce.nome+(icona?'  '+icona:'');

      // sidebar destra: numero, cognome (ogni parola su riga separata), nome (idem), no emoji, no desc
      sideNum.textContent = (i+1)+' / '+foto.length;
      const parti = partiNomeRaw(voce.nome||'');
      // Cognome: ogni parola su riga separata, font auto-scalato
      const cognomeParts = (parti.cognome || voce.nome || '').split(/\s+/).filter(Boolean);
      const nCog = cognomeParts.length;
      const cfBase = nCog >= 3 ? '2.4vw' : nCog === 2 ? '2.8vw' : '3.4vw';
      const cfMin  = nCog >= 3 ? '11px'  : nCog === 2 ? '13px'  : '16px';
      const cfMax  = nCog >= 3 ? '34px'  : nCog === 2 ? '42px'  : '54px';
      sideCognome.innerHTML = cognomeParts.map(tok =>
        `<span class="fp-side-cognome-token" style="font-size:clamp(${cfMin},${cfBase},${cfMax})">${escapeHtml(tok)}</span>`
      ).join('');
      // Nome: ogni parola su riga separata (es. "Maria Antonietta" → 2 righe)
      const nomeParts = (parti.nome || '').split(/\s+/).filter(Boolean);
      const nNom = nomeParts.length;
      const nfBase = nNom >= 3 ? '2.0vw' : nNom === 2 ? '2.2vw' : '2.4vw';
      const nfMin  = nNom >= 3 ? '10px'  : nNom === 2 ? '11px'  : '12px';
      const nfMax  = nNom >= 3 ? '26px'  : nNom === 2 ? '30px'  : '34px';
      sideNome.innerHTML = nomeParts.map(tok =>
        `<span class="fp-side-nome-token" style="font-size:clamp(${nfMin},${nfBase},${nfMax})">${escapeHtml(tok)}</span>`
      ).join('');
      sideEmoji.textContent = '';
      sideDesc.textContent  = '';
      // Auto-scala ogni token che eccede la larghezza disponibile della sidebar
      requestAnimationFrame(() => fitSidebarTokens(sidebar));

      // colonna sinistra: miniature gruppo
      costruisciMiniature(voce);

      if (!src) {
        if (assetReloadState.pending > 0) requestVisualRefreshWhenAssetsReady();
        preparaStatoSenzaFoto(voce);
        return;
      }

      caricaEVisualizzaFoto(src, voce, gen, !!immediato);
    }

    function vai(i) { idx=i; nascondiFocusFrame(); aggiornaContenuto(idx,false); }

    // ── Play / Pausa ──────────────────────────────────────────────────────
    function playing() { return playTimer!==null; }

    // ── Wake Lock: impedisce lo screensaver durante la presentazione ──────
    let _wakeLock = null;
    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        _wakeLock = await navigator.wakeLock.request('screen');
        _wakeLock.addEventListener('release', () => { _wakeLock = null; });
      } catch(e) { /* permesso negato o non supportato */ }
    }
    function releaseWakeLock() {
      if (_wakeLock) { _wakeLock.release(); _wakeLock = null; }
    }
    // Riacquisisce il lock se la pagina torna visibile mentre è in play
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && playing()) acquireWakeLock();
    });

    function startPlay(btn) {
      playTimer = setInterval(()=>{ idx=(idx+1)%foto.length; aggiornaContenuto(idx,false); }, PLAY_INTERVAL);
      [btn, ctrlPlay].forEach(b => { if(b){ b.textContent='⏸'; b.setAttribute('data-play','1'); }});
      audio.play().catch(()=>{});
      acquireWakeLock();
    }
    function stopPlay(reset) {
      if (playTimer) { clearInterval(playTimer); playTimer=null; }
      [btnPlay, ctrlPlay].forEach(b => { if(b){ b.textContent='▶'; b.removeAttribute('data-play'); }});
      audio.pause(); if (reset) audio.currentTime=0;
      releaseWakeLock();
    }
    function togglePlay(btn) {
      if (playing()) { stopPlay(false); } else { startPlay(btn); }
    }

    // ── Orientamento ──────────────────────────────────────────────────────
    // Usa sempre il rapporto larghezza/altezza della viewport:
    // se < 1 → portrait (vale anche su monitor con finestra stretta)
    function aggiornaOrientamento() {
      const landscape = window.innerWidth / window.innerHeight >= 1;
      overlay.classList.toggle('landscape', landscape);
      overlay.classList.toggle('portrait', !landscape);
      // In portrait: posiziona la barra a metà tra il bordo inferiore
      // della foto (object-fit:contain) e il fondo della viewport.
      if (!landscape) {
        const sr = stage.getBoundingClientRect();
        const natW = imgFront.naturalWidth  || 0;
        const natH = imgFront.naturalHeight || 0;
        let fotoBottom;
        if (natW && natH) {
          const scale = Math.min(sr.width / natW, sr.height / natH);
          const fotoH = natH * scale;
          fotoBottom = sr.top + (sr.height + fotoH) / 2; // px dal top della viewport
        } else {
          fotoBottom = sr.bottom; // fallback: nessuna immagine ancora caricata
        }
        const vH = window.innerHeight;
        const spazio = vH - fotoBottom; // spazio libero sotto la foto
        const barH = bar.offsetHeight || 56;
        const bottomPos = spazio / 2 - barH / 2;
        bar.style.bottom = Math.max(8, Math.round(bottomPos)) + 'px';
        bar.style.background = 'none';
      } else {
        bar.style.bottom = '';
        bar.style.background = '';
      }
    }
    window.addEventListener('resize', aggiornaOrientamento);
    window.addEventListener('orientationchange', () => {
      setTimeout(aggiornaOrientamento, 100); // iOS ritarda il viewport update
    });
    if (screen.orientation) screen.orientation.addEventListener('change', aggiornaOrientamento);
    aggiornaOrientamento();

    // ── Tastiera ──────────────────────────────────────────────────────────
    function onKey(e) {
      if (e.key==='ArrowRight') { stopPlay(false); vai((idx+1)%foto.length); }
      if (e.key==='ArrowLeft')  { stopPlay(false); vai((idx-1+foto.length)%foto.length); }
      if (e.key===' ')          { e.preventDefault(); togglePlay(btnPlay); }
      if (e.key==='Escape')     { chiudiPopup(); }
    }
    document.addEventListener('keydown', onKey);

    // ── Swipe touch ───────────────────────────────────────────────────────
    let touchStartX=0;
    overlay.addEventListener('touchstart', e=>{ touchStartX=e.changedTouches[0].clientX; }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      const dx=e.changedTouches[0].clientX-touchStartX;
      if (Math.abs(dx)<40) return;
      stopPlay(false);
      if (dx<0) vai((idx+1)%foto.length); else vai((idx-1+foto.length)%foto.length);
    }, {passive:true});

    colLeft.addEventListener('touchend', e => {
      if (!overlay.classList.contains('landscape')) return;
      e.stopPropagation(); chiudiPopup();
    }, {passive:true});
    colLeft.addEventListener('click', e => {
      if (!overlay.classList.contains('landscape')) return;
      e.stopPropagation(); chiudiPopup();
    });

    // ── Tap touch in landscape: stage=play/pausa, sidebar=chiudi ─────────
    let touchMoved = false;
    stage.addEventListener('touchstart', () => { touchMoved = false; }, {passive:true});
    stage.addEventListener('touchmove',  () => { touchMoved = true;  }, {passive:true});
    stage.addEventListener('touchend', e => {
      if (touchMoved) return; // era uno swipe, ignora
      if (!overlay.classList.contains('landscape')) return; // in portrait gestisce la barra
      e.stopPropagation();
      togglePlay(btnPlay);
    }, {passive:true});

    sidebar.addEventListener('touchend', e => {
      if (!overlay.classList.contains('landscape')) return;
      e.stopPropagation();
      chiudiPopup();
    }, {passive:true});

    // ── Cornice focus foto grande ─────────────────────────────────────────
    const focusFrame = document.createElement('div');
    focusFrame.style.cssText = 'position:fixed;pointer-events:none;z-index:10000;border:3px solid rgba(245,215,138,0.9);box-sizing:border-box;opacity:0;transition:opacity 0.2s;display:none;';
    document.body.appendChild(focusFrame);
    let focusTimer = null;
    function getFotoRect() {
      const sr=stage.getBoundingClientRect();
      if(!imgFront.naturalWidth||!imgFront.naturalHeight) return sr;
      const scale=Math.min(sr.width/imgFront.naturalWidth,sr.height/imgFront.naturalHeight);
      const fw=imgFront.naturalWidth*scale,fh=imgFront.naturalHeight*scale;
      return {left:sr.left+(sr.width-fw)/2,top:sr.top+(sr.height-fh)/2,width:fw,height:fh};
    }
    function mostraFocusFrame() {
      const r=getFotoRect();
      Object.assign(focusFrame.style,{left:r.left+'px',top:r.top+'px',width:r.width+'px',height:r.height+'px',display:'block'});
      void focusFrame.offsetWidth; focusFrame.style.opacity='1';
      if(focusTimer) clearTimeout(focusTimer);
      focusTimer=setTimeout(()=>{focusFrame.style.opacity='0';setTimeout(()=>{focusFrame.style.display='none';},250);focusTimer=null;},1800);
    }
    function nascondiFocusFrame() {
      if(focusTimer){clearTimeout(focusTimer);focusTimer=null;}
      focusFrame.style.opacity='0'; focusFrame.style.display='none';
    }
    stage.addEventListener('click',e=>{
      if(e.target.closest&&(e.target.closest('[data-arrow]')||e.target.closest('button'))) return;
      mostraFocusFrame();
    });
    const notifyPhotoResolved = (nomeRef, file) => {
      aggiornaFotoDisponibilePerNome(nomeRef, file);
      const corrente = foto[idx];
      if (!corrente) return;
      const keyCorrente = normKG(nomeToFilename(corrente.nome || '') || corrente.nome || '');
      const keyRisolto = normKG(nomeToFilename(nomeRef || '') || nomeRef || '');
      if (keyCorrente === keyRisolto) aggiornaContenuto(idx, true);
    };
    window.__notifyPhotoResolved = notifyPhotoResolved;

    const refreshPopupFromAssets = () => {
      const nomeCorrente = (foto[idx] && foto[idx].nome) || nomeFile || '';
      const domEls = [...document.querySelectorAll('.risposta-nome[data-nomefile]')]
        .filter(el => el.closest('.risposta-card') && el.closest('.risposta-card').style.display !== 'none');
      const aggiornate = domEls.map(el => ({
        nome: el.getAttribute('data-nomefile'),
        file: el.getAttribute('data-foto-file') || null
      }));
      if (!aggiornate.length) return;
      const nuovoIdx = aggiornate.findIndex(f => f && f.nome === nomeCorrente);
      foto.length = 0;
      aggiornate.forEach(f => foto.push(f));
      window.fotoDisponibili = foto;
      if (nuovoIdx >= 0) idx = nuovoIdx;
      if (idx >= foto.length) idx = foto.length - 1;
      if (idx < 0) idx = 0;
      aggiornaContenuto(idx, true);
    };
    window.__refreshPopupFromAssets = refreshPopupFromAssets;

    // ── Chiusura ──────────────────────────────────────────────────────────
    function chiudiPopup() {
      cancellaAttesaStage();
      nascondiFocusFrame();
      if(document.body.contains(focusFrame)) document.body.removeChild(focusFrame);
      stopPlay(true); releaseWakeLock();
      document.removeEventListener('keydown', onKey);
      window.removeEventListener('resize', aggiornaOrientamento);
      window.removeEventListener('orientationchange', aggiornaOrientamento);
      if (screen.orientation) screen.orientation.removeEventListener('change', aggiornaOrientamento);
      if (window.__refreshPopupFromAssets === refreshPopupFromAssets) window.__refreshPopupFromAssets = null;
      if (window.__notifyPhotoResolved === notifyPhotoResolved) window.__notifyPhotoResolved = null;
      document.body.removeChild(overlay);
    }
    overlay.onclick = e=>{ if (e.target===overlay || e.target===stage || e.target===layout) chiudiPopup(); };

    // ── Prima visualizzazione ─────────────────────────────────────────────
    aggiornaContenuto(idx, true);
    document.body.appendChild(overlay);
  }

  function scaricaBackupCSV() {
    if (!window.datiInvitati || window.datiInvitati.length === 0) {
      alert('Nessun dato da salvare.');
      return;
    }
    // Intestazione colonne
    const colonne = ['Nome', 'Presenza', 'Secondo', 'Allergie', 'Note', 'Data'];
    const righe = [colonne.join(';')];

    window.datiInvitati.forEach(r => {
      const cella = v => '"' + String(v || '').replace(/"/g, '""') + '"';
      righe.push([
        cella(r.nome),
        cella(r.presenza),
        cella(r.secondo),
        cella(r.allergie),
        cella(r.note),
        cella(r.data)
      ].join(';'));
    });

    const csv = '\uFEFF' + righe.join('\r\n'); // BOM per Excel italiano
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const _d = new Date(), _p = n => String(n).padStart(2,'0');
    const ts = _d.getFullYear()+'-'+_p(_d.getMonth()+1)+'-'+_p(_d.getDate())+'-'+_p(_d.getHours())+'-'+_p(_d.getMinutes())+'-'+_p(_d.getSeconds());
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Matrimonio-' + ts + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
