    },

, titoloAttesa: "En espera de respuesta", titoloConferma: "En espera de confirmación", msgAttesaVuota: "Todos los invitados han respondido.", msgCancellazionePendente: "Eliminando...", msgCancellazioneOk: "Tarjeta eliminada.", msgCancellazioneKo: "Eliminación NO completada en el servidor.", msgUscitaConPendente: "Atención: hay una eliminación en curso. ¿Esperar antes de salir?"
    }
  };

  window.addEventListener('DOMContentLoaded', () => {
    document.fonts.ready.then(() => {
      caricaTavoli();
      caricaRisposte();
      caricaTelefoni();
    });
  });

  window.mapTelefoni = {};
  async function caricaTelefoni() {
    try {
      const resp = await fetch('Telefoni.txt?t=' + Date.now());
      if (!resp.ok) return;
      const txt = await resp.text();
      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      txt.split(/\r?\n/).forEach(riga => {
        const m = riga.match(/^(.+?)\s{2,}(\S+)$/);
        if (!m) return;
        const nome = m[1].trim(); const cell = m[2].trim();
        if (cell === '\u2014' || cell === '-') return;
        window.mapTelefoni[norm(nome)] = cell;
      });
    } catch(e) {}
  }

  async function caricaTavoli() {
    try {
      const response = await fetch('Tavoli.txt?t=' + Date.now());
      if (response.ok) {
        const text = await response.text();
        const righe = text.split(/\r?\n/);
        TAVOLI = [];
        let tavoloCorrente = null;
        righe.forEach(riga => {
          const r = riga.trim();
          if (!r) return;
          if (r.startsWith('#')) {
            tavoloCorrente = { nome: r.substring(1).trim(), persone: [] };
            TAVOLI.push(tavoloCorrente);
          } else if (tavoloCorrente) {
            tavoloCorrente.persone.push(r);
          }
        });
        if (document.getElementById('sezione-tavoli')) renderizzaTavoli();
      }
    } catch (err) {}

    try {
      const respInv = await fetch('Invitati.csv?t=' + Date.now());
      if (respInv.ok) {
        const txtInv = await respInv.text();
        const righeInv = txtInv.split(/\r?\n/).map(r => r.trim());
        const sepInv = txtInv.includes(';') ? ';' : ',';
        const acc = /[\u0300-\u036f]/g;
        window.mapNascita = {};
        window.tuttiInvitatiCsvRaw = [];
        let totCsv = 0;
        let startInv = (righeInv.length > 0 && righeInv[0].toLowerCase().includes('nom')) ? 1 : 0;
        for (let i = startInv; i < righeInv.length; i++) {
          const cols = righeInv[i].split(sepInv);
          const nome = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          const dataN = cols[1] ? cols[1].replace(/['"]/g,'').trim() : '';
          if (nome) {
            totCsv++;
            window.tuttiInvitatiCsvRaw.push({ nome, dataNascita: dataN });
            if (dataN) window.mapNascita[nome.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
          }
        }
        window.totInvitatiCsv = totCsv;
        (function() {
          const el = document.getElementById('titolo-pagina');
          if (el) {
            const testi = dizionario[currentLang];
            el.innerHTML = testi.titolo + ' <small style="font-size:0.5em;font-weight:600;color:#000;vertical-align:middle;">(' + totCsv + ')</small>';
          }
        })();

        window.mapGruppo = {};
        const normK = s => (s||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
        let gruppoCorrente = [];
        const flushGruppo = () => {
          if (gruppoCorrente.length > 0) {
            const copia = [...gruppoCorrente];
            copia.forEach(n => { window.mapGruppo[normK(n)] = copia; });
            gruppoCorrente = [];
          }
        };
        for (let i = startInv; i < righeInv.length; i++) {
          const riga = righeInv[i];
          if (!riga) { flushGruppo(); continue; }
          const cols = riga.split(sepInv);
          const n = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          if (!n) { flushGruppo(); continue; }
          gruppoCorrente.push(n);
        }
        flushGruppo();

        window.gruppiCsvOrdinati = [];
        let _gc = [];
        for (let i = startInv; i < righeInv.length; i++) {
          const _r = righeInv[i];
          if (!_r) { if (_gc.length) { window.gruppiCsvOrdinati.push([..._gc]); _gc = []; } continue; }
          const _c = _r.split(sepInv);
          const _nr = _c[0] ? _c[0].replace(/['"]/g,'').trim() : '';
          if (!_nr) { if (_gc.length) { window.gruppiCsvOrdinati.push([..._gc]); _gc = []; } continue; }
          _gc.push(_nr);
        }
        if (_gc.length) window.gruppiCsvOrdinati.push(_gc);
      }
    } catch(e) {}
  }

  function cambiaLingua(lang) {
    if (lang === currentLang) lang = (lang === 'it') ? 'es' : 'it';
    currentLang = lang;
    document.getElementById('btn-it').classList.toggle('active-lang', lang === 'it');
    document.getElementById('btn-es').classList.toggle('active-lang', lang === 'es');
    const _totH1 = window.totInvitatiCsv ? ' <small style="font-size:0.5em;font-weight:600;color:#000;vertical-align:middle;">(' + window.totInvitatiCsv + ')</small>' : '';
    document.getElementById('titolo-pagina').innerHTML = dizionario[lang].titolo + _totH1;
    if (window.datiInvitati && window.datiInvitati.length > 0) renderizzaDati();
  }

  function normalizeText(value) {
    return (value || '').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s === '4') return 'baby';
    if (s === '5') return 'segnaposto';
    if (s.includes('veget') || s.includes('vegan')) return 'veg';
    if (s.includes('carne') || s.includes('meat')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function isAbsent(presenza, secondo) {
    const p = normalizeText(presenza);
    if (p === '0' || p === 'false' || p === 'no' || p.includes('non') || p.includes('assente') || p === '') {
        if (p === '' && detectSecondo(secondo) !== '') return false;
        return true;
    }
    return false;
  }

  function hasAllergy(value) {
    if (!value) return false;
    const s = normalizeText(value).replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim();
    if (!s || ['no', 'nessuna', 'nessuno', 'nessun', 'niente', 'nulla', 'nd', '0', 'false'].includes(s)) return false;
    return true;
  }

  function iconaAllergie(value) {
    if (!hasAllergy(value)) return '';
    const mappa = { 'formaggi': '🧀', 'glutine': '🌾', 'lattosio': '🥛', 'frutta secca': '🥜', 'uova': '🥚', 'crostacei': '🦐', 'soia': '🫘', 'pesce': '🐟', 'sedano': '🥦' };
    const voci = value.split(',').map(v => v.trim().toLowerCase());
    const icone = [];
    voci.forEach(v => {
      if (mappa[v]) { if (!icone.includes(mappa[v])) icone.push(mappa[v]); }
      else { if (!icone.includes('⚠️')) icone.push('⚠️'); }
    });
    return icone.join('');
  }

  function secondBadge(secondo, assente) {
    if (assente) return '<span class="muted">—</span>';
    const tipo = detectSecondo(secondo);
    const testi = dizionario[currentLang];
    if (tipo === 'veg') return `<span class="badge badge-veg">${testi.badgeVeg}</span>`;
    if (tipo === 'carne') return `<span class="badge badge-carne">${testi.badgeCarne}</span>`;
    if (tipo === 'pesce') return `<span class="badge badge-pesce">${testi.badgePesce}</span>`;
    return '<span class="muted">—</span>';
  }

  function toggleDettagli(id) {
    const el = document.getElementById('dettagli-' + id);
    el.style.display = (el.style.display === 'block') ? 'none' : 'block';
  }

  function filtraLista(categoria) {
    activeFilter = (activeFilter === categoria) ? null : categoria;
    document.querySelectorAll('.kpi-box').forEach(el => el.classList.remove('active-filter'));
    if (activeFilter) document.getElementById('btn-' + activeFilter).classList.add('active-filter');
    document.querySelectorAll('.risposta-card').forEach(card => {
      card.style.display = (!activeFilter || card.classList.contains('cat-' + activeFilter)) ? 'block' : 'none';
    });
  }

  function caricaRisposte() {
    const box = document.getElementById('sposi-table');
    const testi = dizionario[currentLang];
    box.innerHTML = '<p id="txt-caricamento" style="text-align:center;padding:20px"><span style="font-size:24px;font-weight:700">' + testi.caricamento + '</span><br><small style="color:#b8893a;font-size:13px;font-weight:600">' + APP_VERSION + '</small></p>';
    fetch(SCRIPT_URL + '?t=' + Date.now())
      .then(r => r.text()).then(txt => JSON.parse(txt))
      .then(data => {
        if (!data.ok || !data.rows || data.rows.length === 0) {
          box.innerHTML = `<p style="text-align:center;padding:20px;color:var(--text-light)">${testi.nessunaRisposta}</p><button class="btn-submit" onclick="caricaRisposte()">↻ ${testi.aggiorna}</button>`;
          return;
        }
        let righeMappate = data.rows.map((r, i) => ({ ...r, presenza: r.presenza !== undefined ? r.presenza : String(r.persone ?? ''), indiceOriginale: i + 2 }));
        window.datiInvitati = ordinaInvitati(righeMappate, activeOrdine);
        renderizzaDati();
      }).catch(err => {
        box.innerHTML = `<p style="color:red;text-align:center;padding:20px">${testi.msgErrRete}<br><small style='font-size:10px;opacity:0.7'>${err}</small></p><button class="btn-submit" onclick="caricaRisposte()">${testi.riprova}</button>`;
      });
  }

  function trovaTavoloNum(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      for(const p of TAVOLI[i].persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        if(pk===k || pk.includes(k) || k.includes(pk)){
          const n=i+1; return n<=10?eT[n]:String(n);
        }
      }
    }
    return '';
  }

  function trovaTavolo(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      for(const p of TAVOLI[i].persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        if(pk===k || pk.includes(k) || k.includes(pk)){
          const n=i+1; return(n<=10?eT[n]:String(n))+' '+TAVOLI[i].nome.replace(/^Tavolo \d+ - /,'');
        }
      }
    }
    return '-';
  }

  function getEtaAnni(nome) {
    if (!window.mapNascita) return null;
    const acc = /[\u0300-\u036f]/g;
    const k = (nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    let dataN = window.mapNascita[k];
    if (!dataN) {
      const pk = k.split(/\s+/).filter(Boolean);
      Object.keys(window.mapNascita).forEach(mk => {
        const mk2 = mk.split(/\s+/).filter(Boolean);
        if (pk.every(w=>mk2.includes(w)) || mk2.every(w=>pk.includes(w))) dataN = window.mapNascita[mk];
      });
    }
    if (!dataN) return null;
    const d = dataN.trim();
    const matrimonio = new Date(2026,5,21);
    let nascita = null;
    const dmY=d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    if(dmY) nascita=new Date(parseInt(dmY[3]),parseInt(dmY[2])-1,parseInt(dmY[1]));
    if(!nascita) return null;
    let anni = matrimonio.getFullYear()-nascita.getFullYear();
    const cp=(nascita.getMonth()<matrimonio.getMonth())||(nascita.getMonth()===matrimonio.getMonth()&&nascita.getDate()<=matrimonio.getDate());
    if(!cp) anni--;
    return anni;
  }

  function formatNomeDisplay(nome) {
    if (!nome) return 'Senza nome';
    const tokens = nome.trim().split(/\s+/);
    let nomeStr = nome;
    if (activeOrdine !== 'nome' && tokens.length >= 2) {
      // Cognome (primo) + Nome (resto)
      nomeStr = tokens[0] + ' ' + tokens.slice(1).join(' ');
    }
    const eta = getEtaAnni(nome);
    return nomeStr + (eta !== null ? '&nbsp;<span style="font-weight:400;font-size:14px;color:#555">(' + eta + ')</span>' : '');
  }

  function renderizzaDati() {
    const box = document.getElementById('sposi-table');
    const testi = dizionario[currentLang];
    let totPresenti=0, totAssenti=0, totAllergie=0, totVeg=0, totCarne=0, totPesce=0, totBaby=0, totSegnaposto=0;

    window.datiInvitati.forEach(r => {
      const assente = isAbsent(r.presenza, r.secondo);
      if (assente) totAssenti++;
      else {
        totPresenti++;
        if (hasAllergy(r.allergie)) totAllergie++;
        const tipo = detectSecondo(r.secondo);
        if (tipo==='veg') totVeg++; else if (tipo==='carne') totCarne++; else if (tipo==='pesce') totPesce++; else if (tipo==='baby') totBaby++; else if (tipo==='segnaposto') totSegnaposto++;
      }
    });

    window.kpiSnapshot = { totPresenti, totAssenti, totVeg, totCarne, totPesce, totBaby, totSegnaposto, totRisposte: window.datiInvitati.length, aggiornatoAlle: new Date() };

    let html = `<table class="sposi-kpi">
      <tr><td><div class="kpi-box ${activeFilter==='presenti'?'active-filter':''}" id="btn-presenti" onclick="filtraLista('presenti')"><div class="kpi-label">${testi.kpiPresenti}</div><div class="kpi-num">${totPresenti}</div></div></td><td><div class="kpi-box ${activeFilter==='veg'?'active-filter':''}" id="btn-veg" onclick="filtraLista('veg')"><div class="kpi-label">${testi.kpiVeg}</div><div class="kpi-num">${totVeg}</div></div></td></tr>
      <tr><td><div class="kpi-box ${activeFilter==='assenti'?'active-filter':''}" id="btn-assenti" onclick="filtraLista('assenti')"><div class="kpi-label">${testi.kpiAssenti}</div><div class="kpi-num">${totAssenti}</div></div></td><td><div class="kpi-box ${activeFilter==='carne'?'active-filter':''}" id="btn-carne" onclick="filtraLista('carne')"><div class="kpi-label">${testi.kpiCarne}</div><div class="kpi-num">${totCarne}</div></div></td></tr>
      <tr><td><div class="kpi-box ${activeFilter==='baby'?'active-filter':''}" id="btn-baby" onclick="filtraLista('baby')"><div class="kpi-label">${testi.kpiBaby}</div><div class="kpi-num">${totBaby}</div></div></td><td><div class="kpi-box ${activeFilter==='pesce'?'active-filter':''}" id="btn-pesce" onclick="filtraLista('pesce')"><div class="kpi-label">${testi.kpiPesce}</div><div class="kpi-num">${totPesce}</div></div></td></tr>
      <tr><td><div class="kpi-box ${activeFilter==='segnaposto'?'active-filter':''}" id="btn-segnaposto" onclick="filtraLista('segnaposto')"><div class="kpi-label">${testi.kpiSegnaposto}</div><div class="kpi-num">${totSegnaposto}</div></div></td><td><div class="kpi-box ${activeFilter==='allergie'?'active-filter':''}" id="btn-allergie" onclick="filtraLista('allergie')"><div class="kpi-label">${testi.kpiAllergie}</div><div class="kpi-num">${totAllergie}</div></div></td></tr>
    </table>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px;">
      <button class="btn-submit" onclick="caricaRisposte()" style="margin-top:0; font-size:13px;padding:12px 6px;">${testi.btnAggiorna}</button>
      <button class="btn-submit" id="btn-pdf-gen" onclick="generaPDF()" style="margin-top:0; background: linear-gradient(135deg, #2d6040, #4c7b5d); font-size:13px;padding:12px 6px;color:#fff;">${testi.btnPDF}</button>
      <button class="btn-submit" onclick="scaricaBackupCSV()" style="margin-top:0; background: linear-gradient(135deg, #2980b9, #3d9dd1); font-size:13px;padding:12px 6px;color:#fff;">${testi.btnBackup}</button>
      <button class="btn-submit" id="btn-tavoli-nav" onclick="scorriTavoli()" style="margin-top:0; background: linear-gradient(135deg, #7a5c3a, #9e7f5b); font-size:13px;padding:12px 6px;color:#fff;">${testi.btnTavoli}</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:8px 4px;">
      <span style="font-size:13px;color:#5a4a2a;">${testi.ordinaPer}</span>
      <button id="btn-ordina" onclick="apriSceltaOrdine()" style="background:#f5ede0;border:1.5px solid #b8893a;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:#7a5c3a;">${labelOrdineCorrente()}</button>
    </div>
    <div id="lista-invitati">`;

    function cardRispondente(r) {
      const riga = r.indiceOriginale;
      const assente = isAbsent(r.presenza, r.secondo);
      const tipoSecondo = detectSecondo(r.secondo);
      let cf = ['ha-risposto'];
      if (assente) cf.push('cat-assenti');
      else {
        cf.push('cat-presenti');
        if (hasAllergy(r.allergie)) cf.push('cat-allergie');
        const mapCat = { veg: 'cat-veg', carne: 'cat-carne', pesce: 'cat-pesce', baby: 'cat-baby', segnaposto: 'cat-segnaposto' };
        if (mapCat[tipoSecondo]) cf.push(mapCat[tipoSecondo]);
      }
      const ds = (activeFilter && !cf.includes('cat-'+activeFilter)) ? 'display:none;' : 'display:block;';
      const ico = assente ? '' : (tipoSecondo==='veg'?'🥦':tipoSecondo==='carne'?'🥩':tipoSecondo==='pesce'?'🐟':tipoSecondo==='baby'?'🍼':'');
      const iceA = iconaAllergie(r.allergie);
      const tavN = trovaTavoloNum(r.nome);
      const nomDisp = formatNomeDisplay(r.nome);
      return `<div class="risposta-card ${cf.join(' ')}" style="${ds}" id="card-${riga}">
        <div class="risposta-nome" onclick="window._apriGalleria && window._apriGalleria('${(r.nome||'').replace(/'/g,"\\'")}')">
          ${tavN?`<span style="font-size:14px;margin-right:6px;">${tavN}</span>`:''}
          <span style="color:#000;font-weight:600;flex:1;">${nomDisp}${ico?`&nbsp;<span style="font-size:16px">${ico}</span>`:''}</span>
          <span class="icone-destra">${iceA?`<span style="font-size:15px">${iceA}</span>`:''}</span>
          <span onclick="event.stopPropagation();toggleDettagli(${riga})" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid #c0392b;margin-left:8px;"><span style="color:#c0392b;font-size:18px;font-weight:900;">›</span></span>
        </div>
        <div class="dettagli-scheda" id="dettagli-${riga}">
          <div class="risposta-row"><span class="risposta-label">${testi.lblTavolo}</span><span class="risposta-val">${trovaTavolo(r.nome)}</span></div>
          <div class="risposta-row"><span class="risposta-label">${testi.lblSecondo}</span><span class="risposta-val">${secondBadge(r.secondo,assente)}</span></div>
          <div class="risposta-row"><span class="risposta-label">${testi.lblAllergie}</span><span class="risposta-val ${hasAllergy(r.allergie)?'allergia':''}">${r.allergie||testi.lblNessuna}</span></div>
          <div class="risposta-row"><span class="risposta-label">${testi.lblNote}</span><span class="risposta-val">${r.note||'—'}</span></div>
          <div class="risposta-data">${r.data||''}</div>
          <button onclick="eliminaRiga(${riga})" class="delete-btn">${testi.btnElimina}</button>
        </div>
      </div>`;
    }

    function cardNonRispondente(nomeCSV) {
      const ds = (activeFilter && activeFilter!=='assenti') ? 'display:none;' : 'display:block;';
      const nomDisp = formatNomeDisplay(nomeCSV);
      const tavN = trovaTavoloNum(nomeCSV);
      return `<div class="risposta-card non-risposto" style="${ds}border-color:#ccc;">
        <div class="risposta-nome" onclick="window._apriGalleria && window._apriGalleria('${nomeCSV.replace(/'/g,"\\'")}')">
          ${tavN?`<span style="font-size:14px;margin-right:6px;">${tavN}</span>`:''}
          <span style="color:#888;font-weight:600;flex:1;">${nomDisp}</span>
          <span style="opacity:0.3;font-size:18px;">—</span>
        </div>
      </div>`;
    }

    const _tuttiCSV = window.tuttiInvitatiCsvRaw || [];
    const _risposti = window.datiInvitati || [];
    const _nonRisp = _tuttiCSV.filter(inv => !_risposti.some(r => normalizeText(inv.nome) === normalizeText(r.nome)));

    if (activeOrdine === 'gruppi') {
      (window.gruppiCsvOrdinati || []).forEach((g, idx) => {
        if (idx > 0) html += `<div style="height:40px;"></div>`;
        g.forEach(nc => {
          const r = _risposti.find(inv => normalizeText(nc) === normalizeText(inv.nome));
          html += r ? cardRispondente(r) : cardNonRispondente(nc);
        });
      });
    } else if (activeOrdine === 'attesa') {
      _nonRisp.forEach(inv => { html += cardNonRispondente(inv.nome); });
      if (_risposti.length > 0) {
        html += `<div style="margin:20px 0; border-top:1px solid #b8893a; opacity:0.3;"></div>`;
        _risposti.forEach(r => { html += cardRispondente(r); });
      }
    } else {
      _risposti.forEach(r => { html += cardRispondente(r); });
      if (_nonRisp.length > 0) {
        html += `<div style="margin:20px 0; border-top:1px solid #b8893a; opacity:0.3;"></div>`;
        _nonRisp.forEach(inv => { html += cardNonRispondente(inv.nome); });
      }

    html += `</div>
    <div style="text-align:center; margin: 16px 0 8px; display:flex; justify-content:center; align-items:center; gap:10px;">
      <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:linear-gradient(135deg,#7a5c3a,#9e7f5b);color:#ffffff;border:none;border-radius:12px;padding:12px 28px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;box-shadow:0 2px 10px rgba(122,92,58,0.3);">${testi.btnHome}</button>

  function labelOrdineCorrente() {
    const t = dizionario[currentLang];
    const labels = { inserimento: t.lbl_INSERIMENTO, nome: t.lbl_NOME, cognome: t.lbl_COGNOME, cibo: t.lbl_CIBO, eta: t.lbl_ETA, tavolo: t.lbl_TAVOLO, attesa: t.lbl_ATTESA, gruppi: t.lbl_GRUPPI };
    return labels[activeOrdine] || t.lbl_COGNOME;
  }

  function ordinaInvitati(arr, criterio) {
    const a2z = (a,b) => a.localeCompare(b, 'it', {sensitivity:'base'});
    const cp = v => normalizeText(v);
    const arr2 = [...arr];
    if (criterio === 'inserimento') arr2.sort((a,b) => (b.indiceOriginale||0) - (a.indiceOriginale||0));
    else if (criterio === 'nome') {
      arr2.sort((a,b) => {
        const ta = (a.nome||'').trim().split(/\s+/);
        const tb = (b.nome||'').trim().split(/\s+/);
        return a2z(cp(ta.slice(1).join(' ')), cp(tb.slice(1).join(' ')));
      });
    } else if (criterio === 'cognome') {
      arr2.sort((a,b) => {
        const ta = (a.nome||'').trim().split(/\s+/);
        const tb = (b.nome||'').trim().split(/\s+/);
        return a2z(cp(ta[0]), cp(tb[0]));
      });
    } else if (criterio === 'cibo') {
      const ord = { baby:0, veg:1, carne:2, pesce:3 };
      arr2.sort((a,b) => (ord[detectSecondo(a.secondo)] ?? 9) - (ord[detectSecondo(b.secondo)] ?? 9));
    } else if (criterio === 'eta') {
      arr2.sort((a,b) => (getEtaAnni(b.nome) ?? -1) - (getEtaAnni(a.nome) ?? -1));
    } else if (criterio === 'tavolo') {
      arr2.sort((a,b) => a2z(trovaTavoloNum(a.nome), trovaTavoloNum(b.nome)));
    }
    return arr2;
  }

  function apriSceltaOrdine() {
    const t = dizionario[currentLang];
    const opzioni = [ {val:'inserimento', lbl: t.btnOrdina_inserimento}, {val:'nome', lbl: t.btnOrdina_nome}, {val:'cognome', lbl: t.btnOrdina_cognome}, {val:'tavolo', lbl: t.btnOrdina_tavolo}, {val:'cibo', lbl: t.btnOrdina_cibo}, {val:'eta', lbl: t.btnOrdina_eta}, {val:'attesa', lbl: t.btnOrdina_attesa}, {val:'gruppi', lbl: t.btnOrdina_gruppi} ];
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:flex;align-items:center;justify-content:center;';
    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:16px;padding:20px;width:90%;max-width:340px;';
    box.innerHTML = `<h3 style="text-align:center;margin-bottom:15px;color:#8a5e1e;">${t.lblOrdinaPer}</h3>`;
    opzioni.forEach(o => {
      const btn = document.createElement('button');
      btn.innerHTML = o.lbl;
      btn.style.cssText = `display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:1px solid ${o.val===activeOrdine?'#b8893a':'#ccc'};background:${o.val===activeOrdine?'#f5ede0':'#fff'};text-align:left;`;
      btn.onclick = () => { activeOrdine=o.val; window.datiInvitati=ordinaInvitati(window.datiInvitati, activeOrdine); renderizzaDati(); document.body.removeChild(overlay); };
      box.appendChild(btn);
    });
    const ann = document.createElement('button');
    ann.textContent = t.lblAnnulla;
    ann.style.cssText = 'width:100%;padding:10px;margin-top:10px;background:#eee;border:none;border-radius:8px;';
    ann.onclick = () => document.body.removeChild(overlay);
    box.appendChild(ann);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

  function toggleTavolo(idx) {
    tavoloAperto = (tavoloAperto === idx) ? null : idx;
    renderizzaTavoli();
  }

  function renderizzaTavoli() {
    const sez = document.getElementById('sezione-tavoli');
    if (!sez) return;
    let html = `<div style="margin-top:20px;">`;
    TAVOLI.forEach((t, i) => {
      const risposti = t.persone.filter(p => (window.datiInvitati||[]).some(r => normalizeText(r.nome) === normalizeText(p))).length;
      const isOpen = tavoloAperto === i;
      html += `<div style="margin-bottom:8px;">
        <button onclick="toggleTavolo(${i})" style="width:100%;padding:15px;background:#e0e8d0;border:1.5px solid #a5b589;border-radius:12px;text-align:left;font-weight:600;display:flex;justify-content:space-between;">
          <span>${t.nome.replace(/^Tavolo \d+ - /,'')}</span>
          <span style="background:#fff;padding:2px 8px;border-radius:10px;font-size:12px;">${risposti}/${t.persone.length}</span>
        </button>
        <div style="display:${isOpen?'block':'none'};padding:10px;background:#f9fff0;border:1px solid #a5b589;border-top:none;border-radius:0 0 12px 12px;">
          ${t.persone.map(p => `<div style="padding:4px 0;font-size:15px;">${p} ${etaTavoloHTML(p)}</div>`).join('')}
        </div>
      </div>`;
    });
    sez.innerHTML = html + '</div>';
  }

  function etaTavoloHTML(nome) {
    const eta = getEtaAnni(nome);
    const r = (window.datiInvitati||[]).find(inv => normalizeText(inv.nome) === normalizeText(nome));
    let icon = '';
    if (r) {
      const t = detectSecondo(r.secondo);
      const m = { veg:'V', carne:'C', pesce:'P', baby:'B' };
      const c = { veg:'#2d6040', carne:'#a83230', pesce:'#c8a000', baby:'#2980b9' };
      if (m[t]) icon = ` <span style="display:inline-block;width:18px;height:18px;border-radius:50%;background:${c[t]};color:#fff;font-size:10px;text-align:center;line-height:18px;font-weight:900;">${m[t]}</span>`;
    }
    return (eta !== null ? ` <small>(${eta})</small>` : '') + icon;
  }

  function leggiContatore() {
    return '👁 ' + (parseInt(localStorage.getItem('matrimonio_visite') || '0', 10));
  }

  function gestisciContatore() {
    const n = parseInt(localStorage.getItem('matrimonio_visite') || '0', 10);
    if (confirm('Visite registrate: ' + n + '\n\nAzzerare il contatore?')) {
      localStorage.setItem('matrimonio_visite', 0);
      const btn = document.getElementById('btn-contatore');
      if (btn) btn.textContent = '👁 0';
    }
  }

  window.addEventListener('focus', function() {
    const btn = document.getElementById('btn-contatore');
    if (btn) btn.textContent = leggiContatore();
  });
  setInterval(function() {
    const btn = document.getElementById('btn-contatore');
    if (btn) btn.textContent = leggiContatore();
  }, 30000);

  function calcolaInAttesa() {
    const tutti = window.tuttiInvitatiCsvRaw || [];
    const risposti = window.datiInvitati || [];
    return tutti.filter(inv => !risposti.some(r => normalizeText(r.nome) === normalizeText(inv.nome)));
  }

  async function generaPDF() {
    const testi = dizionario[currentLang];
    if (!window.datiInvitati || window.datiInvitati.length === 0) {
      alert(testi.msgNessunDato);
      return;
    }
    const btnPdf = document.getElementById('btn-pdf-gen');
    if (btnPdf) btnPdf.disabled = true;

    const pdfToast = document.createElement('div');
    pdfToast.id = 'pdf-toast';
    pdfToast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#2d6040;color:#fff;padding:18px 32px;border-radius:14px;z-index:99999;';
    pdfToast.textContent = 'Creazione PDF in corso...';
    document.body.appendChild(pdfToast);

    let totPresenti=0, totAssenti=0, totAllergie=0, totVeg=0, totCarne=0, totPesce=0, totBaby=0, totSegnaposto=0;
    let presentiRows = [];
    window.datiInvitati.forEach(r => {
      const assente = isAbsent(r.presenza, r.secondo);
      if (!assente) {
        totPresenti++; presentiRows.push(r);
        if (hasAllergy(r.allergie)) totAllergie++;
        const tipo = detectSecondo(r.secondo);
        if (tipo==='veg') totVeg++; else if (tipo==='carne') totCarne++; else if (tipo==='pesce') totPesce++; else if (tipo==='baby') totBaby++; else if (tipo==='segnaposto') totSegnaposto++;
      } else { totAssenti++; }
    });

    const container = document.createElement('div');
    container.style.width = '740px'; container.style.background = '#fff';
    let htmlPDF = `<h1 style="text-align:center;">${testi.titolo}</h1><h2 style="text-align:center;">Giulia & Onofrio</h2>`;
    htmlPDF += `<table style="width:100%;border-collapse:collapse;margin-top:20px;border:1px solid #000;">
      <thead><tr style="background:#eee;"><th>${testi.pdfNome}</th><th>Secondo</th><th>Allergie</th></tr></thead><tbody>`;
    presentiRows.forEach(r => {
      htmlPDF += `<tr style="border:1px solid #000;"><td style="padding:5px;">${r.nome}</td><td style="padding:5px;">${r.secondo||'-'}</td><td style="padding:5px;">${r.allergie||'-'}</td></tr>`;
    });
    htmlPDF += `</tbody></table>`;
    container.innerHTML = htmlPDF;

    const opt = { margin: 10, filename: 'ListaInvitati.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(container).save().then(() => {
      document.body.removeChild(pdfToast);
      if (btnPdf) btnPdf.disabled = false;
    });
  }

  window._apriGalleria = function(nomeSelezionato) {
    const domEls = [...document.querySelectorAll('.risposta-nome[data-nomefile]')].filter(el => el.closest('.risposta-card') && el.closest('.risposta-card').style.display !== 'none');
    const fotoArr = domEls.map(el => ({ nome: el.getAttribute('data-nomefile'), file: el.getAttribute('data-foto-file') || null }));
    let idx = fotoArr.findIndex(f => normalizeText(f.nome) === normalizeText(nomeSelezionato));
    if (idx < 0) idx = 0;
    mostraFotoPopup(fotoArr, idx);
  };

  function mostraFotoPopup(foto, initialIdx) {
    let idx = initialIdx;
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;';
    const img = document.createElement('img');
    img.style.cssText = 'max-width:90%;max-height:80%;object-fit:contain;';
    const cap = document.createElement('div');
    cap.style.cssText = 'margin-top:20px;font-size:20px;';
    
    const update = () => {
      const f = foto[idx];
      img.src = f.file ? 'Foto/' + f.file : '';
      img.onerror = () => { img.src = ''; cap.innerHTML = '📷 ' + f.nome; };
      cap.innerHTML = (idx+1) + ' / ' + foto.length + '<br>' + f.nome;
    };

    const next = () => { idx = (idx + 1) % foto.length; update(); };
    const prev = () => { idx = (idx - 1 + foto.length) % foto.length; update(); };

    const bSx = document.createElement('button'); bSx.innerHTML = '‹'; bSx.style.cssText = 'position:absolute;left:20px;font-size:50px;background:none;color:#fff;border:none;';
    bSx.onclick = e => { e.stopPropagation(); prev(); };
    const bDx = document.createElement('button'); bDx.innerHTML = '›'; bDx.style.cssText = 'position:absolute;right:20px;font-size:50px;background:none;color:#fff;border:none;';
    bDx.onclick = e => { e.stopPropagation(); next(); };

    overlay.appendChild(bSx); overlay.appendChild(img); overlay.appendChild(bDx); overlay.appendChild(cap);
    overlay.onclick = () => document.body.removeChild(overlay);
    document.body.appendChild(overlay);
    update();
  }

  function eliminaRiga(riga) {
    if (!confirm(dizionario[currentLang].msgConferma)) return;
    fetch(SCRIPT_URL + '?elimina=' + riga).then(() => caricaRisposte());
  }

  function scaricaBackupCSV() {
    let csv = '\uFEFFNome;Presenza;Secondo;Allergie;Note;Data\n';
    window.datiInvitati.forEach(r => {
      csv += `"${r.nome}";"${r.presenza}";"${r.secondo}";"${r.allergie}";"${r.note}";"${r.data}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Backup_Invitati.csv'; a.click();
  }

  function scorriTavoli() {
    document.getElementById('sezione-tavoli').scrollIntoView({ behavior: 'smooth' });
  }
</script>
