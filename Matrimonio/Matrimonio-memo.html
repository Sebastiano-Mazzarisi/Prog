<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #000000;       
    --border: #7a5c3a;
    --green: #2d6040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd; 
    font-family: 'Jost', sans-serif;
    font-weight: 400; 
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 16px; }

  .lang-switcher {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #000000;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .lang-btn:hover { background: rgba(184, 137, 58, 0.08); }
  .lang-btn.active-lang {
    background: var(--gold);
    color: #000000; 
    border-color: var(--gold);
    font-weight: 600;
  }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600; 
    font-style: italic;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .header .description {
    font-size: 14.5px;
    color: #000000;
    line-height: 1.3;
    max-width: 380px;
    margin: 0 auto;
  }

  /* FOTO STRETTA / PANORAMICA */
  .hero-container {
    width: 100%;
    max-width: 460px;
    margin: 0 auto 20px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 16px rgba(44,36,24,0.06);
    overflow: hidden;
  }

  .hero-container img {
    width: 100%;
    height: 140px; 
    display: block;
    object-fit: cover;
    object-position: center 30%; 
    background: var(--warm-white);
  }

  /* RIQUADRI CARD */
  .card-memo {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(44,36,24,0.06);
    padding: 22px 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .card-memo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    font-style: italic;
    color: var(--gold-dark);
    margin-bottom: 8px;
  }

  .card-memo-text {
    font-size: 16px;
    color: #000000;
    line-height: 1.5;
    font-weight: 500;
  }

  /* COMPONENTE IBAN SELEZIONABILE */
  .iban-clickable-box {
    background: var(--cream);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    user-select: none;
  }

  .iban-clickable-box:hover {
    background: rgba(184, 137, 58, 0.12);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  .iban-clickable-box:active {
    transform: translateY(0);
  }

  .iban-holder {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 16px;
    letter-spacing: 0.3px;
  }

  .iban-preview {
    font-size: 14px;
    letter-spacing: 1px;
    font-weight: 500;
    color: var(--gold-dark);
  }

  .click-hint {
    font-size: 12px;
    margin-top: 8px;
    opacity: 0.6;
    font-style: italic;
    letter-spacing: 0.5px;
  }

  /* POP-UP MODALE IBAN */
  .custom-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
  }
  .custom-overlay.visible { display: flex; }
  
  .custom-box {
    background: var(--warm-white);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 32px 24px 24px;
    box-shadow: 0 8px 40px rgba(44,36,24,0.25);
    max-width: 480px;
    width: 92%;
    animation: popupIn 0.2s ease;
    position: relative;
    text-align: left;
  }

  @keyframes popupIn {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none
