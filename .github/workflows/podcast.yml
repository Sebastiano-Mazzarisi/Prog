name: Genera PodPutignano
on:
  schedule:
    # Ogni 30 minuti, dalle 5:00 alle 20:00 UTC
    # = 7:00-22:00 ora legale italiana (UTC+2, apr-ott)
    # = 6:00-21:00 ora solare italiana (UTC+1, nov-mar)
    - cron: '0,30 5-20 * * *'
  workflow_dispatch:
    inputs:
      allerta:
        description: 'Livello allerta (lascia vuoto per nessuna, oppure: ROSSA, ARANCIONE)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - ROSSA
          - ARANCIONE

jobs:
  genera:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        working-directory: Pod
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          sudo apt-get install -y ffmpeg
          pip install --quiet --upgrade \
            feedparser \
            requests \
            beautifulsoup4 \
            edge-tts

      - name: Verifica file audio necessari
        run: |
          echo "File presenti in Pod/:"
          ls -lh *.mp3 *.py *.html *.txt 2>/dev/null || true
          [ -f Chitarra.mp3 ] && echo "✅ Chitarra.mp3 trovato" || echo "⚠️  Chitarra.mp3 MANCANTE"
          [ -f Allarme.mp3  ] && echo "✅ Allarme.mp3 trovato"  || echo "⚠️  Allarme.mp3 MANCANTE"

      - name: Genera PodPutignano.mp3 e Lettura.txt
        run: |
          # Parametro allerta: da workflow_dispatch input OPPURE da allerta.txt nel repo
          ALLERTA_INPUT="${{ github.event.inputs.allerta }}"
          ALLERTA_FILE=""
          if [ -f allerta.txt ]; then
            ALLERTA_FILE=$(cat allerta.txt | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')
          fi
          ALLERTA="${ALLERTA_INPUT:-$ALLERTA_FILE}"
          if [ "$ALLERTA" = "ROSSA" ]; then
            echo "🔴 Allerta ROSSA attiva"
            python PodPutignano.py --ROSSA
          elif [ "$ALLERTA" = "ARANCIONE" ]; then
            echo "🟠 Allerta ARANCIONE attiva"
            python PodPutignano.py --ARANCIONE
          else
            python PodPutignano.py
          fi

      - name: Salva file nel repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PodPutignano.mp3 Lettura.txt
          git diff --cached --quiet && echo "Nessuna modifica, skip commit." && exit 0
          git commit -m "🎙️ aggiornamento $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
