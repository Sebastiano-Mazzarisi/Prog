  window.mapTelefoni = {};
  async function caricaTelefoni() {
    try {
      const resp = await fetch('Telefoni.txt?t=' + Date.now());
      if (!resp.ok) return;
      const txt = await resp.text();
      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      txt.split(/\r?\n/).forEach(riga => {
        const m = riga.match(/^(.+?)\s{2,}(\S+)$/);
        if (!m) return;
        const nome = m[1].trim(); const cell = m[2].trim();
        if (cell === '\u2014' || cell === '-') return;
        window.mapTelefoni[norm(nome)] = cell;
        const parti = nome.split(/\s+/);
        if (parti.length >= 2)
          window.mapTelefoni[norm(parti.slice(1).join(' ') + ' ' + parti[0])] = cell;
      });
    } catch(e) {}
  }

  function cercaTelefono(nomeDisplay) {
    const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const k1 = norm(nomeDisplay);
    if (window.mapTelefoni[k1]) return window.mapTelefoni[k1];
    const parti = nomeDisplay.trim().split(/\s+/);
    if (parti.length >= 2) {
      const k2 = norm(parti[parti.length-1] + ' ' + parti.slice(0,-1).join(' '));
      if (window.mapTelefoni[k2]) return window.mapTelefoni[k2];
    }
    return '';
  }

  function formattaNumero(raw) {
    const digits = raw.replace(/\D/g,'');
    if (digits.length === 10)
      return digits.slice(0,3) + '-' + digits.slice(3,5) + '.' + digits.slice(5,7) + '.' + digits.slice(7);
    if (digits.length === 12 && digits.startsWith('39')) {
      const loc = digits.slice(2);
      return '+39\u00a0' + loc.slice(0,3) + '-' + loc.slice(3,5) + '.' + loc.slice(5,7) + '.' + loc.slice(7);
    }
    return raw;
  }

        const text = await response.text();
        const righe = text.split(/\r?\n/);
        TAVOLI = []; // Resetta l'array per popolarlo dinamicamente
        let tavoloCorrente = null;

        righe.forEach(riga => {
          const r = riga.trim();
          if (!r) return; // Ignora le righe vuote

          if (r.startsWith('#')) {
            // Nuovo tavolo identificato (rimuove il '#' e gli spazi)
            tavoloCorrente = {
              nome: r.substring(1).trim(),
              persone: []
            };
            TAVOLI.push(tavoloCorrente);
          } else if (tavoloCorrente) {
            // Aggiunge la persona al tavolo corrente
            tavoloCorrente.persone.push(r);
          }
        });

        // Se la sezione HTML dei tavoli è già stata montata, la aggiorna
        if (document.getElementById('sezione-tavoli')) {
          renderizzaTavoli();
        }
      } else {
        console.error("Errore nel caricamento di Tavoli.txt: " + response.status);
      }
    } catch (err) {
      console.error("Errore di rete durante il caricamento di Tavoli.txt: ", err);
    }
    // Carica Invitati.csv per popolare window.mapNascita (date di nascita)
    try {
      const respInv = await fetch('Invitati.csv?t=' + Date.now());
      if (respInv.ok) {
        const txtInv = await respInv.text();
        const righeInv = txtInv.split(/\r?\n/).map(r => r.trim());
        const sepInv = txtInv.includes(';') ? ';' : ',';
        const acc = /[\u0300-\u036f]/g;
        window.mapNascita = {};
        window.tuttiInvitatiCsvRaw = [];
        let totCsv = 0;
        let startInv = (righeInv.length > 0 && righeInv[0].toLowerCase().includes('nom')) ? 1 : 0;
        for (let i = startInv; i < righeInv.length; i++) {
          const cols = righeInv[i].split(sepInv);
          const nome = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          const dataN = cols[1] ? cols[1].replace(/['"]/g,'').trim() : '';
          
          if (nome) {
            totCsv++;
            window.tuttiInvitatiCsvRaw.push({ nome, dataNascita: dataN });
            if (dataN) window.mapNascita[nome.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
          }
        }
        window.totInvitatiCsv = totCsv;
        window.totInvitatiCsvRaw = totCsv;
        // Aggiorna titolo h1 con numero invitati
        (function() {
          const el = document.getElementById('titolo-pagina');
          if (el) {
            const testi = dizionario[currentLang];
            el.innerHTML = testi.titolo + ' <small style="font-size:0.5em;font-weight:600;color:#000;vertical-align:middle;">(' + totCsv + ')</small>';
          }
        })();

        // ── Mappa gruppi: ogni persona → lista nomi del suo gruppo ───────
        window.mapGruppo = {};
        const acc2 = /[\u0300-\u036f]/g;
        const normK = s => (s||'').toLowerCase().normalize('NFD').replace(acc2,'').trim();
        let gruppoCorrente = [];
        const flushGruppo = () => {
          if (gruppoCorrente.length > 0) {
            const copia = [...gruppoCorrente];
            copia.forEach(n => { window.mapGruppo[normK(n)] = copia; });
            gruppoCorrente = [];
          }
        };
        for (let i = startInv; i < righeInv.length; i++) {
          const riga = righeInv[i];
          if (!riga) { flushGruppo(); continue; }
          const cols = riga.split(sepInv);
          const n = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          if (!n) { flushGruppo(); continue; }
          gruppoCorrente.push(n);
        }
        flushGruppo();
        // Salva gruppi ordinati per la vista GRUPPI
        window.gruppiCsvOrdinati = [];
        let _gc = [];
        for (let i = startInv; i < righeInv.length; i++) {
          const _r = righeInv[i];
          if (!_r) { if (_gc.length) { window.gruppiCsvOrdinati.push([..._gc]); _gc = []; } continue; }
          const _c = _r.split(sepInv);
          const _nr = _c[0] ? _c[0].replace(/['"]/g,'').trim() : '';
          if (!_nr) { if (_gc.length) { window.gruppiCsvOrdinati.push([..._gc]); _gc = []; } continue; }
          _gc.push(_nr);
        }
        if (_gc.length) window.gruppiCsvOrdinati.push(_gc);
      }
    } catch(e) { console.log('mapNascita: Invitati.csv non disponibile', e); }
  }

  function normalizeText(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s === '4') return 'baby';
    if (s === '5') return 'segnaposto';
    if (s.includes('veget') || s.includes('vegan')) return 'veg';
    if (s.includes('carne') || s.includes('meat')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function isAbsent(presenza, secondo) {
    const p = normalizeText(presenza);
    if (p === '0' || p === 'false' || p === 'no' || p.includes('non') || p.includes('assente') || p === '') {
        if (p === '' && detectSecondo(secondo) !== '') {
            return false;
        }
        return true;
    }
    return false;
  }

  function hasAllergy(value) {
    if (!value) return false;
    const s = normalizeText(value).replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim();
    if (!s) return false;
    const falsiPositivi = [
      'no', 'nessuna', 'nessuno', 'nessun', 'niente', 'nulla', 'nd',
      '0', 'false', 'nessuna allergia', 'no allergie', 'nessuna in particolare',
      'no grazie', 'nessuna grazie'
    ];
    if (falsiPositivi.includes(s)) return false;
    return true;
  }

  function iconaAllergie(value) {
    if (!hasAllergy(value)) return '';
    // Mappa esatta dei valori usati in Matrimonio.html
    const mappa = {
      'formaggi':     '🧀',
      'glutine':      '🌾',
      'lattosio':     '🥛',
      'frutta secca': '🥜',
      'uova':         '🥚',
      'crostacei':    '🦐',
      'soia':         '🫘',
      'pesce':        '🐟',
      'sedano':       '🥦',
    };
    const voci = value.split(',').map(v => v.trim().toLowerCase());
    const icone = [];
    voci.forEach(v => {
      if (mappa[v]) {
        if (!icone.includes(mappa[v])) icone.push(mappa[v]);
      } else {
        // Voce libera non in mappa: icona generica se non già presente
        if (!icone.includes('⚠️')) icone.push('⚠️');
      }
    });
    return icone.join('');
  }

  function secondBadge(secondo, assente) {
    if (assente) return '<span class="muted">—</span>';

    if (tipo === 'pesce') return `<span class="badge badge-pesce">${testi.badgePesce}</span>`;
    return '<span class="muted">—</span>';
  }

  function trovaTavoloNum(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];
      for(const p of t.persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1; return n<=10?eT[n]:String(n);
        }
      }
    }
    return '';
  }

  function trovaTavolo(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];
      for(const p of t.persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1;
          return(n<=10?eT[n]:String(n))+' '+t.nome.replace(/^Tavolo \d+ - /,'');
        }
      }
    }
    return '-';
  }

        </div>
      </div>`;

    function fetchFotoSpans(els, risultati, onDone) {
      if (!els.length) { if(onDone) onDone(risultati||[]); return; }
      let done=0;
      function completato() { done++; if(done===els.length && onDone) onDone(risultati||[]); }
      els.forEach((el,pos) => {
        const nf = el.getAttribute('data-nomefile');
        if (!nf) { completato(); return; }
        if (risultati) risultati[pos] = { nome: nf, file: null };
        const varianti=variantiFoto(nf), ext=['jpg','JPG','jpeg','JPEG'];
        let trovata=false;
        function prova(vi,ei) {
          if(trovata) return;
          if(vi>=varianti.length){completato();return;}
          if(ei>=ext.length){prova(vi+1,0);return;}
          fetch('Foto/'+varianti[vi]+'.'+ext[ei]+'?t='+Date.now(),{method:'HEAD'})
            .then(r=>{
              if(r.ok&&!trovata){
                trovata=true;
                const file=varianti[vi]+'.'+ext[ei];
                if(risultati) risultati[pos]={nome:nf,file};
                el.setAttribute('data-foto-file', file); // salva il file trovato
                completato();
              } else prova(vi,ei+1);
            }).catch(()=>prova(vi,ei+1));
        }
        prova(0,0);
      });
    }

      const domEls = [...document.querySelectorAll('.risposta-nome[data-nomefile]')]
        .filter(el => el.closest('.risposta-card') && el.closest('.risposta-card').style.display !== 'none');
      const fotoArr = domEls.map(el => ({
        nome: el.getAttribute('data-nomefile'),
        file: el.getAttribute('data-foto-file') || null
      }));
      // Trova l'indice di quello cliccato
      let idx = fotoArr.findIndex(f => f.nome === nomeFile);
      if (idx < 0) idx = 0;
      // Aggiorna fotoDisponibili con l'array nell'ordine corrente
      window.fotoDisponibili = fotoArr;
      // Apre il popup sull'elemento corretto
      const entry = fotoArr[idx];
      mostraFotoPopup(entry.file || entry.nome); // passa file se esiste, altrimenti nome (mostrerà icona)
    };

    // Non-rispondenti: tutti quelli nel CSV che non hanno una risposta
    const _accNR = /[\u0300-\u036f]/g;
    const _normNR = s => (s||'').toLowerCase().normalize('NFD').replace(_accNR,'').trim();
    function _tokNR(n) { return _normNR(n).split(/\s+/).filter(Boolean); }
    function _matchNR(a,b) { const ta=_tokNR(a),tb=_tokNR(b); return ta.every(w=>tb.includes(w))||tb.every(w=>ta.includes(w)); }
    const _tuttiCSV = window.tuttiInvitatiCsvRaw || [];
    const _nonRisp = _tuttiCSV.filter(inv => !(window.datiInvitati||[]).some(r => _matchNR(inv.nome, r.nome||'')));
    
    function _sortCognome(arr) {
      return [...arr].sort((a,b) => {
        const na = a.nome||a, nb = b.nome||b;
        const ta = (na||'').trim().split(/\s+/);
        const tb = (nb||'').trim().split(/\s+/);
        const ca=_normNR(ta[0]);
        const cb=_normNR(tb[0]);
        return ca.localeCompare(cb,'it',{sensitivity:'base'});
      });
    }

    const _sep = `<div style="margin-top:12px;border-bottom:1px solid #b8893a;margin-bottom:8px;opacity:0.4;"></div>`;

    if (activeOrdine === 'gruppi') {
      // Ordine CSV con tutti i membri, 50px di spazio tra gruppi
      const gList = window.gruppiCsvOrdinati || [];
      let primoG = true;
      gList.forEach(gNomi => {
        if (!primoG) html += `<div style="height:50px;"></div>`;
        primoG = false;
        gNomi.forEach(nc => {
          const r = (window.datiInvitati||[]).find(inv => _matchNR(nc, inv.nome||''));
          html += r ? cardRispondente(r) : cardNonRispondente(nc, 'g-');
        });
      });

    } else if (activeOrdine === 'attesa') {
      // Non-rispondenti per cognome → poi rispondenti per cognome in coda
      _sortCognome(_nonRisp).forEach(inv => { html += cardNonRispondente(inv.nome, 'att-'); });
      if ((window.datiInvitati||[]).length > 0) {
        html += _sep;
        ordinaInvitati([...(window.datiInvitati||[])], 'cognome').forEach(r => { html += cardRispondente(r); });

      (window.datiInvitati||[]).forEach(r => { html += cardRispondente(r); });

        let nrSorted;

          nrSorted = [..._nonRisp].sort((a,b) => {
            const na=(a.nome||'').trim().split(/\s+/);
            const nb=(b.nome||'').trim().split(/\s+/);
            return _normNR(na.slice(1).join(' ')).localeCompare(_normNR(nb.slice(1).join(' ')),'it',{sensitivity:'base'});
          });
        } else {

      <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="background:linear-gradient(135deg,#7a5c3a,#9e7f5b);color:#ffffff;border:none;border-radius:12px;padding:12px 28px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;box-shadow:0 2px 10px rgba(122,92,58,0.3);">${testi.btnHome}</button>

    html2pdf().set(opt).from(container).save().then(() => {
      const t = document.getElementById('pdf-toast');
      if (t) document.body.removeChild(t);
      if (btnPdf) btnPdf.disabled = false;
    });
  }

  function scorriTavoli() {
    const sezione = document.getElementById('sezione-tavoli');
    if (sezione) sezione.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderizzaTavoli() {
    const sezione = document.getElementById('sezione-tavoli');
    if (!sezione) return;

    const bgTavolo = '#e0e8d0';
    const borderTavolo = '#a5b589';

    let html = `<div style="margin-bottom:8px;">`;
    html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
    TAVOLI.forEach((t, i) => {
      const label = t.nome.replace(/^Tavolo \d+ - /, '');
      const isOpen = tavoloAperto === i;
      const rispostiNelTavolo = t.persone.filter(p => (window.datiInvitati||[]).some(r => normalizeText(r.nome) === normalizeText(p))).length;
      
      html += `
        <div>
          <button onclick="toggleTavolo(${i})" style="width:100%; background-color: ${bgTavolo}; border:1.5px solid ${borderTavolo}; border-radius:${isOpen ? '12px 12px 0 0' : '12px'}; padding:13px 16px; font-family:'Inter',sans-serif; font-size:17px; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
            <span>${label}</span>
            <span style="background:#ffffff; border:1px solid ${borderTavolo}; border-radius:20px; padding:2px 10px; font-size:13px; font-weight:700;">${rispostiNelTavolo}/${t.persone.length}</span>
          </button>
          <div id="tavolo-panel-${i}" style="display:${isOpen ? 'block' : 'none'}; border:1.5px solid ${borderTavolo}; border-top:none; border-radius:0 0 12px 12px; padding:12px 16px; background:#f9fff0;">
            ${t.persone.map(p => '<div style="padding:5px 0; font-family:\'Cormorant Garamond\',serif; font-size:18px; font-weight:600; color:#000000;">' + p + etaTavoloHTML(p) + '</div>').join('')}
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    sezione.innerHTML = html;
  }

  function toggleTavolo(idx) {
    tavoloAperto = (tavoloAperto === idx) ? null : idx;
    renderizzaTavoli();
  }

  function etaTavoloHTML(nome) {
    const eta = getEtaAnni(nome);
    const r = (window.datiInvitati||[]).find(inv => normalizeText(inv.nome) === normalizeText(nome));
    let iconaPart = '';
    if (r && r.secondo) {
      const tipo = detectSecondo(r.secondo);
      const m = { veg:'V', carne:'C', pesce:'P', baby:'B' };
      const c = { veg:'#2d6040', carne:'#a83230', pesce:'#c8a000', baby:'#2980b9' };
      if (m[tipo]) iconaPart = ` <span style="display:inline-block;width:18px;height:18px;border-radius:50%;background:${c[tipo]};color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">${m[tipo]}</span>`;
    }
    return (eta !== null ? ' <span style="font-weight:500;font-size:16px;color:#000000">('+eta+')</span>' : '') + iconaPart;
  }

  function getEtaAnni(nome) {
    if (!window.mapNascita) return null;
    const acc = /[\u0300-\u036f]/g;
    const k = (nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    let dataN = window.mapNascita[k];
    if (!dataN) {
      const pk = k.split(/\s+/).filter(Boolean);
      Object.keys(window.mapNascita).forEach(mk => {
        const mk2 = mk.split(/\s+/).filter(Boolean);
        if (pk.every(w=>mk2.includes(w)) || mk2.every(w=>pk.includes(w))) dataN = window.mapNascita[mk];
      });
    }
    if (!dataN) return null;
    const matrimonio = new Date(2026,5,21);
    let nascita = null;
    const dmY=dataN.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
    if(dmY) nascita=new Date(parseInt(dmY[3]),parseInt(dmY[2])-1,parseInt(dmY[1]));
    if(!nascita) return null;
    let anni = matrimonio.getFullYear()-nascita.getFullYear();
    const cp=(nascita.getMonth()<matrimonio.getMonth())||(nascita.getMonth()===matrimonio.getMonth()&&nascita.getDate()<=matrimonio.getDate());
    if(!cp) anni--;
    return anni;
  }

  function formatNomeDisplay(nome) {
    if (!nome) return 'Senza nome';
    const tokens = nome.trim().split(/\s+/);
    let nomeStr = nome;
    if (activeOrdine !== 'nome' && tokens.length >= 2) {
      // COGNOME = primo token; NOME = resto
      nomeStr = tokens[0] + ' ' + tokens.slice(1).join(' ');
    }
    const eta = getEtaAnni(nome);
    return nomeStr + (eta !== null ? '&nbsp;<span style="font-weight:400;font-size:14px;color:#555">(' + eta + ')</span>' : '');
  }

  // --- ORDINAMENTO ---
  let activeOrdine = 'inserimento';

  function ordinaInvitati(arr, criterio) {
    const a2z = (a,b) => a.localeCompare(b, 'it', {sensitivity:'base'});
    const cp = v => normalizeText(v);
    const arr2 = [...arr];
    if (criterio === 'inserimento') {
      arr2.sort((a,b) => (b.indiceOriginale||0) - (a.indiceOriginale||0));
    } else if (criterio === 'nome') {
      arr2.sort((a,b) => {
        const ta = (a.nome||'').trim().split(/\s+/);
        const tb = (b.nome||'').trim().split(/\s+/);
        return a2z(cp(ta.slice(1).join(' ')), cp(tb.slice(1).join(' ')));
      });
    } else if (criterio === 'cognome') {
      arr2.sort((a,b) => {
        const ta = (a.nome||'').trim().split(/\s+/);
        const tb = (b.nome||'').trim().split(/\s+/);
        return a2z(cp(ta[0]), cp(tb[0]));
      });
    } else if (criterio === 'cibo') {
      const ord = { baby:0, veg:1, carne:2, pesce:3 };
      arr2.sort((a,b) => (ord[detectSecondo(a.secondo)] ?? 9) - (ord[detectSecondo(b.secondo)] ?? 9));
    } else if (criterio === 'tavolo') {
      arr2.sort((a,b) => a2z(trovaTavoloNum(a.nome), trovaTavoloNum(b.nome)));
    }
    return arr2;
  }

  function labelOrdineCorrente() {
    const t = dizionario[currentLang];
    const labels = { inserimento: t.lbl_INSERIMENTO, nome: t.lbl_NOME, cognome: t.lbl_COGNOME, cibo: t.lbl_CIBO, eta: t.lbl_ETA, tavolo: t.lbl_TAVOLO, attesa: t.lbl_ATTESA, gruppi: t.lbl_GRUPPI };
    return labels[activeOrdine] || t.lbl_COGNOME;
  }

  function apriSceltaOrdine() {
    const t = dizionario[currentLang];
    const opzioni = [
      {val:'inserimento', lbl: t.btnOrdina_inserimento},
      {val:'nome',        lbl: t.btnOrdina_nome},
      {val:'cognome',     lbl: t.btnOrdina_cognome},
      {val:'tavolo',      lbl: t.btnOrdina_tavolo},
      {val:'cibo',        lbl: t.btnOrdina_cibo}
    ];
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:flex;align-items:center;justify-content:center;';
    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:16px;padding:20px;width:88%;max-width:340px;';
    box.innerHTML = '<div style="text-align:center;font-weight:700;margin-bottom:15px;">' + t.lblOrdinaPer + '</div>';
    opzioni.forEach(o => {
      const btn = document.createElement('button');
      btn.innerHTML = o.lbl;
      btn.style.cssText = 'display:block;width:100%;margin-bottom:8px;padding:12px;border:1px solid #ccc;border-radius:8px;background:' + (o.val===activeOrdine?'#f5ede0':'#fff');
      btn.onclick = () => { activeOrdine = o.val; window.datiInvitati = ordinaInvitati(window.datiInvitati, o.val); renderizzaDati(); document.body.removeChild(overlay); };
      box.appendChild(btn);
    });
    overlay.appendChild(box);
    overlay.onclick = e => { if (e.target === overlay) document.body.removeChild(overlay); };
    document.body.appendChild(overlay);
  }

  function calcolaInAttesa() {
    const tutti = window.tuttiInvitatiCsvRaw || [];
    const risposti = window.datiInvitati || [];
    return tutti.filter(inv => !risposti.some(r => normalizeText(r.nome) === normalizeText(inv.nome)));
  }

  function mostraFotoPopup(nomeFile) {
    const foto = window.fotoDisponibili || [];
    let idx = foto.findIndex(f => f && (f.file === nomeFile || f.nome === nomeFile));
    if (idx < 0) idx = 0;
    if (foto.length === 0) return;

    let playTimer = null;
    const PLAY_INTERVAL = 6000;

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#2d3a0e;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    
    const stage = document.createElement('div');
    stage.style.cssText = 'position:relative;width:95%;height:70%;display:flex;align-items:center;justify-content:center;';
    
    const imgA = document.createElement('img'); imgA.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
    stage.appendChild(imgA);

    const caption = document.createElement('div');
    caption.style.cssText = 'color:#fff;font-family:Inter;font-size:20px;font-weight:700;margin-top:20px;text-align:center;';
    
    const sidebar = document.createElement('div');
    sidebar.style.cssText = 'color:#d4b07a;font-family:Inter;font-size:16px;text-align:center;margin-top:10px;';

    function aggiornaContenuto(i) {
      const voce = foto[i];
      const src = voce.file ? 'Foto/' + voce.file : '';
      imgA.src = src;
      imgA.onerror = () => { imgA.src = ''; caption.textContent = '📷 ' + voce.nome; };
      caption.textContent = (i+1) + ' / ' + foto.length;
      
      const parti = (voce.nome||'').trim().split(/\s+/);
      const cognome = parti[0];
      const nomeResto = parti.slice(1).join(' ');
      const eta = getEtaAnni(voce.nome);
      sidebar.innerHTML = `<strong>${cognome}</strong> ${nomeResto} ${eta?'('+eta+')':''}`;
    }

    const next = () => { idx = (idx + 1) % foto.length; aggiornaContenuto(idx); };
    const prev = () => { idx = (idx - 1 + foto.length) % foto.length; aggiornaContenuto(idx); };

    // Frecce
    const btnSx = document.createElement('button'); btnSx.innerHTML = '‹'; btnSx.style.cssText = 'position:absolute;left:20px;background:none;border:none;color:#fff;font-size:60px;';
    btnSx.onclick = e => { e.stopPropagation(); prev(); };
    const btnDx = document.createElement('button'); btnDx.innerHTML = '›'; btnDx.style.cssText = 'position:absolute;right:20px;background:none;border:none;color:#fff;font-size:60px;';
    btnDx.onclick = e => { e.stopPropagation(); next(); };

    overlay.appendChild(btnSx);
    overlay.appendChild(stage);
    overlay.appendChild(btnDx);
    overlay.appendChild(caption);
    overlay.appendChild(sidebar);
    
    overlay.onclick = () => document.body.removeChild(overlay);
    document.body.appendChild(overlay);
    aggiornaContenuto(idx);
  }

  function eliminaRiga(riga) {
    if (!confirm(dizionario[currentLang].msgConferma)) return;
    fetch(SCRIPT_URL + '?elimina=' + riga).then(() => caricaRisposte());
  }

  function scaricaBackupCSV() {
    let csv = '\uFEFFNome;Presenza;Secondo;Allergie;Note;Data\n';
    window.datiInvitati.forEach(r => {
      csv += `"${r.nome}";"${r.presenza}";"${r.secondo}";"${r.allergie}";"${r.note}";"${r.data}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Backup_Invitati.csv';
    a.click();
  }
</script>
