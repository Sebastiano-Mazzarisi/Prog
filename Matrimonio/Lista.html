<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #000000;
    --text-light: #000000;
    --border: #7a5c3a;
    --green: #2d6040;
    --green-light: #dff0e6;
    --red: #a83230;
    --blue: #2f5c9a;
    --blue-light: #e3eefb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }

  /* Selettore Lingua stile Matrimonio */
  .lang-switcher {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #000000;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .lang-btn:hover { background: rgba(184, 137, 58, 0.08); }
  .lang-btn.active-lang {
    background: var(--gold);
    color: #000000;
    border-color: var(--gold);
    font-weight: 600;
  }

  .header { text-align: center; margin-bottom: 20px; }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    font-style: italic;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .card {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 20px rgba(44,36,24,0.05);
    transition: box-shadow 0.2s;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #000000;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(160,124,69,0.3);
  }
  .btn-submit:hover  { opacity: 0.92; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: wait; }

  .sposi-kpi {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
  }
  .sposi-kpi td {
    padding: 0;
  }
  .kpi-box {
    background: #c8d5a8;
    border: 1.5px solid #8fa668;
    border-radius: 10px;
    padding: 9px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    margin: 3px;
  }
  .kpi-box:hover { background: #b8c898; }
  .kpi-box:active { transform: scale(0.98); }
  .kpi-box.active-filter {
    background: #a0b878;
    border-color: #5a7a38;
    outline: 2px solid #5a7a38;
  }
  .kpi-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
    color: #3a5a18;
    line-height: 1;
    flex-shrink: 0;
  }
  .kpi-label {
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #2a3a18;
    font-weight: 600;
    flex-grow: 1;
  }

  .risposta-card {
    background: #ffffff;
    border: 1.5px solid #4a7fc1;
    border-radius: 12px;
    padding: 0;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .risposta-card.cat-assenti {
    border-color: #b0c8ee;
  }
  .risposta-card.cat-assenti .risposta-nome {
    color: #a03030;
  }
  .risposta-nome {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #000000;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fafcff;
    padding: 10px 14px;
    border-radius: 0;
  }
  .risposta-nome .freccia {
    font-size: 13px;
    color: var(--gold-dark);
    flex-shrink: 0;
  }
  .risposta-nome .freccia.allergia-alert {
    color: #cc0000;
    font-weight: 900;
  }
  .risposta-nome .icona-secondo {
    font-size: 16px;
    margin-left: 6px;
  }
  .risposta-nome .icone-destra {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }

  .dettagli-scheda {
    display: none;
    padding: 10px 14px;
    background: #ffffff;
  }

  .risposta-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(224,212,192,0.4);
  }
  .risposta-row:last-child { border-bottom: none; }
  .risposta-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    min-width: 90px;
    padding-top: 2px;
    font-weight: 600;
  }
  .risposta-val {
    color: var(--text);
    text-align: right;
    flex: 1;
    font-weight: 400;
  }
  .risposta-val.allergia { color: #a83230; font-weight: 500; }
  .risposta-data {
    font-size: 11px;
    color: var(--text);
    margin-top: 8px;
    text-align: right;
    opacity: 0.7;
  }

  .badge {
    display: inline-block;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-veg      { background: var(--green-light); color: var(--green); }
  .badge-carne    { background: rgba(201,169,110,0.15); color: var(--gold-dark); }
  .badge-pesce    { background: var(--blue-light); color: var(--blue); }
  .muted          { color: #888; }

  .delete-btn {
    background: #c0504d;
    border: none;
    color: #ffffff;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    width: 100%;
    text-align: center;
    transition: background 0.2s;
  }
  .delete-btn:hover {
    background: #a3413e;
  }

  @media (max-width: 520px) {
    /* sposi-kpi è già una tabella, nessun override necessario */
    .header .subtitle { font-size: 18px; letter-spacing: 3px; }
  }

  /* Griglia tabelle PDF - bordo singolo garantito */
  .pdf-table { border-collapse: collapse; border-spacing: 0; }
  .pdf-table thead { display: table-header-group; }
  .pdf-table tbody tr { page-break-inside: avoid; }
  .pdf-table th, .pdf-table td {
    border: none !important;
    border-right: 0.5px solid #000 !important;
    border-bottom: 0.5px solid #000 !important;
  }
  .pdf-table tr th:first-child, .pdf-table tr td:first-child {
    border-left: 0.5px solid #000 !important;
  }
  .pdf-table thead tr:first-child th, .pdf-table tbody:first-child tr:first-child td {
    border-top: 0.5px solid #000 !important;
  }
</style>
</head>
<body>

<div id="sposi-section">
<div class="page-wrapper">

  <div class="header">
    <div class="lang-switcher">
      <button class="lang-btn active-lang" id="btn-it" onclick="cambiaLingua('it')">Italiano</button>
      <div class="header-ornament">✦ ✦ ✦</div>
      <button class="lang-btn" id="btn-es" onclick="cambiaLingua('es')">Español</button>
    </div>
    <h1 id="titolo-pagina">Lista Invitati</h1>
    <div class="subtitle">Giulia &amp; Onofrio</div>
  </div>

  <div class="card">
    <div id="sposi-table">
      <p id="txt-caricamento" style="text-align:center;padding:20px">
        <span style="font-size:24px;font-weight:700">Caricamento...</span><br>
        <small style="color:#888;font-size:13px" id="time-placeholder"></small>

<script>
  function getCurrentDateTime() {
    const now = new Date();
    return now.toLocaleDateString('it-IT', {day: '2-digit', month: '2-digit', year: 'numeric'}) + ' ' +
           now.toLocaleTimeString('it-IT', {hour: '2-digit', minute: '2-digit'});
  }
  // Imposta l'orario iniziale subito prima del caricamento reale
  document.getElementById('time-placeholder').innerText = getCurrentDateTime();

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfKImnIRNz0d-01K4KYomyAKpy_oiVZZtcnhPdf-8sKb0ZZSHymdb4UNV7LFNDOG-P3w/exec';
  let activeFilter = null;
  window.datiInvitati = [];

  let currentLang = 'it';

  // Array dinamico per i tavoli
  let TAVOLI = [];
  let tavoloAperto = null;

  const dizionario = {
    it: {
      titolo: "Lista Invitati",
      caricamento: "Caricamento...",
      nessunaRisposta: "Nessuna risposta ancora.",
      aggiorna: "↻ Aggiorna",
      riprova: "↻ Riprova",
      pdf: "📄 PDF",
      kpiPresenti: "Presenti",
      kpiAssenti: "Assenti",
      kpiAllergie: "Allergie",
      kpiVeg: "Vegetariano",
      kpiCarne: "Carne",
      kpiPesce: "Pesce",
      kpiBaby: "Baby",
      kpiSegnaposto: "Segnaposto",
      lblPresenza: "Presenza",
      lblSecondo: "Secondo",
      lblAllergie: "Allergie",
      lblNote: "Note",
      lblNessuna: "Nessuna",
      btnElimina: "✕ Elimina questa scheda",
      msgConferma: "Eliminare questa scheda?",
      msgErrCanc: "Errore nella cancellazione.",
      msgErrRete: "Errore di rete.",
      msgNessunDato: "Nessun dato da stampare.",
      pdfNome: "Nome",
      badgeVeg: "🌿 Vegetariano",
      badgeCarne: "🥩 Carne",
      badgePesce: "🐟 Pesce",
      titoloPresenti: "Presenti",
      titoloAssenti: "Assenti",
      titoloInvitati: "Invitati",
      tavoli: "Tavoli",
      titoloTavoli: "Disposizione dei tavoli"
    },
    es: {
      titolo: "Lista de Invitados",
      caricamento: "Cargando...",
      nessunaRisposta: "Ninguna respuesta todavía.",
      aggiorna: "↻ Actualizar",
      riprova: "↻ Reintentar",
      pdf: "📄 PDF",
      kpiPresenti: "Presentes",
      kpiAssenti: "Ausentes",
      kpiAllergie: "Alergias",
      kpiVeg: "Vegetarianos",
      kpiCarne: "Carne",
      kpiPesce: "Pescado",
      kpiBaby: "Baby",
      kpiSegnaposto: "Marcador de posición",
      lblPresenza: "Asistencia",
      lblSecondo: "Segundo",
      lblAllergie: "Alergias",
      lblNote: "Notas",
      lblNessuna: "Ninguna",
      btnElimina: "✕ Eliminar esta tarjeta",
      msgConferma: "¿Eliminar esta tarjeta?",
      msgErrCanc: "Error al eliminar.",
      msgErrRete: "Error de red.",
      msgNessunDato: "No hay datos para imprimir.",
      pdfNome: "Nombre",
      badgeVeg: "🌿 Vegetariano",
      badgeCarne: "🥩 Carne",
      badgePesce: "🐟 Pescado",
      titoloPresenti: "Presentes",
      titoloAssenti: "Ausentes",
      titoloInvitati: "Invitados",
      tavoli: "Mesas",
      titoloTavoli: "Disposición de las mesas"
    }
  };

  // Attende che i font web siano scaricati per evitare sfarfallii visivi e layout errati
  window.addEventListener('DOMContentLoaded', () => {
    document.fonts.ready.then(() => {
      caricaTavoli(); // Avvia il fetch dei tavoli
      caricaRisposte(); // Avvia il fetch da Google Script
    });
  });

  // Funzione per estrarre i dati da Tavoli.txt dinamicamente
  async function caricaTavoli() {
    try {
      const response = await fetch('Tavoli.txt?t=' + Date.now());
      if (response.ok) {
        const text = await response.text();
        const righe = text.split(/\r?\n/);
        TAVOLI = []; // Resetta l'array per popolarlo dinamicamente
        let tavoloCorrente = null;

        righe.forEach(riga => {
          const r = riga.trim();
          if (!r) return; // Ignora le righe vuote

          if (r.startsWith('#')) {
            // Nuovo tavolo identificato (rimuove il '#' e gli spazi)
            tavoloCorrente = {
              nome: r.substring(1).trim(),
              persone: []
            };
            TAVOLI.push(tavoloCorrente);
          } else if (tavoloCorrente) {
            // Aggiunge la persona al tavolo corrente
            tavoloCorrente.persone.push(r);
          }
        });

        // Se la sezione HTML dei tavoli è già stata montata, la aggiorna
        if (document.getElementById('sezione-tavoli')) {
          renderizzaTavoli();
        }
      } else {
        console.error("Errore nel caricamento di Tavoli.txt: " + response.status);
      }
    } catch (err) {
      console.error("Errore di rete durante il caricamento di Tavoli.txt: ", err);
    }
    // Carica Invitati.csv per popolare window.mapNascita (date di nascita)
    try {
      const respInv = await fetch('Invitati.csv?t=' + Date.now());
      if (respInv.ok) {
        const txtInv = await respInv.text();
        const righeInv = txtInv.split(/\r?\n/).map(r => r.trim());
        const sepInv = txtInv.includes(';') ? ';' : ',';
        const acc = /[\u0300-\u036f]/g;
        window.mapNascita = {};
        let totCsv = 0;
        let startInv = (righeInv.length > 0 && righeInv[0].toLowerCase().includes('nom')) ? 1 : 0;
        for (let i = startInv; i < righeInv.length; i++) {
          const cols = righeInv[i].split(sepInv);
          const nome = cols[0] ? cols[0].replace(/['"]/g,'').trim() : '';
          const dataN = cols[1] ? cols[1].replace(/['"]/g,'').trim() : '';
          if (nome) {
            totCsv++;
            if (dataN) window.mapNascita[nome.toLowerCase().normalize('NFD').replace(acc,'').trim()] = dataN;
          }
        }
        window.totInvitatiCsv = totCsv;
      }
    } catch(e) { console.log('mapNascita: Invitati.csv non disponibile', e); }
  }

  function cambiaLingua(lang) {
    currentLang = lang;
    document.getElementById('btn-it').classList.toggle('active-lang', lang === 'it');
    document.getElementById('btn-es').classList.toggle('active-lang', lang === 'es');
    document.getElementById('titolo-pagina').innerText = dizionario[lang].titolo;

    const txtCaricamento = document.getElementById('txt-caricamento');
    if (txtCaricamento) txtCaricamento.innerText = dizionario[lang].caricamento;

    if (window.datiInvitati && window.datiInvitati.length > 0) {
      renderizzaDati();
    }
  }

  function normalizeText(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function detectSecondo(value) {
    const s = normalizeText(value);
    if (s === '4') return 'baby';
    if (s === '5') return 'segnaposto';
    if (s.includes('veget') || s.includes('vegan')) return 'veg';
    if (s.includes('carne') || s.includes('meat')) return 'carne';
    if (s.includes('pesce') || s.includes('pescado') || s.includes('fish')) return 'pesce';
    return '';
  }

  function isAbsent(presenza, secondo) {
    const p = normalizeText(presenza);
    if (p === '0' || p === 'false' || p === 'no' || p.includes('non') || p.includes('assente') || p === '') {
        if (p === '' && detectSecondo(secondo) !== '') {
            return false;
        }
        return true;
    }
    return false;
  }

  function hasAllergy(value) {
    if (!value) return false;
    const s = normalizeText(value).replace(/[^\w\s]/gi, '').replace(/\s+/g, ' ').trim();
    if (!s) return false;
    const falsiPositivi = [
      'no', 'nessuna', 'nessuno', 'nessun', 'niente', 'nulla', 'nd',
      '0', 'false', 'nessuna allergia', 'no allergie', 'nessuna in particolare',
      'no grazie', 'nessuna grazie'
    ];
    if (falsiPositivi.includes(s)) return false;
    return true;
  }

  function iconaAllergie(value) {
    if (!hasAllergy(value)) return '';
    // Mappa esatta dei valori usati in Matrimonio.html
    const mappa = {
      'formaggi':     '🧀',
      'glutine':      '🌾',
      'lattosio':     '🥛',
      'frutta secca': '🥜',
      'uova':         '🥚',
      'crostacei':    '🦐',
      'soia':         '🫘',
      'pesce':        '🐟',
      'sedano':       '🥦',
    };
    const voci = value.split(',').map(v => v.trim().toLowerCase());
    const icone = [];
    voci.forEach(v => {
      if (mappa[v]) {
        if (!icone.includes(mappa[v])) icone.push(mappa[v]);
      } else {
        // Voce libera non in mappa: icona generica se non già presente
        if (!icone.includes('⚠️')) icone.push('⚠️');
      }
    });
    return icone.join('');
  }

  function secondBadge(secondo, assente) {
    if (assente) return '<span class="muted">—</span>';
    const tipo = detectSecondo(secondo);
    const testi = dizionario[currentLang];

    if (tipo === 'veg') return `<span class="badge badge-veg">${testi.badgeVeg}</span>`;
    if (tipo === 'carne') return `<span class="badge badge-carne">${testi.badgeCarne}</span>`;
    if (tipo === 'pesce') return `<span class="badge badge-pesce">${testi.badgePesce}</span>`;
    return '<span class="muted">—</span>';
  }

  function toggleDettagli(id) {
    const element = document.getElementById('dettagli-' + id);
    if (element.style.display === 'block') {
      element.style.display = 'none';
    } else {
      element.style.display = 'block';
    }
  }

  function filtraLista(categoria) {
    if (activeFilter === categoria) {
      activeFilter = null;
    } else {
      activeFilter = categoria;
    }
    document.querySelectorAll('.kpi-box').forEach(el => el.classList.remove('active-filter'));
    if (activeFilter) {
      document.getElementById('btn-' + activeFilter).classList.add('active-filter');
    }
    document.querySelectorAll('.risposta-card').forEach(card => {
      if (!activeFilter || card.classList.contains('cat-' + activeFilter)) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }

  function caricaRisposte() {
    const box = document.getElementById('sposi-table');
    const testi = dizionario[currentLang];
    box.innerHTML = '<p id="txt-caricamento" style="text-align:center;padding:20px"><span style="font-size:24px;font-weight:700">' + testi.caricamento + '</span><br><small style="color:#888;font-size:13px">' + getCurrentDateTime() + '</small></p>';
    activeFilter = null;

    fetch(SCRIPT_URL + '?t=' + Date.now())
      .then(r => {
        if (!r.ok && r.status !== 0) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(txt => JSON.parse(txt))
      .then(data => {
        if (!data.ok || !data.rows || data.rows.length === 0) {
          box.innerHTML = `
            <p style="text-align:center;padding:20px;color:var(--text-light)">${testi.nessunaRisposta}</p>
            <button class="btn-submit" onclick="caricaRisposte()">↻ ${testi.aggiorna}</button>
          `;
          window.datiInvitati = [];
          return;
        }

        let righeMappate = data.rows.map((r, i) => ({
          ...r,
          presenza: r.presenza !== undefined ? r.presenza : String(r.persone ?? ''),
          indiceOriginale: i + 2
        }));

  function trovaTavoloNum(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];
      for(const p of t.persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1; return n<=10?eT[n]:String(n);
        }
      }
    }
    return '';
  }

  function trovaTavolo(nome) {
    const eT=['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const acc=/[̀-ͯ]/g;
    const k=(nome||'').toLowerCase().normalize('NFD').replace(acc,'').trim();
    for(let i=0;i<TAVOLI.length;i++){
      const t=TAVOLI[i];
      for(const p of t.persone){
        const pk=p.toLowerCase().normalize('NFD').replace(acc,'').trim();
        const tk=pk.split(' '),tn=k.split(' ');
        if(tk.every(w=>tn.includes(w))||tn.every(w=>tk.includes(w))){
          const n=i+1;
          return(n<=10?eT[n]:String(n))+' '+t.nome.replace(/^Tavolo \d+ - /,'');
        }
      }
    }
    return '-';
  }

-family:Arial,sans-serif;font-size:8px;font-weight:600;color:#2a5a18;text-transform:uppercase;letter-spacing:0.5px">Assenti</span></td></tr></table></div>

  function scorriTavoli() {
    // Copia riepilogo negli appunti in modo silente
    try {
      const kpi = window.kpiSnapshot || {};
      const totInv = window.totInvitatiCsv || 0;
      const totRisp = kpi.totRisposte || 0;
      const totPres = kpi.totPresenti || 0;
      const totAss = kpi.totAssenti || 0;
      const totAttesa = Math.max(0, totInv - totRisp);
      const now = kpi.aggiornatoAlle ? kpi.aggiornatoAlle : new Date();
      const ore = now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
      const data = now.toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit', year:'numeric'});
      const sep = '---------------------------';
      const testo =
        'Matrimonio Giulia & Onofrio\n' +
        'Dati aggiornati alle ore\n' +
        ore + ' del ' + data + '\n' +
        sep + '\n' +
        'Invitati + sposi: ' + totInv + '\n' +
        'Confermata presenza: ' + totPres + '\n' +
        'Comunicata assenza: ' + totAss + '\n' +
        'In attesa di risposta: ' + totAttesa + '\n' +
        sep + '\n' +
        'Secondo vegetariano: ' + (kpi.totVeg || 0) + '\n' +
        'Secondo carne: ' + (kpi.totCarne || 0) + '\n' +
        'Secondo pesce: ' + (kpi.totPesce || 0) + '\n' +
        'Menu baby: ' + (kpi.totBaby || 0) + '\n' +
        sep + '\n';
      navigator.clipboard.writeText(testo).then(() => {
        // Mostra popup COPIATO!
        const popup = document.createElement('div');
        popup.textContent = 'Copiato!';
        popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#2d6040;color:#ffffff;font-family:Inter,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:10px 22px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:9999;pointer-events:none;';
        document.body.appendChild(popup);
        setTimeout(() => { document.body.removeChild(popup); }, 1500);
      }).catch(() => {});
    } catch(e) {}

    // Scorri ai tavoli
    const sezione = document.getElementById('sezione-tavoli');
    if (sezione) {
      sezione.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

  function etaTavoloHTML(nome) {
    const acc = /[\u0300-\u036f]/g;
    function tok(n) { return (n||'').toLowerCase().normalize('NFD').replace(acc,'').trim().split(/\s+/).filter(Boolean); }
    const pk = tok(nome);
    // Cerca in datiInvitati per secondo/icona
    var match = null;
    if (window.datiInvitati && window.datiInvitati.length) {
      match = window.datiInvitati.find(function(r) {
        var rk = tok(r.nome||'');
        return pk.every(function(w){return rk.includes(w);}) || rk.every(function(w){return pk.includes(w);});
      });
    }
    // Età da window.mapNascita
    var etaPart = '';
    if (window.mapNascita) {
      // cerca chiave esatta o per token
      var chiaveEsatta = nome.toLowerCase().normalize('NFD').replace(acc,'').trim();
      var dataN = window.mapNascita[chiaveEsatta];
      if (!dataN) {
        // fallback: cerca per token match
        Object.keys(window.mapNascita).forEach(function(k) {
          var kTok = k.split(/\s+/).filter(Boolean);
          if (pk.every(function(w){return kTok.includes(w);}) || kTok.every(function(w){return pk.includes(w);})) {
            dataN = window.mapNascita[k];
          }
        });
      }
      if (dataN) {
        var d = dataN.trim();
        var matrimonio = new Date(2026, 5, 21);
        var nascita = null;
        var dmY = d.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
        var Ymd = d.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
        var soloAnno = d.match(/^(\d{4})$/);
        if (dmY) nascita = new Date(parseInt(dmY[3]), parseInt(dmY[2])-1, parseInt(dmY[1]));
        else if (Ymd) nascita = new Date(parseInt(Ymd[1]), parseInt(Ymd[2])-1, parseInt(Ymd[3]));
        else if (soloAnno) nascita = new Date(parseInt(soloAnno[1]), 0, 1);
        if (nascita) {
          var anni = matrimonio.getFullYear() - nascita.getFullYear();
          var cp = (nascita.getMonth() < matrimonio.getMonth()) ||
            (nascita.getMonth() === matrimonio.getMonth() && nascita.getDate() <= matrimonio.getDate());
          if (!cp) anni--;
          etaPart = ' <span style="font-weight:500;font-size:16px;color:#000000;-webkit-text-fill-color:#000000">('+anni+')</span>';
        }
      }
    }
    // Icona secondo piatto
    var iconaPart = '';
    if (match && match.secondo) {
      var tipo = detectSecondo(match.secondo);
      if (tipo === 'veg')        iconaPart = ' <span title="Vegetariano" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2d6040;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">V</span>';
      else if (tipo === 'carne') iconaPart = ' <span title="Carne" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#a83230;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">C</span>';
      else if (tipo === 'pesce') iconaPart = ' <span title="Pesce" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#c8a000;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">P</span>';
      else if (tipo === 'baby')  iconaPart = ' <span title="Baby" style="display:inline-block;width:18px;height:18px;border-radius:50%;background:#2980b9;color:#ffffff !important;-webkit-text-fill-color:#ffffff;font-size:10px;font-weight:900;text-align:center;line-height:18px;vertical-align:middle;font-family:Arial,sans-serif">B</span>';
    }
    return etaPart + iconaPart;
  }

  function renderizzaTavoli() {
    const sezione = document.getElementById('sezione-tavoli');
    if (!sezione) return;

    const emojiNumW = ['','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    // Colore verde oliva chiaro chiaro uniforme per il Web
    const bgTavolo = '#e0e8d0';
    const borderTavolo = '#a5b589';

    let html = `<div style="margin-bottom:8px;">`;

    // Bottoni tavoli
    html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
    TAVOLI.forEach((t, i) => {
      const label = t.nome.replace(/^Tavolo \d+ - /, '');
      const isOpen = tavoloAperto === i;
      html += `
        <div>

          <button onclick="toggleTavolo(${i})" style="
            width:100%;
            background-color: ${bgTavolo};
            color:#000000;
            border:1.5px solid ${borderTavolo};
            border-bottom:${isOpen ? 'none' : '1.5px solid ' + borderTavolo};
            border-radius:${isOpen ? '12px 12px 0 0' : '12px'};
            padding:13px 16px;
            font-family:'Inter',sans-serif;
            font-size:17px;
            font-weight:600;
            letter-spacing:0.5px;
            cursor:pointer;
            display:flex;
            justify-content:space-between;
            align-items:center;
            transition:all 0.2s;
          " id="btn-tavolo-${i}">
            <span>Tavolo ${emojiNumW[i+1] || i+1} &middot; ${label}</span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span style="background-color:#ffffff; border:1px solid ${borderTavolo}; border-radius:20px;padding:2px 10px;font-size:13px;font-weight:700;color:#000000;">${t.persone.length}</span>
              
            </span>
          </button>

          <div id="tavolo-panel-${i}" style="
            display:${isOpen ? 'block' : 'none'};
            background-color:transparent;
            border:1.5px solid ${borderTavolo};
            border-top:none;
            border-radius:0 0 12px 12px;
            padding:12px 16px;
          ">
            ${t.persone.map(p => '<div style="padding:5px 0; font-family:\'Cormorant Garamond\',serif; font-size:18px; font-weight:600; color:#000000; -webkit-text-fill-color:#000000;">' + p + etaTavoloHTML(p) + '</div>').join('')}
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    sezione.innerHTML = html;
  }

  function toggleTavolo(idx) {
    if (tavoloAperto === idx) {
      tavoloAperto = null;
    } else {
      tavoloAperto = idx;
    }
    renderizzaTavoli();
    // Dopo il toggle, scrolla al bottone appena cliccato
    setTimeout(() => {
      const btn = document.getElementById('btn-tavolo-' + idx);
      if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function eliminaRiga(riga) {
    if (!confirm(dizionario[currentLang].msgConferma)) return;
    const card = document.getElementById('card-' + riga);

    // Optimistic update: rimuove subito la card e aggiorna i KPI
    if (card) {
      card.style.transition = 'opacity 0.2s';
      card.style.opacity = '0';
      setTimeout(() => {
        card.remove();
        // Aggiorna window.datiInvitati e ricalcola KPI senza ricaricare dal server
        window.datiInvitati = window.datiInvitati.filter(r => r.indiceOriginale !== riga);
        renderizzaDati_soloKPI();
      }, 200);
    }

    // Chiama il server in background senza bloccare l'UI
    fetch(SCRIPT_URL + '?elimina=' + riga + '&t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (!data.ok) {
          // Rollback: ricarica dal server se qualcosa è andato storto
          alert(dizionario[currentLang].msgErrCanc);
          caricaRisposte();
        }
        // Se ok: niente da fare, UI già aggiornata
      })
      .catch(() => {
        alert(dizionario[currentLang].msgErrRete);
        caricaRisposte(); // Rollback
      });
  }

  function renderizzaDati_soloKPI() {
    // Ricalcola solo i numeri KPI senza rifare tutto il DOM
    const testi = dizionario[currentLang];
    let totPresenti = 0, totAssenti = 0, totAllergie = 0, totVeg = 0, totCarne = 0, totPesce = 0;
    window.datiInvitati.forEach(r => {
      const presenza = r.presenza || '';
      const secondo = r.secondo || '';
      const allergie = r.allergie || '';
      const assente = isAbsent(presenza, secondo);
      if (assente) {
        totAssenti++;
      } else {
        totPresenti++;
        if (hasAllergy(allergie)) totAllergie++;
        const tipo = detectSecondo(secondo);
        if (tipo === 'veg') totVeg++;
        else if (tipo === 'carne') totCarne++;
        else if (tipo === 'pesce') totPesce++;
      }
    });
    // Aggiorna solo i numeri nei box KPI già esistenti
    const kpiMap = {
      'btn-presenti': totPresenti, 'btn-assenti': totAssenti,
      'btn-allergie': totAllergie, 'btn-veg': totVeg,
      'btn-carne': totCarne, 'btn-pesce': totPesce
    };
    Object.entries(kpiMap).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.querySelector('.kpi-num').textContent = val;
    });
  }

  // --- CONTATORE VISITE MATRIMONIO ---
  function leggiContatore() {
    return '👁 ' + (parseInt(localStorage.getItem('matrimonio_visite') || '0', 10));
  }

  function gestisciContatore() {
    const n = parseInt(localStorage.getItem('matrimonio_visite') || '0', 10);
    if (confirm('Visite registrate: ' + n + '\n\nAzzerare il contatore?')) {
      localStorage.setItem('matrimonio_visite', 0);
      const btn = document.getElementById('btn-contatore');
      if (btn) btn.textContent = '👁 0';
    }
  }

  // Aggiorna il bottone contatore ogni volta che la finestra torna in primo piano
  window.addEventListener('focus', function() {
    const btn = document.getElementById('btn-contatore');
    if (btn) btn.textContent = leggiContatore();
  });
  // Aggiorna anche ogni 30 secondi
  setInterval(function() {
    const btn = document.getElementById('btn-contatore');
    if (btn) btn.textContent = leggiContatore();
  }, 30000);

  function scaricaBackupCSV() {
    if (!window.datiInvitati || window.datiInvitati.length === 0) {
      alert('Nessun dato da salvare.');
      return;
    }
    // Intestazione colonne
    const colonne = ['Nome', 'Presenza', 'Secondo', 'Allergie', 'Note', 'Data'];
    const righe = [colonne.join(';')];

    window.datiInvitati.forEach(r => {
      const cella = v => '"' + String(v || '').replace(/"/g, '""') + '"';
      righe.push([
        cella(r.nome),
        cella(r.presenza),
        cella(r.secondo),
        cella(r.allergie),
        cella(r.note),
        cella(r.data)
      ].join(';'));
    });

    const csv = '\uFEFF' + righe.join('\r\n'); // BOM per Excel italiano
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const oggi = new Date().toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Backup_Matrimonio_' + oggi + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
</script>
