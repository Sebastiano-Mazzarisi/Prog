<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Saldi</title>
<meta name="apple-mobile-web-app-title" content="Saldi">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        font-family:'JetBrains Mono','Courier New',monospace;padding:24px 16px}
  h1{color:#d0d0e8;font-size:1rem;font-weight:700;letter-spacing:.15em;
      text-transform:uppercase;margin-bottom:22px}
  .wrapper{display:flex;flex-direction:column;gap:16px;width:100%;max-width:460px}
  .row-top{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:#16213e;border:2px solid #d0d0e8;border-radius:18px;
         padding:22px 18px 20px;display:flex;flex-direction:column;align-items:center;
         gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.4);
         transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;user-select:none}
  .card:hover{transform:translateY(-5px) scale(1.02);border-color:#fff}
  .card.attiva{border-color:#fff;box-shadow:0 0 0 3px #d0d0e8;transform:translateY(-3px) scale(1.01)}
  .card-name{color:#d0d0e8;font-size:.95rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .card-val{color:#fff;font-size:1.55rem;font-weight:700;white-space:nowrap}
  .card-total{background:#16213e;border:2px solid #27ae60;border-radius:18px;overflow:hidden}
  .total-top{padding:20px 22px 16px;display:flex;flex-direction:column;align-items:center;
              gap:8px;cursor:pointer;user-select:none;transition:background .15s}
  .total-top:hover{background:rgba(255,255,255,.03)}
  .total-label{color:#d0d0e8;font-size:1.15rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase}
  .total-val{font-size:2.6rem;font-weight:700;white-space:nowrap}
  .gauge-box{background:#0d0d1a;border-top:2px solid #d0d0e8;padding:14px 18px 18px;cursor:pointer;user-select:none}
  .gauge-indicator{position:relative;height:14px;margin-bottom:4px}
  .gauge-arrow{position:absolute;top:0;transform:translateX(-50%);
                width:0;height:0;border-left:7px solid transparent;
                border-right:7px solid transparent;border-top:12px solid #d0d0e8}
  .gauge-bar-wrap{height:13px;background:#111133;border-radius:7px;overflow:hidden;position:relative}
  .gauge-seg{position:absolute;top:0;bottom:0}
  .seg-red   {left:0;                     width:22.73%;background:#c0392b}
  .seg-yellow{left:22.73%;      width:22.73%;background:#d68910}
  .seg-green {left:45.45%;     width:54.55%;background:#1e8449}
  .gauge-ticks{margin-top:6px;position:relative;height:22px}
  .tick{display:flex;flex-direction:column;align-items:center;gap:2px;position:absolute;transform:translateX(-50%)}
  .tick-line{width:1px;height:6px;background:#888}
  .tick-label{color:#aaaacc;font-size:.62rem;white-space:nowrap}
  .tick-0     {left:0%}
  .tick-rosso {left:22.73%}
  .tick-giallo{left:45.45%}
  .tick-max   {left:100%}
  .click-hint{text-align:center;color:#aaaacc;font-size:.65rem;letter-spacing:.1em;margin-top:-6px}
  .pannello{display:none;background:#16213e;border:2px solid #aaaacc44;border-radius:18px;
             overflow:hidden;animation:fadeSlide .25s ease}
  .pannello.aperto{display:block}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .pannello-header{background:#0f1f3d;border-bottom:2px solid #d0d0e844;padding:10px 14px;
                    display:flex;align-items:center;justify-content:space-between}
  .pannello-title{color:#d0d0e8;font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .btn-chiudi{background:none;border:1px solid #aaaacc44;border-radius:8px;color:#aaaacc;
               font-family:inherit;font-size:.7rem;padding:4px 10px;cursor:pointer;letter-spacing:.08em}
  .btn-chiudi:hover{background:#ffffff11}
  table{width:100%;border-collapse:collapse;font-size:.78rem}
  thead tr{background:#0f1f3d;border-bottom:2px solid #aaaacc66}
  th{color:#aaaacc;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      padding:10px 12px;text-align:right;border-right:1px solid #ffffff18}
  th:first-child{text-align:left} th:last-child{border-right:none}
  tbody tr{border-top:1px solid #ffffff18;background:rgba(255,255,255,.04)}
  tbody tr:nth-child(even){background:rgba(255,255,255,.08)}
  td{padding:9px 12px;color:#d0d0e8;white-space:nowrap;border-right:1px solid #ffffff18;vertical-align:top}
  td:last-child{border-right:none}
  td.dt{color:#aaaacc;text-align:left} td.num{text-align:right}
  td.tot{color:#fff;font-weight:700;text-align:right}
  td.nota{color:#8888bb;font-size:.72rem;white-space:normal;max-width:160px}
  td.nota-vuota{color:#444466;font-size:.72rem;text-align:center}
  /* riga totale cliccabile */
  #tbodyTotale tr{cursor:pointer;transition:background .15s}
  #tbodyTotale tr:hover{background:rgba(255,255,255,.06)}
  #tbodyTotale tr.copiata{background:rgba(39,174,96,.15)}
  .mini-row{display:flex;align-items:center;gap:8px}
  .mini-gauge-wrap{flex:1;position:relative;height:13px;border-radius:6px;overflow:hidden;background:#111133}
  .mini-seg{position:absolute;top:0;bottom:0}
  .mini-seg-red{left:0;background:#c0392b} .mini-seg-yellow{background:#d68910} .mini-seg-green{background:#1e8449}
  .mini-k{color:#aaaacc;font-size:.7rem;white-space:nowrap;min-width:28px;text-align:right}
  .azioni{display:flex;gap:10px;margin-top:4px}
  .btn-imp,.btn-pdf{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 10px;border-radius:14px;font-family:inherit;font-size:.85rem;font-weight:700;
    letter-spacing:.06em;cursor:pointer;border:none;text-decoration:none;
    transition:transform .15s,filter .15s;background:#d0d0e8;color:#1a1a2e}
  .btn-imp:hover,.btn-pdf:hover{transform:translateY(-2px);filter:brightness(1.1)}
  #toast{display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
          background:#333;color:#fff;padding:8px 22px;border-radius:20px;font-size:.82rem;
          font-weight:600;z-index:9999;pointer-events:none}
  .toast-show{animation:fadeInOut 2s ease forwards}
  @keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
  footer{margin-top:14px;color:#aaaacc;font-size:.7rem;letter-spacing:.08em}
</style>
</head>
<body>
<h1>💰 Situazione Saldi</h1>
<div class="wrapper">
  <div class="row-top">
    <div class="card" id="cardNino" onclick="togglePannello('nino')">
      <div class="card-name">Nino</div>
      <div class="card-val" id="valNino"></div>
    </div>
    <div class="card" id="cardMarica" onclick="togglePannello('marica')">
      <div class="card-name">Marica</div>
      <div class="card-val" id="valMarica"></div>
    </div>
  </div>

  <div class="card-total" id="cardTotale">
    <div class="total-top" onclick="togglePannello('totale')">
      <div class="total-label">Totale</div>
      <div class="total-val" id="valTotale"></div>
    </div>
    <div class="gauge-box" onclick="togglePannello('gauge')">
      <div class="gauge-indicator"><div class="gauge-arrow" id="gaugeArrow"></div></div>
      <div class="gauge-bar-wrap">
        <div class="gauge-seg seg-red"></div>
        <div class="gauge-seg seg-yellow"></div>
        <div class="gauge-seg seg-green"></div>
      </div>
      <div class="gauge-ticks">
        <div class="tick tick-0"><div class="tick-line"></div><div class="tick-label">0</div></div>
        <div class="tick tick-rosso"><div class="tick-line"></div><div class="tick-label">5k</div></div>
        <div class="tick tick-giallo"><div class="tick-line"></div><div class="tick-label">10k</div></div>
        <div class="tick tick-max"><div class="tick-line"></div><div class="tick-label">22k</div></div>
      </div>
    </div>
  </div>

  <div class="click-hint">▲ clicca su un box per i dettagli</div>

  <!-- Pannello Nino -->
  <div class="pannello" id="pannelloNino">
    <div class="pannello-header">
      <span class="pannello-title">📊 Nino — storico</span>
      <button class="btn-chiudi" onclick="chiudiPannello('nino')">✖ chiudi</button>
    </div>
    <table><thead><tr><th>Data</th><th>Nino</th><th style="text-align:left">Nota</th></tr></thead>
    <tbody id="tbodyNino"></tbody></table>
  </div>

  <!-- Pannello Marica -->
  <div class="pannello" id="pannelloMarica">
    <div class="pannello-header">
      <span class="pannello-title">📊 Marica — storico</span>
      <button class="btn-chiudi" onclick="chiudiPannello('marica')">✖ chiudi</button>
    </div>
    <table><thead><tr><th>Data</th><th>Marica</th><th style="text-align:left">Nota</th></tr></thead>
    <tbody id="tbodyMarica"></tbody></table>
  </div>

  <!-- Pannello Totale — click su riga = copia -->
  <div class="pannello" id="pannelloTotale">
    <div class="pannello-header">
      <span class="pannello-title">📊 Totale — storico</span>
      <button class="btn-chiudi" onclick="chiudiPannello('totale')">✖ chiudi</button>
    </div>
    <table><thead><tr><th>Data</th><th>Nino</th><th>Marica</th><th>Totale</th></tr></thead>
    <tbody id="tbodyTotale"></tbody></table>
  </div>

  <!-- Pannello Gauge -->
  <div class="pannello" id="pannelloGauge">
    <div class="pannello-header">
      <span class="pannello-title">📊 Totale — storico</span>
      <button class="btn-chiudi" onclick="chiudiPannello('gauge')">✖ chiudi</button>
    </div>
    <table><thead><tr><th style="text-align:left">Data</th><th></th></tr></thead>
    <tbody id="tbodyGauge"></tbody></table>
  </div>

  <!-- Pannello Imprevisti -->
  <div class="pannello" id="pannelloImp">
    <div class="pannello-header">
      <span class="pannello-title">⚠️ Imprevisti</span>
      <button class="btn-chiudi" onclick="chiudiPannello('imp')">✖ chiudi</button>
    </div>
    <table>
    <tbody id="tbodyImp"></tbody></table>
  </div>

  <div class="azioni">
    <button class="btn-imp" onclick="togglePannello('imp')"><svg width="22" height="22" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M1 21h22L12 2 1 21z" fill="#f39c12"/><path d="M13 18h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="#1a1a2e"/></svg> Imprevisti</button>
    <a class="btn-pdf" href="Saldi.pdf" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
      </svg>
      Apri PDF
    </a>
  </div>
  <div id="toast">📋 Copiato!</div>
</div>
<footer id="footer"></footer>

<script>
var MINIMO=0, MASSIMO=22000, ROSSO=5000, GIALLO=10000;
var PR=22.7273, PG=45.4545;
var DATI=[
  {data:'13/03/26',nino:10709,marica:4835,notaN:'',notaM:''},
  {data:'13/03/26',nino:9284,marica:4835,notaN:'Riparazione Renault (-)',notaM:''},
  {data:'12/03/26',nino:10725,marica:4835,notaN:'',notaM:''},
  {data:'08/03/26',nino:10753,marica:4835,notaN:'',notaM:'Stipendio Marica (+)'},
  {data:'07/03/26',nino:10753,marica:3640,notaN:'Interessi bancari (-)',notaM:''},
  {data:'27/02/26',nino:16471,marica:4835,notaN:'',notaM:''},
];
var IMP=[
  {desc:'Porta Mary',importo:1000},
  {desc:'Idraulico Mary',importo:200},
  {desc:'Matrimonio Onofrio',importo:15000},
  {desc:'Verde Mary e Ony',importo:2000},
  {desc:'Restauro organo',importo:1700},
];

function fmt(n){
  var s=String(n),r='';
  for(var i=0;i<s.length;i++){if(i>0&&(s.length-i)%3===0)r+='.';r+=s[i];}
  return '€ '+r;
}
function mesi(m){
  return ['','gennaio','febbraio','marzo','aprile','maggio','giugno',
          'luglio','agosto','settembre','ottobre','novembre','dicembre'][m];
}
function dataLunga(s){
  var p=s.split('/');
  return parseInt(p[0],10)+' '+mesi(parseInt(p[1],10))+' '+(2000+parseInt(p[2],10));
}
function pct(v){return Math.max(0,Math.min(100,(v-MINIMO)/(MASSIMO-MINIMO)*100));}
function colTot(t){return t<ROSSO?'#e74c3c':t<GIALLO?'#d68910':'#27ae60';}

function init(){
  var b=DATI[0], tot=b.nino+b.marica, col=colTot(tot);
  document.getElementById('valNino').textContent=fmt(b.nino);
  document.getElementById('valMarica').textContent=fmt(b.marica);
  document.getElementById('valTotale').textContent=fmt(tot);
  document.getElementById('valTotale').style.color=col;
  document.getElementById('cardTotale').style.borderColor=col;
  document.getElementById('gaugeArrow').style.left=pct(tot).toFixed(2)+'%';
  document.getElementById('footer').textContent='Aggiornamento: '+dataLunga(b.data);

  // Tabella Nino
  var h='';
  DATI.forEach(function(b){
    h+='<tr><td class="dt">'+b.data+'</td><td class="num">'+fmt(b.nino)+'</td>'+
       '<td class="'+(b.notaN?'nota':'nota-vuota')+'">'+(b.notaN||'—')+'</td></tr>';
  });
  document.getElementById('tbodyNino').innerHTML=h;

  // Tabella Marica
  h='';
  DATI.forEach(function(b){
    h+='<tr><td class="dt">'+b.data+'</td><td class="num">'+fmt(b.marica)+'</td>'+
       '<td class="'+(b.notaM?'nota':'nota-vuota')+'">'+(b.notaM||'—')+'</td></tr>';
  });
  document.getElementById('tbodyMarica').innerHTML=h;

  // Tabella Totale — ogni riga è cliccabile per copiare
  h='';
  DATI.forEach(function(b,idx){
    var t=b.nino+b.marica;
    var testo='Saldi al '+dataLunga(b.data)+'\n..............................\n'+
              'Nino: '+fmt(b.nino)+'\nMarica: '+fmt(b.marica)+'\nTotale: '+fmt(t);
    h+='<tr data-testo="'+encodeURIComponent(testo)+'" onclick="copiaRiga(this)">'+
       '<td class="dt">'+b.data+'</td><td class="num">'+fmt(b.nino)+'</td>'+
       '<td class="num">'+fmt(b.marica)+'</td><td class="tot">'+fmt(t)+'</td></tr>';
  });
  document.getElementById('tbodyTotale').innerHTML=h;

  // Tabella Gauge
  h='';
  DATI.forEach(function(b){
    var t=b.nino+b.marica, pt=pct(t);
    var wr=Math.min(pt,PR), wy=Math.max(0,Math.min(pt,PG)-PR), wg=Math.max(0,pt-PG);
    var rr=wg<0.01&&wy<0.01?'border-radius:0 6px 6px 0':'';
    var ry=wg<0.01&&wy>=0.01?'border-radius:0 6px 6px 0':'';
    var rg=wg>=0.01?'border-radius:0 6px 6px 0':'';
    var tk=Math.round(t/1000)+'k';
    h+='<tr><td class="dt" style="white-space:nowrap;width:1%;padding-right:10px">'+b.data+'</td>'+
       '<td style="width:100%"><div class="mini-row">'+
         '<div class="mini-gauge-wrap">'+
           '<div class="mini-seg mini-seg-red"    style="width:'+wr.toFixed(2)+'%;'+rr+'"></div>'+
           '<div class="mini-seg mini-seg-yellow" style="left:'+PR.toFixed(2)+'%;width:'+wy.toFixed(2)+'%;'+ry+'"></div>'+
           '<div class="mini-seg mini-seg-green"  style="left:'+PG.toFixed(2)+'%;width:'+wg.toFixed(2)+'%;'+rg+'"></div>'+
         '</div>'+
         '<span class="mini-k">'+tk+'</span>'+
       '</div></td></tr>';
  });
  document.getElementById('tbodyGauge').innerHTML=h;

  // Tabella Imprevisti
  h='';
  if(IMP.length===0){
    h='<tr><td colspan="2" class="nota-vuota" style="text-align:center;padding:16px">Nessun imprevisto</td></tr>';
  }else{
    IMP.forEach(function(i){
      h+='<tr><td class="dt" style="white-space:normal">'+i.desc+'</td><td class="num">'+fmt(i.importo)+'</td></tr>';
    });
  }
  // Aggiungo riga totale imprevisti
  if(IMP.length>0){
    var totImp=IMP.reduce(function(s,i){return s+i.importo;},0);
    h+='<tr style="border-top:2px solid #aaaacc66;font-weight:700">'+
       '<td class="dt" style="white-space:normal;color:#d0d0e8">Totale imprevisti</td>'+
       '<td class="num" style="color:#fff">'+fmt(totImp)+'</td></tr>';
  }
  document.getElementById('tbodyImp').innerHTML=h;
}

var PANNELLI={
  nino:  {pannello:'pannelloNino',  card:'cardNino'},
  marica:{pannello:'pannelloMarica',card:'cardMarica'},
  totale:{pannello:'pannelloTotale',card:'cardTotale'},
  gauge: {pannello:'pannelloGauge', card:'cardTotale'},
  imp:   {pannello:'pannelloImp',   card:null}
};
var aperto=null;
function togglePannello(id){
  if(aperto===id)chiudiPannello(id);
  else{if(aperto)chiudiPannello(aperto);apriPannello(id);}
}
function apriPannello(id){
  var c=PANNELLI[id];
  document.getElementById(c.pannello).classList.add('aperto');
  if(c.card)document.getElementById(c.card).classList.add('attiva');
  aperto=id;
}
function chiudiPannello(id){
  var c=PANNELLI[id];
  document.getElementById(c.pannello).classList.remove('aperto');
  if(c.card)document.getElementById(c.card).classList.remove('attiva');
  if(aperto===id)aperto=null;
}

init();

// ── Ripristino stato dopo reload ───────────────────────────────────────────────
(function(){
  try {
    var stato = JSON.parse(sessionStorage.getItem('saldi_stato') || 'null');
    if (stato) {
      if (stato.aperto && PANNELLI[stato.aperto]) apriPannello(stato.aperto);
      if (stato.scrollY) setTimeout(function(){ window.scrollTo(0, stato.scrollY); }, 0);
      sessionStorage.removeItem('saldi_stato');
    }
  } catch(e) {}
})();

// ── Auto-reload ogni 10 secondi (svuota cache su mobile) ──────────────────────
(function(){
  var INTERVALLO = 10000;
  setTimeout(function(){
    try {
      sessionStorage.setItem('saldi_stato', JSON.stringify({
        aperto: aperto,
        scrollY: window.scrollY || window.pageYOffset
      }));
    } catch(e) {}
    var url = window.location.href.split('?')[0];
    window.location.replace(url + '?v=' + Date.now());
  }, INTERVALLO);
})();

function copiaRiga(tr){
  var testo=decodeURIComponent(tr.dataset.testo);
  navigator.clipboard.writeText(testo).then(function(){
    // flash verde sulla riga
    tr.classList.add('copiata');
    setTimeout(function(){tr.classList.remove('copiata');},1000);
    // toast
    var t=document.getElementById('toast');
    t.style.display='block';
    t.classList.remove('toast-show');
    void t.offsetWidth;
    t.classList.add('toast-show');
    setTimeout(function(){t.style.display='none';},2000);
  });
}
</script>
</body>
</html>
