name: Buongiorno Putignano

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  genera-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r Pod/requirements.txt

      - name: Esegui PodPutignano.py
        working-directory: Pod
        run: python PodPutignano.py

      - name: Esegui Podcast.py
        working-directory: Pod
        run: python Podcast.py v

      - name: Salva Lettura.mp3
        uses: actions/upload-artifact@v4
        with:
          name: podcast-${{ github.run_number }}
          path: Pod/Lettura.mp3
          retention-days: 2
