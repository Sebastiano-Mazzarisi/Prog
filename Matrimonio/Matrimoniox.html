<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="doc-title">Matrimonio – Giulia & Onofrio</title>
<link rel="apple-touch-icon" href="Matrimonio.png">
<link rel="icon" type="image/png" href="Matrimonio.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Matrimonio G&amp;O">
<meta name="mobile-web-app-capable" content="yes">
<meta id="og-title" property="og:title" content="Matrimonio Giulia &amp; Onofrio">
<meta id="og-desc" property="og:description" content="Dettagli e informazioni per il matrimonio di Giulia &amp; Onofrio.">
<meta property="og:image" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Matrimonio.png">
<meta property="og:image:width" content="180">
<meta property="og:image:height" content="180">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sebastiano-mazzarisi.github.io/Prog/Matrimonio/Matrimoniox.html">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --warm-white: #fdf8f2;
    --gold: #b8893a;
    --gold-light: #d4b07a;
    --gold-dark: #8a5e1e;
    --text: #000000;
    --border: #7a5c3a;
    --green: #2d6040;
    --green-light: #dff0e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #dee5cd;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,169,110,0.06) 0%, transparent 60%);
  }

  .page-wrapper {
    max-width: 540px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .header { text-align: center; margin-bottom: 16px; }

  .lang-switcher {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #000000;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .lang-btn:hover { background: rgba(184, 137, 58, 0.08); }
  .lang-btn.active-lang {
    background: var(--gold);
    color: #000000;
    border-color: var(--gold);
    font-weight: 600;
  }

  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    color: #000000;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .header .description {
    font-size: 14.5px;
    color: #000000;
    line-height: 1.3;
    max-width: 380px;
    margin: 0 auto;
  }

  .hero-container {
    width: 100%;
    max-width: 460px;
    margin: 0 auto 18px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 16px rgba(44,36,24,0.06);
    overflow: hidden;
    background: var(--warm-white);
  }

  .hero-container img {
    width: 100%;
    height: 250px; /* Altezza regolata per una foto */
    display: block;
    object-fit: cover;
    object-position: center;
  }

  /* ... resto dello stile invariato ... */
  .card-memo { background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 16px; box-shadow: 0 4px 20px rgba(44,36,24,0.06); padding: 22px 20px; margin-bottom: 16px; margin-left: auto; margin-right: auto; max-width: 460px; text-align: center; }
  .card-memo-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: var(--gold-dark); margin-bottom: 8px; }
  .info-card { text-align: center; font-size: 16px; font-weight: 400; color: #000000; line-height: 1.5; }
  .btn-info { display: block; width: 100%; margin: 14px auto 0; padding: 12px 0; background: var(--cream); border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-dark); cursor: pointer; transition: background 0.15s; }
  .iban-clickable-box { background: var(--cream); border: 1.5px dashed var(--border); border-radius: 12px; padding: 16px; margin-top: 12px; cursor: pointer; }
</style>
</head>
<body>
<div class="page-wrapper">

  <div class="header">
    <div class="lang-switcher">
      <button class="lang-btn active-lang" id="lang-it" onclick="setLanguage('it')">Italiano</button>
      <div class="header-ornament">✦ ✦ ✦</div>
      <button class="lang-btn" id="lang-es" onclick="setLanguage('es')">Español</button>
    </div>
    <h1 id="main-title">Matrimonio</h1>
    <div class="subtitle">Giulia &amp; Onofrio</div>
    <p class="description" id="main-desc"></p>
  </div>

  <div class="hero-container">
    <img src="https://raw.githubusercontent.com/Sebastiano-Mazzarisi/Prog/main/Matrimonio/Foto2.jpeg" alt="Foto Matrimonio">
  </div>

  </div>
</body>
</html>
