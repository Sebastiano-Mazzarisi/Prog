<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="300">
  <title>Rosticceria Fantasia - Menu del giorno</title>
  <link rel="manifest" href="Fantasia-manifest.json">
  <meta name="theme-color" content="#E8521A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fantasia">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root {
      color-scheme: light;
      --ink: #251b14;
      --muted: #6f6259;
      --line: #e7ded6;
      --paper: #fffaf4;
      --accent: #b84f17;
      --accent-dark: #7c2f0d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4ede5;
      color: var(--ink);
      line-height: 1.45;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }
    header {
      padding: 8px 2px 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 5vw, 2.25rem);
      letter-spacing: 0;
      color: var(--accent-dark);
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .menu-text {
      padding: 20px;
      font-size: clamp(1.35rem, 5vw, 2.25rem);
      font-weight: 800;
      color: var(--accent-dark);
      text-align: center;
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      border-top: 1px solid var(--line);
    }
    footer {
      padding: 12px 2px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Rosticceria Fantasia</h1>
      <div class="meta">Menu trovato: 2026-06-13T15:46:01.295584+02:00<br>Aggiornato: 13/06/2026 15:49</div>
    </header>
    <section class="panel" aria-label="Menu del giorno">
      <div class="menu-text">MENÙ DEL GIORNO 13/06/26</div>

      <img src="Fantasia.jpg?v=210aec3020f9810a" alt="Foto del menu del giorno">
    </section>
    <footer>
      Fonte: <a href="https://www.facebook.com/RosticceriaFantasia">ricerca Facebook</a>. Questa pagina si aggiorna automaticamente ogni 5 minuti.
    </footer>
  </main>
</body>
</html>
