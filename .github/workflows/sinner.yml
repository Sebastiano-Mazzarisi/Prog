name: Aggiorna Sinner TXT

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: aggiorna-sinner
  cancel-in-progress: true

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r Tennis/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Aggiorna Sinner.txt
        run: |
          cd Tennis
          python SinnerVoce.py --once

      - name: Pubblica file aggiornati
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Tennis/Sinner.txt Tennis/Sinner-dati.csv
          if git diff --cached --quiet; then
            echo "Nessuna modifica da pubblicare"
          else
            git commit -m "Aggiorna situazione Sinner"
            git push
          fi
